name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp/backend
    env:
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: webapp/backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: pytest tests/ -v --tb=short

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: webapp/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint || true  # Don't fail on lint errors (build ignores them)
      - name: Run unit tests
        run: npm run test:run

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    # Backstop: a hung step fails in minutes instead of burning GitHub's 6h
    # job ceiling (which is what happened while `playwright install --with-deps`
    # hung in its apt phase on the hosted runners).
    timeout-minutes: 15
    # Run inside the official Playwright image: browsers AND their OS deps are
    # pre-baked, so we never invoke `playwright install --with-deps` (its apt
    # step is what hung). The tag MUST track the @playwright/test version in
    # package-lock.json (1.58.1) so the bundled browser build matches.
    container:
      image: mcr.microsoft.com/playwright:v1.58.1-noble
    defaults:
      run:
        working-directory: webapp/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: webapp/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run E2E tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: webapp/frontend/playwright-report/
          retention-days: 7
