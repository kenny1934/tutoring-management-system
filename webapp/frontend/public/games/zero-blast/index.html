function padKeysHtml() {
  const key = d => `<button class="zb-key" data-d="${d}">${d}</button>`;
  return [7, 8, 9].map(key).join("")
    + '<button class="zb-key zb-key--sign" aria-pressed="false" aria-label="負號 / negative sign">−</button>'
    + [4, 5, 6, 1, 2, 3].map(key).join("")
    + '<button class="zb-key zb-key--zero" data-d="0">0</button>';
}

function ctrlStatus(text, cls) {
  const el = $("ctrlStatus");
  el.textContent = text;
  el.className = "mc-status" + (cls ? " " + cls : "");
}

/* The phone renders whatever level the room publishes. Rules scope
 * state writes to the host, but the level is still shape-checked and
 * its numbers coerced before anything touches the DOM: every numeric
 * field must be a finite number, ids must be p1/p2, and the free-text
 * fields (expr, label) only ever render through escapeText. A level
 * that fails the check is ignored whole. */
function sanitizeLevel(raw) {
  if (!raw || typeof raw !== "object" || !Array.isArray(raw.pillars)) return null;
  if (raw.pillars.length < 1 || raw.pillars.length > 2) return null;
  const num = v => (typeof v === "number" && isFinite(v) ? v : null);
  const lv = {
    n: num(raw.n), kind: String(raw.kind || ""), expr: String(raw.expr || ""),
    seq: num(raw.seq), total: num(raw.total), stage: num(raw.stage),
    round: num(raw.round), roundsInStage: num(raw.roundsInStage),
    stageKind: raw.stageKind === "mix" ? "mix" : num(raw.stageKind),
    fuseMs: num(raw.fuseMs), finale: !!raw.finale, hard: !!raw.hard,
    konst: num(raw.konst), b: num(raw.b), c: num(raw.c),
  };
  if (lv.n == null || lv.seq == null || lv.fuseMs == null) return null;
  if (lv.kind === "numeric" && lv.konst == null) return null;
  if (lv.kind === "expanded" && (lv.b == null || lv.c == null)) return null;
  lv.pillars = raw.pillars.map(p => p && {
    id: p.id === "p1" || p.id === "p2" ? p.id : null,
    root: num(p.root),
    label: String(p.label || ""),
  });
  if (lv.pillars.some(p => !p || !p.id || p.root == null)) return null;
  return lv;
}

async function initController() {
  ZBFX.bgm.allow(false); // 30 phones x music = chaos: revoke, whatever ran before
  show("controllerScreen");
  // phones default to sound on (the host projector stays quiet)
  try {
    if (localStorage.getItem("mc-games-sound") === null) { ZBFX.audio.setOn(true); renderSoundIcon(); }
  } catch (_) {}

  try {
    C.room = await GameBridge.join({ slug: SLUG });
  } catch (err) {
    $("ctrlJoin").style.display = "none";
    ctrlStatus(t("room_gone"), "mc-status--danger");
    return;
  }

  $("ctrlPad").innerHTML = padKeysHtml();
  C.pad = makePad($("ctrlPad"), $("ctrlPreview"), $("ctrlLock"), $("ctrlLockCount"), v => ctrlSubmit(v));

  let saved = null;
  try { saved = JSON.parse(sessionStorage.getItem("zb-" + C.room.code)); } catch (_) {}
  if (saved && saved.id && saved.name) {
    C.id = saved.id; C.name = saved.name;
    enterPlay();
  }
  $("btnJoin").onclick = () => {
    const name = $("nameInput").value.trim().slice(0, 12);
    if (!name) { $("nameInput").focus(); return; }
    C.id = "p" + Math.random().toString(36).slice(2, 8);
    C.name = name;
    try { sessionStorage.setItem("zb-" + C.room.code, JSON.stringify({ id: C.id, name: C.name })); } catch (_) {}
    enterPlay();
  };
}

async function enterPlay() {
  ZBFX.audio.unlock();
  $("ctrlJoin").style.display = "none";
  $("ctrlPlay").style.display = "";
  $("ctrlName").textContent = C.name;
  ctrlStatus(t("ctrl_wait_start"));
  C.staged = false; // ctrlTick re-opens the pad if a round is mid-flight
  C.pad.disable();
  // uid lets the rules pin this entry (and subs/<id>) to this device;
  // null only under the test mock, which never sees real rules
  await C.room.set("players/" + C.id, {
    name: C.name, joinedAt: Date.now(), uid: GameBridge.uid() || null,
  });
  if (!C.watcher) C.watcher = C.room.watch(onCtrlRoom); // rejoin after a kick reuses the stream
  clearInterval(C.timerIv);
  C.timerIv = setInterval(ctrlTick, 100);
}

function ctrlSubmit(v) {
  if (C.phase !== "playing" || !C.staged) return;
  C.seq += 1;
  C.room.set("subs/" + C.id, { v: v, seq: C.seq, ts: Date.now() });
}

function ctrlTick() {
  if (C.phase !== "playing" || !C.deadlineEpoch) { $("ctrlTimerText").textContent = "--.-"; $("ctrlTimer").classList.remove("warn"); return; }
  // the round opens when the shared fuse ignites (deadline minus the
  // fuse length = the level card lead); latched so later deadline
  // changes (+15s, grace) never re-cover the board
  if (!C.staged && C.level && Date.now() >= C.deadlineEpoch - (C.level.fuseMs || 0)) {
    C.staged = true;
    openBoard($("ctrlExpr"));
    C.pad.enable();
  }
  const remain = Math.max(0, C.deadlineEpoch - Date.now());
  const fuse = (C.level && C.level.fuseMs) || remain;
  $("ctrlTimerText").textContent = (Math.min(remain, fuse) / 1000).toFixed(1);
  $("ctrlTimer").classList.toggle("warn", remain <= 5200);
  // grace window: live final-blast countdown (echo solves stay open),
  // the 3-2-1 mirrored big on the phone like the projector
  if (C.graceUntil > Date.now()) {
    const gs = Math.ceil((C.graceUntil - Date.now()) / 1000);
    ctrlStatus(fmt("critical_fmt", { s: gs }), "mc-status--danger");
    if (gs !== C.lastGraceSec && gs >= 1 && gs <= 3) {
      C.lastGraceSec = gs;
      const numEl = document.createElement("div");
      numEl.className = "zb-gracenum";
      numEl.textContent = gs;
      $("ctrlPlay").appendChild(numEl);
      setTimeout(() => numEl.remove(), 950);
    }
  }
}

function onCtrlRoom(room) {
  if (!room) return;
  const st = room.state || {};

  // first snapshot after (re)join: resync counters, don't replay old feedback
  if (!C.booted) {
    C.booted = true;
    const mySub = (room.subs || {})[C.id];
    const myVerdict = (room.verdicts || {})[C.id];
    if (mySub && typeof mySub.seq === "number") C.seq = mySub.seq;
    if (myVerdict && typeof myVerdict.seq === "number") {
      C.lastVerdictSeq = myVerdict.seq;
      if (typeof myVerdict.total === "number") $("ctrlScore").textContent = myVerdict.total;
      if (typeof myVerdict.streak === "number") renderStreak($("ctrlStars"), myVerdict.streak);
    }
  }

  const phaseChanged = st.phase !== C.phase;
  C.phase = st.phase;
  C.deadlineEpoch = st.deadlineEpoch || 0;
  C.graceUntil = st.graceUntil || 0;

  // lobby moderation: the host removed me — back to the name form.
  // seenSelf guards against snapshots that predate our own join write.
  const players = room.players || {};
  if (C.id && players[C.id]) {
    C.seenSelf = true;
  } else if (C.id && C.seenSelf && st.phase === "lobby") {
    C.seenSelf = false;
    C.id = null;
    try { sessionStorage.removeItem("zb-" + C.room.code); } catch (_) {}
    $("ctrlPlay").style.display = "none";
    $("ctrlJoin").style.display = "";
    $("ctrlName").textContent = "";
    ctrlStatus(t("kicked_status"), "mc-status--danger");
    return;
  }

  // new level (includes late join, reload recovery and host restart)
  const lvKey = st.level ? st.level.seq + "|" + st.level.expr : null;
  const nextLevel = st.level && lvKey !== C.levelKey ? sanitizeLevel(st.level) : null;
  if (nextLevel) {
    C.levelKey = lvKey;
    C.level = nextLevel;
    C.staged = false; // ctrlTick opens the round at the shared ignite
    C.lastGraceSec = null;
    $("ctrlLevelChip").innerHTML = levelChipHtml(st.level);
    $("ctrlExpr").classList.remove("condemned");
    setBoard($("ctrlExpr"), st.level, true);
    $("ctrlMark").innerHTML = "";
  }

  if (st.phase === "playing" && C.level) {
    if (phaseChanged) {
      // covers a host restart after the end screen too
      if (!$("controllerScreen").classList.contains("active")) show("controllerScreen");
      $("ctrlMark").innerHTML = "";
      ctrlTick(); // stage now if the ignite is already past (late join)
    }
    // claimed factors are struck through on every phone's board too;
    // a FRESH claim by someone else lands with a quiet ping
    if (st.claims) {
      let othersClaim = false;
      Object.keys(st.claims).forEach(id => {
        const c = st.claims[id];
        if (strikeFactor($("ctrlExpr"), id, c && c.name) && c && c.by !== C.id) othersClaim = true;
      });
      if (othersClaim && !phaseChanged) {
        // someone else's pillar just fell: the street thuds and the
        // card in your hands trembles (batch T)
        ZBFX.audio.thud();
        ZBFX.vibrate(30);
        const card = $("ctrlPlay");
        card.classList.remove("zb-ctrltremble");
        void card.offsetWidth;
        card.classList.add("zb-ctrltremble");
      }
    }
    if (C.graceUntil <= Date.now()) {
      const total = C.level.pillars.length;
      const k = st.claims ? Object.keys(st.claims).length : 0;
      // once claims exist, remind the class that echo solves still pay
      const hint = k > 0 ? " · " + t("claims_echo_hint") : "";
      ctrlStatus(fmt("claims_status", { k: k, m: total }) + hint);
    }
  } else if (st.phase === "cooldown") {
    C.pad.disable();
    ctrlStatus(t("ctrl_wait_next"), "mc-status--ok");
  } else if (st.phase === "reveal" && C.level) {
    if (phaseChanged) {
      C.pad.disable();
      C.staged = true; // a pre-open skip must still show the board
      openBoard($("ctrlExpr"));
      // the fizzle reaches the phone: its own card is condemned
      $("ctrlExpr").setAttribute("data-condemn", t("stamp_standing"));
      $("ctrlExpr").classList.add("condemned");
      renderStreak($("ctrlStars"), 0); // a survived structure breaks the streak
      const rootsLine = t("note_reveal") + "：" +
        ZBLevels.roots(C.level).map(r => mathHtml("x = " + ZBLevels.num(r))).join(" " + t("or") + " ");
      const fact = ZBLevels.factorisation(C.level);
      $("ctrlMark").innerHTML = markHtml("wrong", (fact ? [mathHtml(fact)] : []).concat([rootsLine]))
        + miniGraphHtml(C.level);
      ctrlStatus(t("reveal_wait"));
    }
  } else if (st.phase === "lobby") {
    if (C.id) ctrlStatus(t("ctrl_wait_start")); // a kicked phone keeps its notice
  } else if (st.phase === "end") {
    if (phaseChanged) ctrlEnd(st.results || []);
  }

  // private verdict feedback
  const v = (room.verdicts || {})[C.id];
  if (v && typeof v.seq === "number" && v.seq > C.lastVerdictSeq) {
    C.lastVerdictSeq = v.seq;
    applyCtrlVerdict(v);
  }
}

function applyCtrlVerdict(v) {
  if (!C.level) return;
  // verdicts are host-only by the rules; still never math-render a
  // non-numeric echo of what "we" submitted
  if (typeof v.v !== "number" || !isFinite(v.v)) return;
  if (v.already) {
    const who = v.claimedBy ? fmt("note_claimed_by", { name: escapeText(v.claimedBy) }) : "";
    $("ctrlMark").innerHTML = markHtml("info",
      [t("note_already") + "：" + mathHtml("x = " + ZBLevels.num(v.v)) + (who ? "，" + who : "")]);
    return;
  }
  if (v.echo) {
    // correct after the claim: full marks feedback, echo points
    tweenScore($("ctrlScore"), v.total);
    renderStreak($("ctrlStars"), v.streak);
    const who = v.claimedBy ? fmt("note_claimed_by", { name: escapeText(v.claimedBy) }) + " · " : "";
    const lines = ZBLevels.workingHit(C.level, v.v).map(mathHtml).concat([who + fmt("points_fmt", { n: v.pts })]);
    $("ctrlMark").innerHTML = markHtml("correct", lines);
    ZBFX.audio.boom(false);
    ZBFX.vibrate(50);
    return;
  }
  if (v.ok) {
    tweenScore($("ctrlScore"), v.total);
    renderStreak($("ctrlStars"), v.streak);
    const lines = ZBLevels.workingHit(C.level, v.v).map(mathHtml).concat([
      (v.hit > 1 ? t("note_both_down") + " " : "") + fmt("points_fmt", { n: v.pts }),
    ]);
    $("ctrlMark").innerHTML = markHtml("correct", lines);
    ctrlTakeover(v.pts);
    ZBFX.audio.boom(v.hit > 1);
    ZBFX.vibrate(v.hit > 1 ? [60, 40, 130] : 80);
  } else {
    renderStreak($("ctrlStars"), 0);
    const lines = ZBLevels.workingWrong(C.level, v.v).map(mathHtml)
      .concat([fmt("note_strength", { n: ZBLevels.strength(C.level, v.v) })]);
    $("ctrlMark").innerHTML = markHtml("wrong", lines);
    $("ctrlExpr").classList.add("mc-shake");
    setTimeout(() => $("ctrlExpr").classList.remove("mc-shake"), 400);
    ZBFX.audio.knock();
    ZBFX.vibrate(180);
    C.pad.lock(3);
  }
}

function ctrlEnd(results) {
  clearInterval(C.timerIv);
  const mine = results.find(r => r.id === C.id);
  const rank = results.findIndex(r => r.id === C.id) + 1;
  $("endScoreLabel").setAttribute("data-i18n", "your_score");
  $("endScoreLabel").textContent = t("your_score");
  $("endScore").textContent = "0";
  tweenScore($("endScore"), mine ? mine.score : 0, 900);
  renderStars($("endStars"), mine ? mine.stars : 0);
  staggerStars($("endStars"));
  // personal mini-report: rank, echo tally and fastest solve (batch T)
  const extras = mine
    ? [
        mine.echoes ? fmt("echo_tally", { n: mine.echoes }) : "",
        mine.best ? t("best_time_label") + " " + fmt("time_fmt", { s: (mine.best / 1000).toFixed(1) }) : "",
      ].filter(Boolean).join(" · ")
    : "";
  $("endRecord").innerHTML =
    (rank ? `<div class="mc-margin-note" style="margin-top:6px">${fmt("rank_fmt", { r: rank })}</div>` : "")
    + (extras ? `<div class="mc-margin-note">${extras}</div>` : "")
    + `<div class="zb-hostboard" style="max-width:none">${leaderboardHtml(results, C.id)}</div>`;
  $("btnRestart").style.display = "none";
  $("btnMenu").style.display = "none";
  refreshDynamicText();
  show("endScreen");
  endCeremonyAudio();
  ctrlStatus(t("thanks_playing"));
}

if (GameBridge.roomParam()) {
  initController();
} else {
  // this tab is the big stage (menu -> solo or host): the groove may
  // play here once a tier is set post-gesture; controllers never allow
  ZBFX.bgm.allow(true);
  // a host-side run snapshot in this tab offers 繼續上一場
  const savedRun = pendingHostRun();
  if (savedRun) {
    $("btnResume").style.display = "";
    $("btnResume").onclick = () => resumeRun(savedRun);
  }
}

/* language switch must also refresh composed text on static screens
 * (and re-split the freshly rewritten cover title) */
document.addEventListener("mc:lang", () => { refreshDynamicText(); stampTitle(); });
</script>
</body>
</html>
