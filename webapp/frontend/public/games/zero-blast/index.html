<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- ══════════════════════════════════════════════════════════════
       歸零爆破 Zero Blast — companion game pilot (SM901 / MAS901)
       Subtopic: zero-product property, (x−a)(x−b)=0 ⟺ x=a or x=b.
       Structures stand on factor pillars; correct codes zero a factor
       and drop its pillar; find the full solution set to demolish.
       See /docs/companion-games/zero-blast-plan.md.
       ══════════════════════════════════════════════════════════════ -->
  <title>歸零爆破 Zero Blast</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <script src="../shared/vendor/qrcode.js"></script>
  <script src="../shared/game-bridge.js"></script>
  <script src="levels.js"></script>
  <script src="fx.js"></script>
  <style>
    /* ---- game-specific styles: theme.css tokens only ---- */

    .zb-topline {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-bottom: 10px;
      font-family: var(--mc-mono); font-weight: 700;
    }
    .zb-topline__level { font-size: 13px; letter-spacing: 0.05em; color: var(--mc-ink-soft); }
    .zb-topline__level strong { color: var(--mc-red); }
    .zb-topline__right { display: flex; align-items: center; gap: 14px; }
    .zb-score { font-size: 15px; font-variant-numeric: tabular-nums; color: var(--mc-gold); }
    .zb-timer {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 19px; font-variant-numeric: tabular-nums;
    }
    .zb-timer svg { width: 15px; height: 15px; stroke: currentColor; }
    .zb-timer.warn { color: var(--mc-red); animation: zb-pulse 0.5s ease-in-out infinite; }
    @keyframes zb-pulse { 50% { opacity: 0.45; } }

    .zb-board {
      border: 1.5px solid var(--mc-ink); border-radius: var(--mc-r);
      background: var(--mc-paper-raised); box-shadow: var(--mc-shadow-sm);
      text-align: center; padding: 10px 12px; margin-bottom: 10px;
      font-family: var(--mc-mono); font-weight: 800;
      font-size: clamp(22px, 5.5vw, 34px); line-height: 1.25;
      font-variant-numeric: tabular-nums; letter-spacing: -0.01em;
    }
    .zb-board .zb-zero { color: var(--mc-red); }

    /* textbook maths: variables set in serif italic (like print),
       digits and operators stay in the worksheet mono */
    .zb-var {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic; font-weight: inherit;
      font-size: 1.06em; line-height: 1; padding-right: 0.02em;
    }
    .zb-struct .zb-vari { font-family: Georgia, "Times New Roman", serif; font-style: italic; }

    /* ---- the demolition scene ---- */
    .zb-scenewrap { position: relative; }
    .zb-scene {
      position: relative; width: 100%; aspect-ratio: 400 / 240;
      max-height: 300px; margin: 0 auto; overflow: hidden;
    }
    .zb-scene > svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .zb-scene > canvas { position: absolute; inset: 0; pointer-events: none; z-index: 2; }

    .zb-struct path, .zb-struct line { stroke: var(--mc-ink); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .zb-struct .thin { stroke-width: 1.2; }
    .zb-struct .faint { stroke: var(--mc-ink-faint); }
    .zb-struct text { fill: var(--mc-ink); }
    /* the half-fuse hint: a factor pencilled in faintly, not reveal ink */
    .zb-struct text.zb-hintghost { fill: var(--mc-ink-faint); opacity: 0; animation: zb-fadein 0.8s ease-out forwards; }
    .zb-struct .plaque { fill: var(--mc-paper-raised); }
    .zb-struct .tag { font-family: var(--mc-mono); font-size: 10px; letter-spacing: 0.12em; fill: var(--mc-ink-faint); }
    .zb-struct .plabel { font-family: var(--mc-mono); font-weight: 700; font-size: 13.5px; text-anchor: middle; }

    /* blueprint draw-on: every stroke normalised to pathLength=1.
     * .wait holds the draw until the level card has cleared. */
    .din { stroke-dasharray: 1; stroke-dashoffset: 1; animation: zb-draw 0.5s calc(var(--i, 0) * 55ms) ease-out forwards; }
    @keyframes zb-draw { to { stroke-dashoffset: 0; } }
    .zb-struct text.din2 { opacity: 0; animation: zb-fadein 0.4s calc(var(--i, 0) * 55ms) ease-out forwards; }
    @keyframes zb-fadein { to { opacity: 1; } }
    .zb-struct.wait .din { animation-delay: calc(var(--i, 0) * 55ms + 850ms); }
    .zb-struct.wait text.din2 { animation-delay: calc(var(--i, 0) * 55ms + 850ms); }

    .zb-pillar { transition: opacity 0.25s, transform 0.25s; }
    .zb-pillar.blown { opacity: 0; transform: translateY(8px); }
    .zb-rootmark {
      font-family: var(--mc-mono); font-style: italic; font-weight: 800;
      font-size: 16px; text-anchor: middle; fill: var(--mc-red);
      opacity: 0; transform-box: fill-box; transform-origin: center;
    }
    .zb-rootmark.show { animation: zb-ink 0.35s cubic-bezier(0.2, 1.5, 0.35, 1) forwards; }
    @keyframes zb-ink { from { opacity: 0; transform: scale(1.8) rotate(-6deg); } to { opacity: 1; transform: scale(1) rotate(-4deg); } }

    .zb-deck { transform-box: fill-box; transform-origin: center bottom; transition: transform 0.5s cubic-bezier(0.3, 1.4, 0.4, 1); }
    .zb-deck.sag-l { transform: rotate(-3.5deg) translateY(5px); }
    .zb-deck.sag-r { transform: rotate(3.5deg) translateY(5px); }
    /* collapse: the deck breaks into chunks, each tumbling on its own
       randomised drift / spin / delay (set as custom props at render) */
    .zb-chunk { transform-box: fill-box; transform-origin: center bottom; }
    .zb-deck.fall { transition: none; }
    .zb-deck.fall .zb-chunk { animation: zb-chunkfall 0.78s cubic-bezier(0.5, 0, 0.85, 0.4) var(--dd, 0ms) forwards; }
    @keyframes zb-chunkfall {
      30% { opacity: 1; }
      55% { transform: translate(calc(var(--tx, 0px) * 0.45), 24px) rotate(calc(var(--rot, 8deg) * 0.65)); }
      to { transform: translate(var(--tx, 0px), 66px) rotate(var(--rot, 8deg)); opacity: 0; }
    }
    /* fail state: the survivor takes the hit, settles, dusts itself off */
    .zb-deck.settle { animation: zb-settle 0.6s ease-out; }
    @keyframes zb-settle {
      0% { transform: translateY(0); }
      30% { transform: translateY(3.5px); }
      60% { transform: translateY(-1.2px); }
      100% { transform: translateY(0); }
    }
    /* idle life: hazard beacon on the building's highest point */
    .zb-hazard { fill: var(--mc-red); opacity: 0; animation: zb-haz 1.6s ease-in-out 1.2s infinite; }
    @keyframes zb-haz { 0%, 100% { opacity: 0.9; } 50% { opacity: 0.2; } }
    /* quiet tutor strip under the scene (host mode only) */
    .zb-tutorbar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 6px 0 2px; }
    .zb-tutorbtn {
      font-family: var(--mc-mono); font-size: 13px; font-weight: 700;
      padding: 5px 14px; opacity: 0.75;
    }
    .zb-tutorbtn:hover { opacity: 1; }
    .zb-tutorbtn.confirm { border-color: var(--mc-red); color: var(--mc-red); opacity: 1; }
    .zb-tutorkeys {
      width: 100%; text-align: center; margin-top: -4px;
      font-family: var(--mc-mono); font-size: 10.5px; letter-spacing: 0.22em;
      color: var(--mc-ink-faint);
    }
    /* +15s gift, stamped over the scene so the class notices */
    .zb-plusflash {
      position: absolute; inset: 0; z-index: 4;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      font-family: var(--mc-mono); font-weight: 800;
      font-size: clamp(34px, 6vw, 54px); color: var(--mc-red);
      text-shadow: 0 0 14px var(--mc-paper);
      animation: zb-plusflash 1.5s ease-out forwards;
    }
    @keyframes zb-plusflash {
      0% { opacity: 0; transform: translateY(14px) scale(0.85) rotate(-3deg); }
      16% { opacity: 1; transform: translateY(0) scale(1) rotate(-3deg); }
      70% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-18px) rotate(-3deg); }
    }

    /* grace window: all pillars down, the whole blueprint trembles */
    .zb-scene.critical > .zb-struct { animation: zb-tremble 0.16s linear infinite; }
    @keyframes zb-tremble {
      25% { transform: translate(0.8px, -0.5px) rotate(0.12deg); }
      75% { transform: translate(-0.8px, 0.5px) rotate(-0.12deg); }
    }

    .zb-rubble { visibility: hidden; transform-box: fill-box; transform-origin: center bottom; }
    .zb-rubble.show { visibility: visible; }
    .zb-rubble.show path { stroke-dasharray: 1; stroke-dashoffset: 1; animation: zb-draw 0.4s ease-out forwards; }
    /* the landing chop packs the pile down */
    .zb-rubble.compact { animation: zb-compact 0.3s ease-out both; }
    @keyframes zb-compact {
      40% { transform: scaleY(0.78); }
      100% { transform: scaleY(0.88); }
    }

    /* the 拆 demolition stamp: slammed onto the rubble, not mid-sky */
    .zb-scenestamp {
      position: absolute; inset: 0; z-index: 3; display: none;
      align-items: center; justify-content: flex-end; flex-direction: column; gap: 6px;
      padding-bottom: 2.5%;
      pointer-events: none;
    }
    .zb-scenestamp.show { display: flex; }
    /* one-frame paper flash behind the chop at the moment it lands */
    .zb-chaiflash {
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 76%, var(--mc-paper) 0%, transparent 46%);
      opacity: 0; animation: zb-chaiflash 0.5s ease-out both;
    }
    @keyframes zb-chaiflash {
      0%, 50% { opacity: 0; }
      58% { opacity: 0.95; }
      100% { opacity: 0; }
    }
    .zb-chai {
      width: 92px; height: 92px; border: 4px solid var(--mc-red); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--mc-red); font-weight: 900; font-size: 54px; line-height: 1;
      font-family: var(--mc-body);
      background: color-mix(in srgb, var(--mc-paper) 78%, transparent);
      box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--mc-red) 30%, transparent);
      transform: rotate(-8deg);
      animation: zb-chaislam 0.5s cubic-bezier(0.3, 0, 0.4, 1) both;
    }
    @keyframes zb-chaislam {
      0% { opacity: 0; transform: rotate(-8deg) scale(2.4) translateY(-40px); }
      55% { opacity: 1; transform: rotate(-8deg) scale(0.94) translateY(0); }
      72% { transform: rotate(-8deg) scale(1.06); }
      100% { transform: rotate(-8deg) scale(1); }
    }
    .zb-scenestamp .zb-chai__cap {
      font-family: var(--mc-mono); font-weight: 800; font-size: 14px; letter-spacing: 0.12em;
      color: var(--mc-red); background: color-mix(in srgb, var(--mc-paper) 82%, transparent);
      padding: 2px 10px; border-radius: 4px; transform: rotate(-3deg);
      animation: zb-capin 0.3s 0.3s cubic-bezier(0.2, 1.5, 0.35, 1) both;
    }
    @keyframes zb-capin {
      from { opacity: 0; transform: rotate(-3deg) translateY(6px); }
      to { opacity: 1; transform: rotate(-3deg); }
    }

    /* fail state: the building is condemned, not boxed. A rotated chop
     * in the corner and red tape across the structure; the working
     * lives in the mark zone. */
    .zb-scenestamp .zb-condemn {
      position: absolute; top: 4%; right: 3%;
      font-family: var(--mc-mono); font-weight: 800; font-size: 15px; letter-spacing: 0.1em;
      color: var(--mc-red); border: 2.5px solid var(--mc-red); border-radius: 4px;
      padding: 3px 10px; transform: rotate(6deg);
      background: color-mix(in srgb, var(--mc-paper) 80%, transparent);
      box-shadow: inset 0 0 0 1.5px color-mix(in srgb, var(--mc-red) 30%, transparent);
      animation: mc-stamp-in 0.35s cubic-bezier(0.2, 1.5, 0.35, 1) both;
    }
    .zb-struct .zb-tape path {
      stroke: var(--mc-red); stroke-width: 10; opacity: 0.28; stroke-linecap: butt;
      stroke-dasharray: 1; stroke-dashoffset: 1; animation: zb-draw 0.4s ease-out forwards;
    }
    .zb-struct .zb-tape path:last-child { animation-delay: 0.18s; }

    /* +N 分 ink numeral floating from the building to the score */
    .zb-floatpts {
      position: absolute; top: 52%; z-index: 4;
      font-family: var(--mc-mono); font-weight: 800; font-size: 20px; color: var(--mc-ink);
      text-shadow: 0 0 10px var(--mc-paper), 0 0 4px var(--mc-paper);
      pointer-events: none; white-space: nowrap;
      animation: zb-floatpts 0.95s cubic-bezier(0.4, 0, 0.7, 0.4) forwards;
    }
    @keyframes zb-floatpts {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); }
      18% { opacity: 1; transform: translate(-50%, -70%) scale(1); }
      100% { opacity: 0; transform: translate(calc(-50% + var(--fdx, 0px)), calc(-50% + var(--fdy, -80px))) scale(0.5); }
    }

    /* level intro card, flashed over the scene */
    .zb-levelcard {
      position: absolute; inset: 0; z-index: 4; display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      text-align: center; pointer-events: none;
    }
    .zb-levelcard.show { display: flex; animation: zb-card 1.2s ease-in-out both; }
    .zb-levelcard__n {
      font-family: var(--mc-display); font-size: 34px; letter-spacing: 0.02em;
      background: color-mix(in srgb, var(--mc-paper) 85%, transparent); padding: 0 14px; border-radius: 6px;
    }
    .zb-levelcard__sub {
      font-weight: 700; font-size: 16px; color: var(--mc-red);
      background: color-mix(in srgb, var(--mc-paper) 85%, transparent); padding: 0 12px; border-radius: 6px;
    }
    /* finale street: the teacher's pen stamps the stakes on the card */
    .zb-levelcard__finale {
      font-family: var(--mc-mono); font-weight: 800; font-size: 13.5px; letter-spacing: 0.06em;
      color: var(--mc-paper); background: var(--mc-red);
      padding: 3px 12px; border-radius: 5px; transform: rotate(-2deg); margin-top: 4px;
    }
    @keyframes zb-card {
      0% { opacity: 0; transform: scale(1.12); }
      14% { opacity: 1; transform: scale(1); }
      78% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ---- marking + keypad ---- */
    .zb-mark { min-height: 96px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 6px 0; }
    .zb-mark .mc-margin-note { line-height: 1.5; }

    .zb-padwrap { position: relative; max-width: 340px; margin: 0 auto; }
    .zb-preview {
      text-align: center; font-family: var(--mc-mono); font-weight: 700; font-size: 15px;
      color: var(--mc-ink-faint); margin-bottom: 8px; min-height: 22px;
    }
    .zb-preview .neg { color: var(--mc-red); }
    /* a staged value awaiting its commit window reads in full ink */
    .zb-preview.armed { color: var(--mc-ink); }
    .zb-pad { display: grid; grid-template-columns: repeat(3, 1fr) 0.85fr; gap: 9px; }
    .zb-key {
      min-height: 52px; border: 1.5px solid var(--mc-ink); border-radius: var(--mc-r);
      background: var(--mc-paper-raised); color: var(--mc-ink);
      font-family: var(--mc-mono); font-size: 22px; font-weight: 700;
      cursor: pointer; box-shadow: 0 2px 0 var(--mc-ink);
      transition: transform 0.1s, box-shadow 0.1s, background 0.15s;
      touch-action: manipulation;
    }
    .zb-key:active { transform: translateY(2px); box-shadow: 0 0 0 var(--mc-ink); }
    .zb-key:focus-visible { outline: 2.5px solid var(--mc-red); outline-offset: 2px; }
    .zb-key:disabled { opacity: 0.45; cursor: not-allowed; }
    .zb-key--sign { grid-column: 4; grid-row: 1 / 4; font-size: 30px; }
    .zb-key--sign[aria-pressed="true"] {
      background: var(--mc-red-wash); border-color: var(--mc-red); color: var(--mc-red);
      box-shadow: 0 2px 0 var(--mc-red);
    }
    .zb-key--zero { grid-column: 1 / 4; }

    /* 3-second relock after a wrong code: think, don't spam */
    .zb-lock {
      position: absolute; inset: 0; z-index: 5; display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 2px;
      border-radius: var(--mc-r);
      background: color-mix(in srgb, var(--mc-paper) 82%, transparent);
      backdrop-filter: blur(1.5px);
    }
    .zb-lock.show { display: flex; }
    /* pencil-drawn sweep that unwinds around the relock countdown */
    .zb-lock__ring { position: relative; width: 66px; height: 66px; display: flex; align-items: center; justify-content: center; }
    .zb-lock__ring svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-88deg); }
    .zb-lock__ring circle { fill: none; stroke: var(--mc-ink-soft); stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 1; stroke-dashoffset: 0; }
    @keyframes zb-locksweep { to { stroke-dashoffset: 1; } }
    .zb-lock__n { font-family: var(--mc-mono); font-weight: 800; font-size: 28px; color: var(--mc-red); font-variant-numeric: tabular-nums; }
    .zb-lock__hint { font-size: 14px; font-weight: 700; color: var(--mc-ink-soft); }

    /* ---- end screen record table ---- */
    .zb-record { display: grid; gap: 0; margin: 14px 0 6px; }
    .zb-record__row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 4px; border-bottom: 1px dashed var(--mc-line);
      font-size: 15px;
    }
    .zb-record__row:last-child { border-bottom: none; }
    .zb-record__lv { font-family: var(--mc-mono); font-weight: 700; font-size: 12.5px; color: var(--mc-ink-faint); width: 30px; }
    .zb-record__name { flex: 1; font-weight: 600; text-align: left; line-height: 1.3; }
    .zb-record__name small { display: block; font-size: 12px; font-weight: 500; color: var(--mc-ink-faint); }
    .zb-record__mark { width: 22px; height: 22px; }
    .zb-record__mark svg { width: 100%; height: 100%; }
    .zb-record__mark .ok { stroke: var(--mc-correct); }
    .zb-record__mark .no { stroke: var(--mc-red); }
    .zb-record__pts { font-family: var(--mc-mono); font-weight: 700; font-size: 13px; font-variant-numeric: tabular-nums; color: var(--mc-ink-soft); text-align: right; white-space: nowrap; }

    .zb-takeaway-formula {
      font-family: var(--mc-mono); font-weight: 800; font-size: clamp(16px, 4.5vw, 21px);
      text-align: center; margin: 4px 0 2px; letter-spacing: -0.01em;
    }
    .zb-takeaway-formula .zb-zero { color: var(--mc-red); }

    /* ---- multi-device bits ---- */
    .zb-claimname {
      font-family: var(--mc-mono); font-weight: 700; font-size: 11px;
      text-anchor: middle; fill: var(--mc-red); opacity: 0;
    }
    .zb-claimname.show { animation: zb-fadein 0.3s 0.15s ease-out forwards; }
    .zb-echotally {
      font-family: var(--mc-mono); font-weight: 700; font-size: 9.5px;
      text-anchor: middle; fill: var(--mc-red); opacity: 0.8;
    }
    .zb-playerlist { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .zb-playerlist span {
      font-family: var(--mc-mono); font-weight: 700; font-size: 13.5px;
      border: 1.5px solid var(--mc-ink); border-radius: var(--mc-r);
      background: var(--mc-paper-raised); padding: 5px 12px;
      animation: mc-pop 0.3s cubic-bezier(0.2, 1.5, 0.35, 1) both;
      cursor: pointer; user-select: none;
    }
    /* armed for removal: one more tap kicks the player */
    .zb-playerlist span.arm { border-color: var(--mc-red); color: var(--mc-red); }
    /* quiet count of players with no points this round (no names) */
    .zb-strugglers {
      text-align: center; font-family: var(--mc-mono); font-size: 12px;
      font-weight: 700; color: var(--mc-ink-faint); margin-top: 4px;
    }
    .zb-hostboard { max-width: 340px; margin: 4px auto 0; }
    .zb-hostboard__row {
      display: flex; align-items: baseline; gap: 10px;
      font-family: var(--mc-mono); font-size: 14.5px; font-weight: 700;
      padding: 5px 6px; border-bottom: 1px dashed var(--mc-line);
      font-variant-numeric: tabular-nums;
    }
    .zb-hostboard__row:last-child { border-bottom: none; }
    .zb-hostboard__rank { color: var(--mc-ink-faint); font-size: 12px; width: 20px; }
    .zb-hostboard__name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .zb-hostboard__pts { color: var(--mc-gold); }
    .zb-hostboard__row.me .zb-hostboard__name { color: var(--mc-red); }

    /* streak multiplier chip: the ×1.x everyone is actually earning */
    .zb-mult {
      display: inline-block; font-family: var(--mc-mono); font-weight: 800;
      font-size: 12.5px; line-height: 1.5; color: var(--mc-gold);
      border: 1.5px solid currentColor; border-radius: 4px; padding: 0 6px;
      margin-left: 8px; vertical-align: middle;
    }
    .zb-mult.pop { animation: zb-multpop 0.5s cubic-bezier(0.2, 1.5, 0.35, 1); }
    /* a grown multiplier flashes gold before settling back to outline */
    @keyframes zb-multpop {
      0% { transform: scale(1.6); background: var(--mc-gold); color: var(--mc-paper); }
      55% { background: var(--mc-gold); color: var(--mc-paper); }
      100% { transform: scale(1); }
    }
    .zb-hostboard__row .zb-mult { font-size: 11px; margin-left: 0; }
    /* each NEW star stamps in; earlier stars hold still (renderStreak
     * suppresses their re-mount pop) */
    .mc-stars svg.zb-starnew { animation: zb-starstamp 0.5s cubic-bezier(0.2, 1.5, 0.35, 1) both; }
    @keyframes zb-starstamp {
      from { transform: scale(2.1) rotate(-30deg); opacity: 0; }
      to { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* dark chalkboard: the burning fuse blooms */
    [data-theme="dark"] .zb-struct #fuseGlow,
    :root[data-theme="dark"] .zb-struct #fuseGlow { opacity: 0.55; r: 9px; filter: blur(3px); }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .zb-struct #fuseGlow { opacity: 0.55; r: 9px; filter: blur(3px); }
    }

    /* reduced motion: theme.css kills all animations, so every draw-on
       stroke must still end visible, and the fallen deck must still clear */
    @media (prefers-reduced-motion: reduce) {
      .din, .zb-rubble.show path, .zb-struct .zb-tape path { stroke-dashoffset: 0 !important; }
      .din2, .zb-rootmark.show { opacity: 1 !important; }
      .zb-deck.fall { opacity: 0; }
      .zb-floatpts { display: none; }
    }

    /* projector (host on a wide screen): the scene is the star.
     * Applied on .mc-stage when hosting on a >=1100px viewport. */
    .zb-stage--projector { max-width: 1150px; }
    .zb-stage--projector .zb-game-grid {
      display: grid; grid-template-columns: 1.7fr 1fr; gap: 4px 32px; align-items: start;
    }
    .zb-stage--projector .zb-scene {
      /* ~60vh tall, aspect kept so canvas FX stay aligned with the SVG */
      width: min(100%, calc(60vh * 1.6667));
      max-height: none; margin: 0 auto;
    }
    .zb-stage--projector .zb-board { font-size: clamp(30px, 3.4vw, 46px); padding: 14px 16px; }
    .zb-stage--projector .zb-topline__level { font-size: 16px; }
    .zb-stage--projector .zb-timer { font-size: 30px; }
    .zb-stage--projector .zb-score { font-size: 20px; }
    .zb-stage--projector .zb-hostboard { max-width: none; }
    .zb-stage--projector .zb-hostboard__row { font-size: 18px; padding: 8px 10px; }
    .zb-stage--projector .zb-mark { min-height: 120px; }
    .zb-stage--projector .zb-floatpts { font-size: 30px; }
    /* full-hall screens: fill the leaderboard column, less empty cream */
    @media (min-width: 1700px) {
      .zb-stage--projector { max-width: 1400px; }
      .zb-stage--projector .zb-hostboard__row { font-size: 22px; padding: 10px 14px; }
      .zb-stage--projector .zb-timer { font-size: 34px; }
    }

    /* compact phones: keep the keypad reachable without hunting */
    @media (max-height: 780px) {
      .zb-scene { max-height: 200px; }
      .zb-mark { min-height: 76px; }
      .zb-key { min-height: 48px; }
    }
    /* tall phones: let the scene grow into the dead space */
    @media (min-height: 800px) {
      .zb-scene { max-height: 340px; }
    }
    /* landscape phones: scene left, controls right */
    @media (orientation: landscape) and (max-height: 520px) {
      .zb-game-grid { display: grid; grid-template-columns: 1.15fr 1fr; gap: 0 18px; align-items: start; }
      .zb-game-grid > .zb-col-l { grid-column: 1; }
      .zb-game-grid > .zb-col-r { grid-column: 2; }
      .zb-scene { max-height: 210px; }
      .zb-mark { min-height: 64px; }
    }
  </style>
</head>

/* ══════════════════════════════════════════════════════════════════
 * scene rendering — blueprint structures drawn on the graph paper
 * ══════════════════════════════════════════════════════════════════ */

const GROUND = 210, DECK_Y = 150;
let drawIdx = 0;
function P(d, cls) {
  return `<path d="${d}" pathLength="1" class="din ${cls || ""}" style="--i:${drawIdx++}"/>`;
}
function T(x, y, cls, content, extra) {
  return `<text x="${x}" y="${y}" class="din2 ${cls || ""}" style="--i:${drawIdx++}" ${extra || ""}>${content}</text>`;
}

/* kind 6's unknown factor: a hand-drawn ?, deliberate rather than an
 * empty plaque. Removed by revealPlaque when the factor shows. */
function qmarkSvg(cx, id) {
  return `<g class="zb-qmark" data-qmark="${id}" transform="rotate(-5 ${cx} 172)">
    ${P(`M${cx - 4.5} 168.5 Q${cx - 4.5} 163.5 ${cx} 163.5 Q${cx + 5} 163.5 ${cx + 5} 168 Q${cx + 5} 171.5 ${cx + 1} 172.5 L${cx + 0.6} 175.5`)}
    ${P(`M${cx + 0.5} 179.5 l0.2 0.2`)}
  </g>`;
}

function pillarSvg(cx, p) {
  const l = cx - 11, r = cx + 11;
  const isQ = p.label === "?";
  return `<g class="zb-pillar" data-id="${p.id}">
    ${P(`M${l} ${DECK_Y} V${GROUND}`)}
    ${P(`M${r} ${DECK_Y} V${GROUND}`)}
    ${P(`M${l} 158 L${r} 176 M${r} 158 L${l} 176`, "thin")}
    ${P(`M${l} 188 L${r} 206 M${r} 188 L${l} 206`, "thin")}
    ${P(`M${cx - 31} 162 h62 v22 h-62 z`, "plaque-border")}
    ${isQ ? qmarkSvg(cx, p.id) : ""}
    ${T(cx, 178, "plabel", isQ ? "" : svgMath(p.label), `data-plaque="${p.id}"`)}
  </g>
  <text x="${cx}" y="178" class="zb-rootmark" data-for="${p.id}"></text>`;
}

/* pulsing hazard dot on the building's highest point */
function haz(cx, cy) {
  return `<circle class="zb-hazard" cx="${cx}" cy="${cy}" r="2.6"/>`;
}

/* per-level building silhouettes, all standing on the pillar deck.
 * Returned as an ordered list of parts (roughly bottom-up) so the
 * collapse can break the deck into separately tumbling chunks. */
function deckParts(level, xs) {
  const lo = Math.min(...xs) - 42, hi = Math.max(...xs) + 42;
  const beam = P(`M${lo} ${DECK_Y} h${hi - lo} M${lo} ${DECK_Y - 8} h${hi - lo}`);
  switch (level.n) {
    case 1: return [beam,
      P("M172 142 h56 v-38 h-56 z"),
      P("M172 118 h56 M172 130 h56", "thin"),
      T(200, 132, "plabel", "×" + level.konst),
      P("M168 104 L200 88 L232 104") + haz(200, 85)];
    case 2: return [beam,
      P("M166 142 V104 h68 V142"),
      P("M212 142 v-24 h14 v24", "thin"),
      P("M176 116 h14 v12 h-14 z", "thin"),
      P("M160 106 L200 78 L240 106") + haz(200, 75)];
    case 3: return [beam,
      P("M124 142 V70 h152 V142"),
      P("M138 118 h18 v14 h-18 z M234 118 h18 v14 h-18 z", "thin"),
      P("M124 106 h152", "thin"),
      P("M138 82 h18 v14 h-18 z M186 82 h18 v14 h-18 z M234 82 h18 v14 h-18 z", "thin"),
      P("M124 70 L138 58 h124 L276 70", "thin") + haz(200, 55)];
    case 4: return [beam,
      P(`M${xs[0] - 16} 142 V120 h32 V142 M${xs[1] - 16} 142 V120 h32 V142`),
      P("M104 142 h192", "thin"),
      P(`M${xs[0]} 120 V96 M${xs[1]} 120 V96`),
      P(`M${xs[0]} 118 Q200 88 ${xs[1]} 118`, "thin"),
      P(`M${xs[0]} 96 Q200 64 ${xs[1]} 96`) + haz(200, 78)];
    case 5: return [beam,
      P("M182 142 L188 44 h24 L218 142"),
      P("M184 118 h32 M186 92 h28 M187 68 h26", "thin"),
      P("M188 44 h24 v-10 h-24 z", "thin") + haz(200, 31)];
    case 6: return [beam,
      P("M132 142 V64 h136 V142"),
      P("M144 122 h16 v10 h-16 z M240 122 h16 v10 h-16 z", "thin"),
      P("M144 100 h16 v10 h-16 z M186 100 h28 v10 h-28 z M240 100 h16 v10 h-16 z", "thin"),
      P("M144 78 h16 v10 h-16 z M186 78 h28 v10 h-28 z M240 78 h16 v10 h-16 z", "thin"),
      P("M156 64 V34 h88 V64"),
      P("M168 44 h64 M168 54 h64", "thin"),
      P("M200 34 V12") + haz(200, 10)];
  }
  return [beam];
}

/* group the parts into 3-4 chunks, each with its own randomised
 * tumble (drift / rotation / delay via CSS custom props) */
function chunkDeck(parts) {
  const n = Math.min(4, Math.max(2, Math.ceil(parts.length / 2)));
  const groups = Array.from({ length: n }, () => []);
  parts.forEach((p, i) => groups[Math.min(Math.floor(i * n / parts.length), n - 1)].push(p));
  const sgn = () => (Math.random() < 0.5 ? -1 : 1);
  return groups.map(g => {
    // guaranteed minimum drift/spin so every chunk visibly tumbles
    const tx = (sgn() * (6 + Math.random() * 10)).toFixed(1);
    const rot = (sgn() * (8 + Math.random() * 14)).toFixed(1);
    const dd = Math.round(Math.random() * 140);
    return `<g class="zb-chunk" style="--tx:${tx}px;--rot:${rot}deg;--dd:${dd}ms">${g.join("")}</g>`;
  }).join("");
}

function rubbleSvg(xs) {
  const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
  const w = Math.max(90, (Math.max(...xs) - Math.min(...xs)) + 110);
  const l = cx - w / 2, r = cx + w / 2;
  return `<g class="zb-rubble" id="rubble">
    <path pathLength="1" d="M${l} ${GROUND} L${l + w * 0.16} ${GROUND - 16} L${l + w * 0.3} ${GROUND - 8} L${cx} ${GROUND - 26} L${l + w * 0.68} ${GROUND - 10} L${l + w * 0.84} ${GROUND - 18} L${r} ${GROUND}"/>
    <path pathLength="1" class="thin" d="M${cx - 26} ${GROUND - 9} l10 -7 l7 7 M${cx + 12} ${GROUND - 14} l9 -5 M${l + 12} ${GROUND - 5} l8 -5"/>
  </g>`;
}

function sceneStatics(level, xs) {
  const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
  let hatch = "";
  for (let x = 20; x < 390; x += 24) hatch += `M${x} ${GROUND} l-8 9 `;
  // fuse: detonator bottom-left, hand-drawn line to the structure base
  const fuseD = `M46 202 C 96 226, 132 188, ${cx - 52} 218 S ${cx - 10} 214, ${cx} 209`;
  return P(`M8 ${GROUND} H392`)
    + P(hatch, "thin faint")
    + `<path d="M${cx} 20 V${GROUND}" class="thin faint" stroke-dasharray="7 4 2 4"/>`
    + T(16, 26, "tag", "圖則 PLAN " + String(level.seq).padStart(2, "0") + "/" + String(level.total).padStart(2, "0"))
    + P("M14 32 h64", "thin faint")
    + P("M22 190 h24 v14 h-24 z M34 190 v-9 M26 181 h16")
    + `<path id="fusePath" d="${fuseD}" class="thin" style="stroke:var(--mc-red);opacity:0.85"/>`
    + `<circle id="fuseGlow" r="6.5" fill="var(--mc-red)" opacity="0.25"/>`
    + `<circle id="fuseSpark" r="3.2" fill="var(--mc-red)"/>`;
}

/* round 2+ variety: mirror the silhouette (never kind 1, its deck
 * carries text) and jitter width/height a few percent, deterministic
 * per building so host and screenshots agree */
function variantTransform(level) {
  if (level.round <= 1) return "";
  const h = (level.seq * 2654435761) >>> 0;
  const jx = 1 + ((h % 1000) / 1000 - 0.5) * 0.16;          // ±8% width
  const jy = 1 + (((h >> 10) % 1000) / 1000 - 0.5) * 0.12;  // ±6% height
  const mirror = level.n !== 1 && level.seq % 2 === 0 ? -1 : 1;
  return `translate(200 ${DECK_Y}) scale(${(mirror * jx).toFixed(3)} ${jy.toFixed(3)}) translate(-200 -${DECK_Y})`;
}

function renderStructure(level) {
  drawIdx = 0;
  const xs = level.pillars.length === 1 ? [200] : (level.n === 5 ? [170, 230] : [140, 260]);
  const svg = $("structSvg");
  const vt = variantTransform(level);
  svg.classList.add("wait"); // draw-in holds until the level card clears
  svg.innerHTML =
    sceneStatics(level, xs)
    + rubbleSvg(xs)
    + `<g class="zb-deck" id="deck"><g${vt ? ` transform="${vt}"` : ""}>${chunkDeck(deckParts(level, xs))}</g></g>`
    + level.pillars.map((p, i) => pillarSvg(xs[i], p)).join("");
  return xs;
}

/* set the variable in textbook italic. Only ever applied to strings
 * from ZBLevels (never to player names, which may contain an x). */
function mathHtml(s) {
  return String(s).replace(/x/g, '<i class="zb-var">x</i>');
}
function svgMath(s) {
  return String(s).replace(/x/g, '<tspan class="zb-vari">x</tspan>');
}
function exprHtml(expr) {
  return mathHtml(expr).replace(/= 0$/, '= <span class="zb-zero">0</span>');
}

function starSvg() {
  return '<svg viewBox="0 0 20 20"><path d="M10 1.5l2.5 5.4 5.9 0.7-4.4 4 1.2 5.8-5.2-2.9-5.2 2.9 1.2-5.8-4.4-4 5.9-0.7z"/></svg>';
}
function renderStars(el, n) {
  el.innerHTML = n <= 6 ? starSvg().repeat(n)
                        : starSvg() + `<span class="mc-stars__count">×${n}</span>`;
}

/* the ×1.x chip: same formula as ZBLevels.points' streak multiplier */
function multHtml(streak) {
  if (!streak) return "";
  return `<span class="zb-mult">×${(1 + 0.1 * Math.min(streak, 10)).toFixed(1)}</span>`;
}
/* stars + multiplier chip for live streak displays (not end totals).
 * Only the NEW star stamps in; the rest hold still (renderStars
 * re-mounts every svg, which would re-pop them all). The grown chip
 * flashes gold. */
function renderStreak(el, n) {
  const prev = parseInt(el.dataset.streak || "0", 10);
  renderStars(el, n);
  el.insertAdjacentHTML("beforeend", multHtml(n));
  el.dataset.streak = n;
  const svgs = el.querySelectorAll("svg");
  svgs.forEach((s, i) => {
    if (n > prev && i === svgs.length - 1) s.classList.add("zb-starnew");
    else s.style.animation = "none";
  });
  if (n > prev) {
    const m = el.querySelector(".zb-mult");
    if (m) m.classList.add("pop");
  }
}

/* the displayed score counts up to the judged total (G.score itself
 * always moves exactly); reduced motion snaps */
function tweenScore(el, to) {
  cancelAnimationFrame(el._tw);
  const from = parseInt(String(el.textContent).replace(/[^\d-]/g, ""), 10) || 0;
  if (ZBFX.reduced || to === from) { el.textContent = to; return; }
  const t0 = performance.now(), ms = 550;
  const step = now => {
    const k = Math.min(1, (now - t0) / ms);
    el.textContent = Math.round(from + (to - from) * (1 - Math.pow(1 - k, 3)));
    if (k < 1) el._tw = requestAnimationFrame(step);
  };
  el._tw = requestAnimationFrame(step);
}

/* +N 分 ink numeral floating from the claimed pillar toward the score
 * (solo) or the leaderboard (host) */
function floatPoints(pts, vbX) {
  if (ZBFX.reduced) return;
  const scene = $("scene");
  const el = document.createElement("div");
  el.className = "zb-floatpts";
  el.textContent = fmt("points_fmt", { n: pts });
  el.style.left = (vbX / VB_W * 100).toFixed(1) + "%";
  const target = G.mode === "solo" ? $("scoreBox") : $("hostBoard");
  const c = scene.getBoundingClientRect();
  const s = target.getBoundingClientRect();
  if (c.width && s.width) {
    const x0 = c.left + (vbX / VB_W) * c.width, y0 = c.top + 0.52 * c.height;
    el.style.setProperty("--fdx", (s.left + s.width / 2 - x0).toFixed(0) + "px");
    el.style.setProperty("--fdy", (s.top - y0).toFixed(0) + "px");
  }
  scene.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function markHtml(kind, lines) {
  // kind: correct | wrong | info
  const stampKey = kind === "correct" ? "stamp_correct" : "stamp_wrong";
  const ink = kind === "correct"
    ? '<path d="M4 13l5.5 5.5L20 6.5"/>'
    : '<path d="M6 6l12 12"/><path d="M18 6L6 18"/>';
  const noteCls = kind === "correct" ? "mc-margin-note--correct" : "";
  const stamp = kind === "info" ? "" : `
    <div class="mc-stamp ${kind === "correct" ? "mc-stamp--correct" : ""}">
      <svg class="draw" viewBox="0 0 24 24" style="width:22px;height:22px" fill="none"
           stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${ink}</svg>
      <span>${t(stampKey)}</span>
    </div>`;
  return stamp + lines.map(l => `<div class="mc-margin-note ${noteCls}">${l}</div>`).join("");
}

/* keypad factory: builds handlers around a submit(v) callback.
 * The sign key latches. A digit tap ARMS the value for ~400ms before
 * it commits, so a finger slip isn't a maths error: tapping − inside
 * the window flips the staged sign, tapping the same digit again
 * commits instantly (fast players lose nothing). */
function makePad(padEl, previewEl, lockEl, lockCountEl, submit) {
  let neg = false;
  let locked = false;
  let lockTimer = null;
  let armed = null; // { v } — staged value awaiting the commit window
  let armTimer = null;
  const ARM_MS = 400;
  const signKey = padEl.querySelector(".zb-key--sign");

  function renderPreview() {
    if (armed) {
      previewEl.innerHTML = '<i class="zb-var">x</i>&nbsp;=&nbsp;' +
        (armed.v < 0 ? '<span class="neg">−</span>' : "") + Math.abs(armed.v);
      previewEl.classList.add("armed");
    } else {
      previewEl.innerHTML = '<i class="zb-var">x</i>&nbsp;=&nbsp;' + (neg ? '<span class="neg">−</span>' : "") + "▢";
      previewEl.classList.remove("armed");
    }
  }
  renderPreview();

  function disarm() {
    clearTimeout(armTimer);
    armed = null;
  }
  function commit() {
    if (!armed) return;
    const v = armed.v;
    disarm();
    renderPreview();
    submit(v);
  }

  padEl.addEventListener("click", e => {
    const key = e.target.closest(".zb-key");
    if (!key || locked) return;
    ZBFX.audio.unlock();
    if (key === signKey) {
      if (armed) {
        // slip forgiveness: flip the staged sign, the window restarts
        armed.v = -armed.v;
        clearTimeout(armTimer);
        armTimer = setTimeout(commit, ARM_MS);
      } else {
        neg = !neg;
        signKey.setAttribute("aria-pressed", neg);
      }
      ZBFX.audio.click();
      renderPreview();
      return;
    }
    const d = parseInt(key.dataset.d, 10);
    ZBFX.audio.click();
    if (armed && Math.abs(armed.v) === d) { commit(); return; } // same digit again: go now
    const v = neg ? -d : d;
    neg = false;
    signKey.setAttribute("aria-pressed", "false");
    armed = { v: v };
    clearTimeout(armTimer);
    armTimer = setTimeout(commit, ARM_MS);
    renderPreview();
  });

  return {
    lock(seconds) {
      disarm();
      locked = true;
      padEl.querySelectorAll(".zb-key").forEach(k => k.disabled = true);
      lockEl.classList.add("show");
      // the pencil ring unwinds over the whole lock
      const ring = lockEl.querySelector(".zb-lock__ring circle");
      if (ring) {
        ring.style.animation = "none";
        void ring.getBoundingClientRect();
        ring.style.animation = `zb-locksweep ${seconds}s linear forwards`;
      }
      let left = seconds;
      lockCountEl.textContent = left;
      clearInterval(lockTimer);
      lockTimer = setInterval(() => {
        left -= 1;
        if (left <= 0) { this.unlock(); }
        else lockCountEl.textContent = left;
      }, 1000);
    },
    unlock() {
      clearInterval(lockTimer);
      locked = false;
      padEl.querySelectorAll(".zb-key").forEach(k => k.disabled = false);
      lockEl.classList.remove("show");
    },
    disable() {
      disarm();
      locked = true;
      padEl.querySelectorAll(".zb-key").forEach(k => k.disabled = true);
    },
    enable() {
      clearInterval(lockTimer);
      disarm();
      locked = false;
      neg = false;
      signKey.setAttribute("aria-pressed", "false");
      renderPreview();
      padEl.querySelectorAll(".zb-key").forEach(k => k.disabled = false);
      lockEl.classList.remove("show");
    },
  };
}
