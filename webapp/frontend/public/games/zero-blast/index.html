function atmosphereSvg() {
  return `<g class="zb-atmo">`
    + P(`M330 ${GROUND} v-24 h14 v24`, "thin faint")
    + P(`M390 ${GROUND} v-14 h6`, "thin faint")
    + P(`M372 ${GROUND} V118 M366 ${GROUND} h12`, "thin faint")
    + P("M352 124 H392 M372 118 V112 M372 112 L354 123 M372 112 L390 123", "thin faint")
    + P("M386 124 v7 h5 v-7", "thin faint")
    + `<g class="zb-crane__hook">${P("M357 124 v13", "thin faint")}${P("M357 137 q-2.5 3 0 5 q3 2 3.5 -1", "thin faint")}</g>`
    + `<g class="zb-cloud zb-cloud--a">${P("M64 46 q7 -9 18 -7 q9 -7 20 -2 q10 -1 8 5 q-5 7 -16 5 q-11 4 -21 1 q-9 -1 -9 -2", "thin faint")}${W("70,49 100,50.5 93,53 74,51.5")}</g>`
    + `<g class="zb-cloud zb-cloud--b">${P("M316 36 q6 -8 16 -6 q8 -6 17 -1 q8 0 6 5 q-5 5 -13 4 q-10 3 -18 0 q-8 -1 -8 -2", "thin faint")}${W("321,38.5 347,39.5 341,42 325,40.5")}</g>`
    + `</g>`;
}

function sceneStatics(level, xs, frame) {
  const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
  const i0 = drawIdx; // depth details ride the early strokes' beats
  let hatch = "";
  for (let x = 20; x < 390; x += 24) hatch += `M${x} ${GROUND} l-8 9 `;
  // the set dressing follows the camera (batch P): the detonator sits
  // just inside the frame's left edge and the fuse is drawn from
  // there to the base, compressed (or swapped for a short run) when
  // a tight frame leaves it little road
  const dx = Math.max(0, frame.x);
  const fx0 = dx + 46;
  const d2 = (cx - 52) - fx0;
  const r = d2 / 102;
  const fuseD = d2 > 45
    ? `M${fx0} 202 C ${(fx0 + 50 * r).toFixed(1)} 226, ${(fx0 + 86 * r).toFixed(1)} 188, ${cx - 52} 218 S ${cx - 10} 214, ${cx} 209`
    : `M${fx0} 203 Q ${((fx0 + cx) / 2).toFixed(1)} 224, ${cx} 209`;
  return atmosphereSvg()
    + P(`M8 ${GROUND} H392`, "fore")
    + P(hatch, "thin faint")
    // far street: a broken second kerb behind the site, a lamp post
    // and bollards — the depth layer stays below the deck line
    + PX("M52 197 H96 M304 197 H346", "thin faint", i0 + 2)
    + PX("M66 197 V163 M66 163 h7 q4 1 3 5", "thin faint", i0 + 3)
    + PX("M54 197 v-5 M84 197 v-5 M348 197 v-5", "thin faint", i0 + 4)
    + `<path d="M${cx} ${(frame.y + 14).toFixed(1)} V${GROUND}" class="thin faint" stroke-dasharray="7 4 2 4"/>`
    // the title block pins to the frame's top-left corner
    + `<g transform="translate(${(frame.x - 6).toFixed(1)} ${(frame.y - 8).toFixed(1)})">`
    + T(16, 26, "tag", "圖則 PLAN " + String(level.seq).padStart(2, "0") + "/" + String(level.total).padStart(2, "0"))
    + P("M14 32 h64", "thin faint")
    + `</g>`
    + `<g transform="translate(${dx.toFixed(1)} 0)"><path id="detonator" d="${DETONATOR_D.armed}" pathLength="1" class="din" style="--i:${drawIdx++}"/></g>`
    + `<path id="fuseAsh" d="${fuseD}" class="thin" stroke-dasharray="0 1" pathLength="1"/>`
    + `<path id="fusePath" d="${fuseD}" class="thin" style="stroke:var(--mc-red);opacity:0.85"/>`
    + `<circle id="fuseGlow" r="6.5" fill="var(--mc-red)" opacity="0.25"/>`
    + `<circle id="fuseSpark" r="3.2" fill="var(--mc-red)"/>`;
}

/* ══ street life: tiny ink people, a few strokes each, never red ══
 * Two crew figures loiter right of the site while the blueprint draws
 * in (one pointing at the works, one in the classic site squat); the
 * foreman keeps his post at the detonator. Positions clear of the
 * pillars, plaques, rootmarks, the fuse's sag and the crane. */
const DETONATOR_D = {
  armed:  "M22 190 h24 v14 h-24 z M34 190 v-9 M26 181 h16",
  pushed: "M22 190 h24 v14 h-24 z M34 190 v-4 M26 186 h16",
};
const FOREMAN_POSES = {
  stand: `<circle cx="13.5" cy="185" r="2.7"/>
    <path d="M13.5 188 V199 M13.5 199 L10 210 M13.5 199 L17 210 M13.5 191 L21 185.5 M13.5 191 L10.5 197.5"/>`,
  push: `<circle cx="18.5" cy="181" r="2.7"/>
    <path d="M17.8 184 L13.5 194 M13.5 194 L10.5 210 M13.5 194 L16.5 210 M17.8 184.5 L27 186.8 M17.8 184.5 L31 187.3"/>`,
};

function crewSvg(frame) {
  // the cast follows the camera: the foreman keeps his post beside
  // the (frame-shifted) detonator; the crew slides in from the right
  // edge when a tight frame would crop them
  const dx = Math.max(0, frame.x);
  const dxR = Math.min(0, frame.x + frame.w - 334);
  return `<g class="zb-crew" id="crew" transform="translate(${dxR.toFixed(1)} 0)">
    <g class="zb-figure">
      <circle cx="306" cy="187" r="2.7"/>
      <path d="M306 190 V200 M306 200 L302 210 M306 200 L310 210 M306 193 L298 188.5 M306 193 L309.5 198.5"/>
    </g>
    <g class="zb-figure zb-figure--squat">
      <circle cx="318" cy="196" r="2.6"/>
      <path d="M319 198.5 q3.5 2.5 3.5 7 M316 208.5 h6.5 M322 205.5 L315 203.5 M319.5 200.5 L315.5 204"/>
    </g>
  </g>
  <g class="zb-foreman" id="foreman" transform="translate(${dx.toFixed(1)} 0)">${FOREMAN_POSES.stand}</g>`;
}

/* the fuse has turned urgent (warn window, grace, or the crack
 * itself): the crew bolts off the page. Latched per building via the
 * class; the run is CSS, reduced motion swaps it for an instant exit. */
function scatterCrew() {
  const crew = $("crew");
  if (!crew || crew.classList.contains("zb-crew--run")) return;
  crew.classList.add("zb-crew--run");
  ZBFX.audio.patter();
}

/* the foreman's one beat: he leans onto the plunger as the charge
 * fires — called from the collapse timeline's crack label */
function foremanPush() {
  const f = $("foreman");
  if (!f || f.dataset.pose === "push") return;
  f.dataset.pose = "push";
  f.innerHTML = FOREMAN_POSES.push;
  const det = $("detonator");
  if (det) det.setAttribute("d", DETONATOR_D.pushed);
}

/* round 2+ variety: mirror the silhouette (never kind 1, its deck
 * carries text) and jitter width/height a few percent, deterministic
 * per building so host and screenshots agree */
function variantTransform(level) {
  if (level.round <= 1) return "";
  const h = (level.seq * 2654435761) >>> 0;
  const jx = 1 + ((h % 1000) / 1000 - 0.5) * 0.16;          // ±8% width
  const jy = 1 + (((h >> 10) % 1000) / 1000 - 0.5) * 0.12;  // ±6% height
  const mirror = level.n !== 1 && level.seq % 2 === 0 ? -1 : 1;
  return `translate(200 ${DECK_Y}) scale(${(mirror * jx).toFixed(3)} ${jy.toFixed(3)}) translate(-200 -${DECK_Y})`;
}

/* ══ the camera (batch P, letterbox fallback batch U) ══
 * Each building gets its own frame: a viewBox window matched to the
 * scene box's LIVE aspect where the 400-unit sheet allows it; when a
 * wide box would cap the width below the subject's height, the frame
 * keeps its height and the drawing letterboxes horizontally (meet
 * centres it, and fx toPx/fxScale convert through the same offsets).
 * Frames are bottom-anchored so the ground line and rootmark band
 * never leave shot, and sized so the structure commands the frame
 * instead of posing inside a fixed elevation. The camera then moves on the
 * existing beats: settle-in at the draw, push-in through the warn
 * window, a recoil punch on a wrong code, the blast arc on the
 * collapse. Reduced motion keeps the framing, skips every move. */
const CAM = { x: 0, y: 0, w: VB_W, h: VB_H };
function applyCam() {
  $("structSvg").setAttribute("viewBox",
    `${CAM.x.toFixed(2)} ${CAM.y.toFixed(2)} ${CAM.w.toFixed(2)} ${CAM.h.toFixed(2)}`);
  ZBFX.setView(CAM); // canvas FX convert through the live frame
}
function computeFrame() {
  const bb = $("deck").getBBox();
  const sc = $("scene");
  const A = sc.clientHeight ? sc.clientWidth / sc.clientHeight : VB_W / VB_H;
  // subject: structure top to the ground, plus headroom for the
  // hazard beacon and the survey width rule (label tops out ~23 units
  // above the roof), and the band below the ground line where the
  // rootmarks, claim names and echo tallies are inked
  const needH = (GROUND - bb.y) + 26 + (VB_H - GROUND);
  let w = Math.max(needH * A, bb.width / 0.7, bb.width + 52);
  let h = w / A;
  // the sheet is only 400 units wide: when a wide box asks for more,
  // cap the width but never surrender the subject's height - keep
  // needH and let the drawing letterbox horizontally (meet centres
  // it, fx toPx converts through the same offsets). Without this a
  // landscape tablet guillotines the tall kinds at the frame top.
  if (w > VB_W) { w = VB_W; h = Math.max(w / A, needH); }
  const cx = bb.x + bb.width / 2;
  const x = Math.max(0, Math.min(cx - w / 2, VB_W - w));
  return { x: x, y: VB_H - h, w: w, h: h };
}
function camRest(frame) {
  G.camRest = frame;
  gsap.killTweensOf(CAM);
  if (ZBFX.reduced) { Object.assign(CAM, frame); applyCam(); return; }
  // settle the last few percent in while the blueprint draws
  Object.assign(CAM, {
    x: Math.max(0, frame.x - frame.w * 0.035), y: frame.y - frame.h * 0.07,
    w: frame.w * 1.07, h: frame.h * 1.07,
  });
  applyCam();
  gsap.to(CAM, { ...frame, duration: 1.3, ease: "power2.out", onUpdate: applyCam });
}
/* the warn window: a slow push-in that runs to the deadline */
function camCreep() {
  if (ZBFX.reduced || !G.camRest || G.over) return;
  const r = G.camRest, s = 0.92;
  const dur = Math.max((G.deadline - performance.now()) / 1000, 0.8);
  gsap.killTweensOf(CAM);
  gsap.to(CAM, {
    w: r.w * s, h: r.h * s,
    x: r.x + r.w * (1 - s) / 2, y: r.y + r.h * (1 - s),
    duration: dur, ease: "power1.in", onUpdate: applyCam,
  });
}
/* wrong code: the camera takes the recoil with the drawing, then
 * hands back to the warn creep if one was running */
function camPunch() {
  if (ZBFX.reduced) return;
  const x0 = CAM.x, y0 = CAM.y, w0 = CAM.w, h0 = CAM.h;
  gsap.killTweensOf(CAM);
  gsap.timeline({ onComplete: () => { if (G.camWarned && !G.over) camCreep(); } })
    .to(CAM, { w: w0 * 0.96, h: h0 * 0.96, x: x0 + w0 * 0.02, y: y0 + h0 * 0.04, duration: 0.09, ease: "power2.out", onUpdate: applyCam })
    .to(CAM, { w: w0, h: h0, x: x0, y: y0, duration: 0.13, ease: "power2.in", onUpdate: applyCam });
}
/* the blast arc: punch toward the building, follow the fall down,
 * pull back to rest for the graph and the stamp */
function camBlast() {
  if (ZBFX.reduced || !G.camRest) return;
  const r = G.camRest, s = 0.88;
  gsap.killTweensOf(CAM);
  gsap.timeline()
    .to(CAM, { w: r.w * s, h: r.h * s, x: r.x + r.w * (1 - s) / 2, y: r.y + r.h * (1 - s) * 0.5, duration: 0.22, ease: "power3.out", onUpdate: applyCam })
    .to(CAM, { y: r.y + r.h * (1 - s), duration: 0.35, ease: "power2.inOut", onUpdate: applyCam }, 0.24)
    .to(CAM, { w: r.w, h: r.h, x: r.x, y: r.y, duration: 0.55, ease: "power2.inOut", onUpdate: applyCam }, 0.66);
}
/* the fizzle: nothing detonates — the camera just breathes out */
function camRelax() {
  if (ZBFX.reduced || !G.camRest) return;
  gsap.killTweensOf(CAM);
  gsap.to(CAM, { ...G.camRest, duration: 0.6, ease: "power2.out", onUpdate: applyCam });
}

function renderStructure(level) {
  const xs = level.pillars.length === 1 ? [200] : (level.n === 5 ? [170, 230] : [140, 260]);
  const svg = $("structSvg");
  const vt = variantTransform(level);
  const deckHtml = () =>
    `<g class="zb-deck" id="deck" data-dress="${dressVariant(level)}"><g${vt ? ` transform="${vt}"` : ""}>${chunkDeck(deckParts(level, xs))}${lightsSvg(level)}</g></g>`;
  // probe pass: stand the deck alone to measure the subject, so the
  // camera can pick this building's frame before the set is dressed
  drawIdx = 0;
  svg.innerHTML = deckHtml();
  const frame = computeFrame();
  // real pass: statics first, so the site inks in before the structure
  drawIdx = 0;
  svg.classList.add("wait"); // draw-in holds until the level card clears
  svg.innerHTML =
    sceneStatics(level, xs, frame)
    + rubbleSvg(xs)
    + deckHtml()
    + level.pillars.map((p, i) => pillarSvg(xs[i], p)).join("");
  svg.insertAdjacentHTML("beforeend", surveySvg() + crewSvg(frame));
  camRest(frame);
  return xs;
}

/* surveyor's marginalia: faint dimension lines with arrowheads and
 * pencil measurements — the demolition plan is a maths document */
function surveySvg() {
  const bb = $("deck").getBBox();
  const x = Math.max(bb.x - 16, 6);
  const yT = bb.y + 2, yB = DECK_Y;
  const hM = Math.round((yB - yT) / 4);
  let out = `<path class="thin" d="M${x.toFixed(0)} ${yT.toFixed(0)} V${yB} M${(x - 3).toFixed(0)} ${yT.toFixed(0)} h6 M${(x - 3).toFixed(0)} ${yB} h6 M${x.toFixed(0)} ${yT.toFixed(0)} l-1.6 4 M${x.toFixed(0)} ${yT.toFixed(0)} l1.6 4 M${x.toFixed(0)} ${yB} l-1.6 -4 M${x.toFixed(0)} ${yB} l1.6 -4"/>`
    + `<text x="${(x - 4).toFixed(0)}" y="${((yT + yB) / 2).toFixed(0)}" class="tag" text-anchor="middle" transform="rotate(-90 ${(x - 4).toFixed(0)} ${((yT + yB) / 2).toFixed(0)})">${hM} m</text>`;
  if (bb.y > 40) {
    // squat buildings also get their span measured above the roof
    const sL = bb.x + 4, sR = bb.x + bb.width - 4, sY = Math.max(yT - 12, 14);
    const wM = Math.round((sR - sL) / 4);
    out += `<path class="thin" d="M${sL.toFixed(0)} ${sY.toFixed(0)} H${sR.toFixed(0)} M${sL.toFixed(0)} ${(sY - 3).toFixed(0)} v6 M${sR.toFixed(0)} ${(sY - 3).toFixed(0)} v6"/>`
      + `<text x="${((sL + sR) / 2).toFixed(0)}" y="${(sY - 4).toFixed(0)}" class="tag" text-anchor="middle">${wM} m</text>`;
  }
  return `<g class="zb-survey">${out}</g>`;
}

/* building 1 only, once per run: a pencil rides around the structure
 * as it draws itself in. Pure charm; skipped under reduced motion. */
function ridePencil() {
  const bb = $("deck").getBBox();
  const guide = `M${(bb.x - 12).toFixed(0)} ${DECK_Y}`
    + ` L${(bb.x - 2).toFixed(0)} ${(bb.y - 4).toFixed(0)}`
    + ` L${(bb.x + bb.width + 2).toFixed(0)} ${(bb.y + 2).toFixed(0)}`
    + ` L${(bb.x + bb.width + 8).toFixed(0)} ${(DECK_Y - 16).toFixed(0)}`
    + ` L${(bb.x + 16).toFixed(0)} ${(DECK_Y + 4).toFixed(0)}`;
  $("structSvg").insertAdjacentHTML("beforeend",
    `<g id="pencilRider" class="zb-pencil" opacity="0">
      <g transform="rotate(-35)">
        <rect x="-2.2" y="-17" width="4.4" height="12.5" rx="1" fill="var(--mc-gold)" stroke="var(--mc-ink)" stroke-width="0.8"/>
        <path d="M-2.2 -4.5 L0 1 L2.2 -4.5 Z" fill="var(--mc-ink)"/>
      </g>
      <animateMotion id="pencilMotion" begin="indefinite" dur="1.5s" fill="freeze" path="${guide}"/>
    </g>`);
  setTimeout(() => {
    const el = $("pencilRider");
    if (!el || !G.level || G.level.seq !== 1) return;
    el.setAttribute("opacity", "1");
    const m = $("pencilMotion");
    if (m && m.beginElement) m.beginElement();
  }, CARD_MS + 60);
  setTimeout(() => {
    const el = $("pencilRider");
    if (el) el.remove();
  }, CARD_MS + 1900);
}

/* ══ the pedagogy bridge to SM902: the equation becomes its graph ══
 * When a structure resolves, y = (x−a)(x−b) sketches itself faintly
 * across the emptied sky, dipping through the inked codes: the
 * x-intercepts ARE the solutions. Kind 5 draws the tangent parabola
 * (double root, one touch — 重根), kind 1 the line y = kx through
 * the origin. Plain SVG on purpose: it is a static sketch, so no
 * graphing library (CONVENTIONS: the engine follows the mechanic). */

const GRAPH_Y = 171; // the sketch's x-axis runs through the rootmarks

/* exact quadratic Bézier for y = GRAPH_Y − k(x−x1)(x−x2) over [xa,xb]
 * (a parabola IS a quadratic Bézier; control point from the tangents) */
function parabolaPath(k, x1, x2, xa, xb) {
  const f = x => GRAPH_Y - k * (x - x1) * (x - x2);
  const df = x => -k * (2 * x - x1 - x2);
  const xm = (xa + xb) / 2;
  const cy = f(xa) + df(xa) * (xm - xa);
  return `M${xa.toFixed(1)} ${f(xa).toFixed(1)} Q${xm.toFixed(1)} ${cy.toFixed(1)} ${xb.toFixed(1)} ${f(xb).toFixed(1)}`;
}

/* the sketch's label: the equation as a function of x */
function graphLabel(level) {
  const ps = level.pillars;
  switch (level.kind) {
    case "numeric": return "y = " + level.konst + "x";
    case "linear": return "y = " + ps[0].label;
    case "square": return "y = " + ps[0].label + "²";
    case "expanded": return "y = " + level.expr.replace(/\s*=\s*0$/, "");
    default: return "y = " + ps[0].label + ps[1].label;
  }
}

function graphSvg(level) {
  const xs = level.pillars.map(p => pillarX(p.id));
  const isLine = level.kind === "numeric" || level.kind === "linear";
  const isSquare = level.kind === "square";
  let curve, xa, xb, extra = "";
  if (isLine) {
    // y = kx (through the origin mark) or y = x − a: a rising line,
    // steeper when the constant multiplier is bigger
    const m = level.kind === "numeric" ? Math.min(0.95, 0.35 + 0.07 * level.konst) : 0.5;
    const x0 = xs[0];
    xa = Math.max(20, x0 - 34 / m);
    xb = Math.min(380, x0 + 82 / m);
    curve = `M${xa.toFixed(1)} ${(GRAPH_Y + m * (x0 - xa)).toFixed(1)} L${xb.toFixed(1)} ${(GRAPH_Y - m * (xb - x0)).toFixed(1)}`;
    if (level.kind === "numeric") {
      // the origin deserves its y-axis so "through the origin" reads
      extra = `<path class="zb-graph__axis" d="M${x0} 120 V206"/>`;
    }
  } else if (isSquare) {
    // 重根: the tangent parabola touches the line exactly once,
    // midway between the twin pillars that share the code
    const cx = (xs[0] + xs[1]) / 2;
    const k = 80 / (150 * 150);
    xa = cx - 150; xb = cx + 150;
    curve = parabolaPath(k, cx, cx, xa, xb);
    // the tag sits left of the touch point, clear of the 拆 chop's slam
    extra = `<circle cx="${cx}" cy="${GRAPH_Y}" r="3.5"/>`
      + `<text x="${cx - 56}" y="${GRAPH_Y - 12}" text-anchor="end">${t("graph_tangent")}</text>`;
  } else {
    // two distinct codes: the parabola dips between them (capped so
    // the vertex clears the rubble) and sweeps up into the sky
    const [x1, x2] = [Math.min(...xs), Math.max(...xs)];
    const h = (x2 - x1) / 2;
    const k = 13 / (h * h);
    const w = h * Math.sqrt(78 / 13 + 1);
    xa = Math.max(16, (x1 + x2) / 2 - w);
    xb = Math.min(384, (x1 + x2) / 2 + w);
    curve = parabolaPath(k, x1, x2, xa, xb);
  }
  return `<g class="zb-graph" id="graph">
    <path class="zb-graph__axis" d="M${Math.max(14, xa - 10).toFixed(1)} ${GRAPH_Y} H${Math.min(386, xb + 10).toFixed(1)}"/>
    ${extra}
    <path class="zb-graph__curve" pathLength="1" d="${curve}"/>
    <text x="${xb.toFixed(1)}" y="${isLine || isSquare ? "112" : "86"}" text-anchor="end">${svgMath(graphLabel(level))}</text>
  </g>`;
}

/* the same sketch as a thumbnail beside the reveal working */
function miniGraphHtml(level) {
  const AX = 36, roots = [...new Set(level.pillars.map(p => p.root))].sort((a, b) => a - b);
  const dot = (x, r) => `<circle cx="${x}" cy="${AX}" r="2.5"/><text x="${x}" y="${AX + 13}">${ZBLevels.num(r)}</text>`;
  let curve, dots;
  if (level.kind === "numeric" || level.kind === "linear") {
    curve = `<path class="curve" d="M24 54 L110 11"/>`; // through (60, 36)
    dots = dot(60, roots[0]);
  } else if (level.kind === "square") {
    const k = 26 / (48 * 48);
    const f = x => AX - k * (x - 60) * (x - 60);
    curve = `<path class="curve" d="M12 ${f(12).toFixed(1)} Q60 ${(2 * AX - f(12)).toFixed(1)} 108 ${f(108).toFixed(1)}"/>`;
    dots = dot(60, roots[0]);
  } else {
    const k = 10 / (22 * 22), x1 = 38, x2 = 82;
    const f = x => AX - k * (x - x1) * (x - x2);
    const xa = 19, xb = 101, xm = 60;
    const cy = f(xa) + -k * (2 * xa - x1 - x2) * (xm - xa);
    curve = `<path class="curve" d="M${xa} ${f(xa).toFixed(1)} Q${xm} ${cy.toFixed(1)} ${xb} ${f(xb).toFixed(1)}"/>`;
    dots = roots.length === 2 ? dot(x1, roots[0]) + dot(x2, roots[1]) : dot(60, roots[0]);
  }
  return `<svg class="zb-minigraph" viewBox="0 0 120 56" aria-hidden="true">
    <path class="axis" d="M6 ${AX} H114"/>${curve}${dots}</svg>`;
}

/* ══════════════════════════════════════════════════════════════════
 * shared UI bits
 * ══════════════════════════════════════════════════════════════════ */

/* set the variable in textbook italic. Only ever applied to strings
 * from ZBLevels (never to player names, which may contain an x). */
function mathHtml(s) {
  return String(s).replace(/x/g, '<i class="zb-var">x</i>');
}
function svgMath(s) {
  return String(s).replace(/x/g, '<tspan class="zb-vari">x</tspan>');
}
function exprHtml(expr) {
  return mathHtml(escapeText(expr)).replace(/= 0$/, '= <span class="zb-zero">0</span>');
}

/* the equation board with each factor as an addressable span keyed by
 * pillar id, so a fallen pillar can be struck through right where the
 * zero-product property lives. Kind 6 shows the expanded form (its
 * plaque reveal carries the factors), so it has no spans.
 * Level text renders escaped: on a phone the level arrives from room
 * state, which player names never write but rules alone guarantee. */
function boardHtml(level) {
  if (level.kind === "expanded") return exprHtml(level.expr);
  const span = (ids, text) =>
    `<span class="zb-factor" data-fids="${ids.join(" ")}">${mathHtml(escapeText(text))}</span>`;
  const tail = ' = <span class="zb-zero">0</span>';
  const ps = level.pillars;
  switch (level.kind) {
    case "numeric": return level.konst + " × " + span([ps[0].id], ps[0].label) + tail;
    case "linear": return span([ps[0].id], ps[0].label) + tail;
    case "square": return span([ps[0].id, ps[1].id], ps[0].label) + "²" + tail;
    default: return span([ps[0].id], ps[0].label) + span([ps[1].id], ps[1].label) + tail;
  }
}

/* the board is set covered and opened as its own beat: the question
 * writes itself in once the blueprint stands and the fuse lights */
function setBoard(el, level, covered) {
  el.innerHTML = `<span class="zb-board__ink">${boardHtml(level)}</span>`;
  el.classList.remove("zb-board--ink");
  el.classList.toggle("zb-board--wait", covered);
}
function openBoard(el) {
  el.classList.remove("zb-board--wait");
  el.classList.add("zb-board--ink");
}

/* strike a fallen factor through in red; the claimer's name (escaped,
 * never math-formatted) is inked tiny above it. Idempotent: a double
 * root's two pillars share one span. Returns true only on a fresh
 * strike, so phones can ping when someone else's claim lands. */
function strikeFactor(boardEl, pillarId, name) {
  const el = boardEl.querySelector(`.zb-factor[data-fids~="${pillarId}"]`);
  if (!el || el.classList.contains("struck")) return false;
  el.classList.add("struck");
  if (name) el.insertAdjacentHTML("beforeend", `<span class="zb-factor__by">${escapeText(name)}</span>`);
  return true;
}

function starSvg() {
  return '<svg viewBox="0 0 20 20"><path d="M10 1.5l2.5 5.4 5.9 0.7-4.4 4 1.2 5.8-5.2-2.9-5.2 2.9 1.2-5.8-4.4-4 5.9-0.7z"/></svg>';
}
function renderStars(el, n) {
  el.innerHTML = n <= 6 ? starSvg().repeat(n)
                        : starSvg() + `<span class="mc-stars__count">×${n}</span>`;
}

/* the ×1.x chip: same formula as ZBLevels.points' streak multiplier */
function multHtml(streak) {
  if (!streak) return "";
  return `<span class="zb-mult">×${(1 + 0.1 * Math.min(streak, 10)).toFixed(1)}</span>`;
}
/* stars + multiplier chip for live streak displays (not end totals).
 * Only the NEW star stamps in; the rest hold still (renderStars
 * re-mounts every svg, which would re-pop them all). The grown chip
 * flashes gold. */
function renderStreak(el, n) {
  const prev = parseInt(el.dataset.streak || "0", 10);
  renderStars(el, n);
  el.insertAdjacentHTML("beforeend", multHtml(n));
  el.dataset.streak = n;
  const svgs = el.querySelectorAll("svg");
  svgs.forEach((s, i) => {
    if (n > prev && i === svgs.length - 1) s.classList.add("zb-starnew");
    else s.style.animation = "none";
  });
  if (n > prev) {
    const m = el.querySelector(".zb-mult");
    if (m) m.classList.add("pop");
  }
}

/* the displayed score counts up to the judged total (G.score itself
 * always moves exactly); reduced motion snaps */
function tweenScore(el, to, ms) {
  if (el._tw) el._tw.kill();
  const from = parseInt(String(el.textContent).replace(/[^\d-]/g, ""), 10) || 0;
  if (ZBFX.reduced || to === from) { el.textContent = to; return; }
  const o = { v: from };
  el._tw = gsap.to(o, {
    v: to, duration: (ms || 550) / 1000, ease: "power3.out",
    onUpdate: () => { el.textContent = Math.round(o.v); },
  });
}

/* end report: the stars stamp in one after another */
function staggerStars(el) {
  [...el.querySelectorAll("svg")].forEach((s, i) => {
    s.style.animationDelay = (0.25 + i * 0.15) + "s";
  });
}

/* report ceremony on its own labelled timeline: one chime as the
 * stars start stamping in, the inspector's chop pressed onto the
 * sheet as it lands (the 1.15s CSS stamp delay + slam midpoint) */
function endCeremonyAudio() {
  gsap.timeline()
    .addLabel("stars", 0.3)
    .addLabel("chop", 1.25)
    .call(() => ZBFX.audio.chime(), null, "stars")
    .call(() => ZBFX.audio.stampSoft(), null, "chop");
}

/* +N 分 ink numeral floating from the claimed pillar toward the score
 * (solo) or the leaderboard (host) */
function floatPoints(pts, vbX) {
  if (ZBFX.reduced) return;
  const scene = $("scene");
  const el = document.createElement("div");
  el.className = "zb-floatpts";
  el.textContent = fmt("points_fmt", { n: pts });
  // position through the live camera frame, clamped into shot
  const fxr = Math.max(0.06, Math.min(0.94, (vbX - CAM.x) / CAM.w));
  el.style.left = (fxr * 100).toFixed(1) + "%";
  const target = G.mode === "solo" ? $("scoreBox") : $("hostBoard");
  const c = scene.getBoundingClientRect();
  const s = target.getBoundingClientRect();
  if (c.width && s.width) {
    const x0 = c.left + fxr * c.width, y0 = c.top + 0.52 * c.height;
    el.style.setProperty("--fdx", (s.left + s.width / 2 - x0).toFixed(0) + "px");
    el.style.setProperty("--fdy", (s.top - y0).toFixed(0) + "px");
  }
  scene.appendChild(el);
  setTimeout(() => el.remove(), 1000);
  // the score takes the hit as the numeral arrives
  setTimeout(() => {
    target.classList.remove("zb-scorebump");
    void target.offsetWidth;
    target.classList.add("zb-scorebump");
  }, 820);
}

/* ── the detonation grammar (batch Q) ──
 * Every collapse is a screen event: 90ms hit-stop at the crack, a
 * paper-white flash (never red), an ink shockwave ring, torn paper.
 * Reduced motion skips the grammar whole; the labels never move, so
 * the multi timing contract (turn at 2.2s) holds. */
function blastFlash() {
  const old = document.querySelector(".zb-blastflash");
  if (old) old.remove();
  const f = document.createElement("div");
  f.className = "zb-blastflash";
  $("scene").appendChild(f);
  setTimeout(() => f.remove(), 380);
}
function blastRing(cx, cy) {
  const svg = $("structSvg");
  if (!svg) return;
  const ring = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  ring.setAttribute("cx", cx);
  ring.setAttribute("cy", cy);
  ring.setAttribute("r", 8);
  ring.setAttribute("class", "zb-shockring");
  svg.appendChild(ring);
  gsap.fromTo(ring,
    { attr: { r: 8, "stroke-width": 3 }, opacity: 0.55 },
    { attr: { r: 175, "stroke-width": 0.7 }, opacity: 0, duration: 0.55, ease: "power2.out",
      onComplete: () => ring.remove() });
}
function blastHold() {
  G.hitStopAt = performance.now();
  $("scene").classList.add("zb-hitstop");
  ZBFX.hitStop(90);
  setTimeout(() => $("scene").classList.remove("zb-hitstop"), 92);
}

function markHtml(kind, lines) {
  // kind: correct | wrong | info
  const stampKey = kind === "correct" ? "stamp_correct" : "stamp_wrong";
  const ink = kind === "correct"
    ? '<path d="M4 13l5.5 5.5L20 6.5"/>'
    : '<path d="M6 6l12 12"/><path d="M18 6L6 18"/>';
  const noteCls = kind === "correct" ? "mc-margin-note--correct" : "";
  const stamp = kind === "info" ? "" : `
    <div class="mc-stamp ${kind === "correct" ? "mc-stamp--correct" : ""}">
      <svg class="draw" viewBox="0 0 24 24" style="width:22px;height:22px" fill="none"
           stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${ink}</svg>
      <span>${t(stampKey)}</span>
    </div>`;
  return stamp + lines.map(l => `<div class="mc-margin-note ${noteCls}">${l}</div>`).join("");
}

/* keypad factory: builds handlers around a submit(v) callback.
 * The sign key latches. A digit tap ARMS the value for ~400ms before
 * it commits, so a finger slip isn't a maths error: tapping − inside
 * the window flips the staged sign, tapping the same digit again
 * commits instantly (fast players lose nothing). */
function makePad(padEl, previewEl, lockEl, lockCountEl, submit) {
  let neg = false;
  let locked = false;
  let lockTimer = null;
  let armed = null; // { v } — staged value awaiting the commit window
  let armTimer = null;
  const ARM_MS = 400;
  const signKey = padEl.querySelector(".zb-key--sign");

  function renderPreview() {
    if (armed) {
      previewEl.innerHTML = '<i class="zb-var">x</i>&nbsp;=&nbsp;' +
        (armed.v < 0 ? '<span class="neg">−</span>' : "") + Math.abs(armed.v);
      previewEl.classList.add("armed");
    } else {
      previewEl.innerHTML = '<i class="zb-var">x</i>&nbsp;=&nbsp;' + (neg ? '<span class="neg">−</span>' : "") + "▢";
      previewEl.classList.remove("armed");
    }
  }
  renderPreview();

  function disarm() {
    clearTimeout(armTimer);
    armed = null;
  }
  function commit() {
    if (!armed) return;
    const v = armed.v;
    disarm();
    renderPreview();
    submit(v);
  }

  padEl.addEventListener("click", e => {
    const key = e.target.closest(".zb-key");
    if (!key || locked) return;
    ZBFX.audio.unlock();
    if (key === signKey) {
      if (armed) {
        // slip forgiveness: flip the staged sign, the window restarts
        armed.v = -armed.v;
        clearTimeout(armTimer);
        armTimer = setTimeout(commit, ARM_MS);
      } else {
        neg = !neg;
        signKey.setAttribute("aria-pressed", neg);
      }
      ZBFX.audio.click();
      renderPreview();
      return;
    }
    const d = parseInt(key.dataset.d, 10);
    ZBFX.audio.click();
    if (armed && Math.abs(armed.v) === d) { commit(); return; } // same digit again: go now
    const v = neg ? -d : d;
    neg = false;
    signKey.setAttribute("aria-pressed", "false");
    armed = { v: v };
    clearTimeout(armTimer);
    armTimer = setTimeout(commit, ARM_MS);
    renderPreview();
  });

  return {
    lock(seconds) {
      disarm();
      locked = true;
      padEl.querySelectorAll(".zb-key").forEach(k => k.disabled = true);
      lockEl.classList.add("show");
      // the pencil ring unwinds over the whole lock
      const ring = lockEl.querySelector(".zb-lock__ring circle");
      if (ring) {
        ring.style.animation = "none";
        void ring.getBoundingClientRect();
        ring.style.animation = `zb-locksweep ${seconds}s linear forwards`;
      }
      let left = seconds;
      lockCountEl.textContent = left;
      clearInterval(lockTimer);
      lockTimer = setInterval(() => {
        left -= 1;
        if (left <= 0) { this.unlock(); }
        else lockCountEl.textContent = left;
      }, 1000);
    },
    unlock() {
      clearInterval(lockTimer);
      locked = false;
      padEl.querySelectorAll(".zb-key").forEach(k => k.disabled = false);
      lockEl.classList.remove("show");
    },
    disable() {
      disarm();
      locked = true;
      padEl.querySelectorAll(".zb-key").forEach(k => k.disabled = true);
    },
    enable() {
      clearInterval(lockTimer);
      disarm();
      locked = false;
      neg = false;
      signKey.setAttribute("aria-pressed", "false");
      renderPreview();
      padEl.querySelectorAll(".zb-key").forEach(k => k.disabled = false);
      lockEl.classList.remove("show");
    },
  };
}

/* the cover title stamps in character by character (words for the
 * English title); reduced motion keeps the plain set title */
function stampTitle() {
  const el = document.querySelector("#introScreen .mc-title");
  if (!el || ZBFX.reduced) return;
  const s = el.textContent;
  const units = s.length <= 8 ? [...s] : s.split(/(\s+)/);
  el.innerHTML = units.map((u, i) => /^\s*$/.test(u) ? u
    : `<span class="zb-title-ch" style="--ci:${i}">${escapeText(u)}</span>`).join("");
}

function startRun(mode) {
  G.mode = mode;
  ZBFX.audio.unlock();
  GameBridge.emit(SLUG, "start", { mode: mode, players: Object.keys(G.players).length });
  G.levels = ZBLevels.genPlan(PLAN, newRand());
  G.idx = 0; G.score = 0; G.streak = 0; G.starsTotal = 0; G.records = []; G.ended = false;
  G.scores = {}; G.streaks = {}; G.starsBy = {}; G.claimsBy = {}; G.scoredRound = {}; G.bestMs = {}; G.echoCountBy = {};
  G.started = true;
  $("padWrap").style.display = mode === "host" ? "none" : "";
  $("hostBoard").style.display = mode === "host" ? "" : "none";
  $("tutorBar").style.display = mode === "host" ? "" : "none";
  if (mode === "host") {
    G.room.set("state/scores", null);
    G.room.set("state/results", null);
    renderHostBoard();
  }
  show("gameScreen");
  startLevel();
}

/* ── the one-time sound offer ──
 * The big stage defaults quiet, which buries the whole soundscape
 * behind a small icon nobody finds mid-lesson. On a device with no
 * stored preference the first level card carries the offer once; the
 * tap doubles as the autoplay unlock. Any resolution (tap, header
 * toggle, or round 1 ending unanswered) stores the answer for good. */
function showSoundOffer() {
  const chip = $("soundOffer");
  if (!chip) return;
  try { if (localStorage.getItem("mc-games-sound") !== null) return; } catch (_) { return; }
  $("soundOfferText").textContent = t("sound_offer");
  chip.style.display = "";
  chip.onclick = () => {
    chip.onclick = null;
    ZBFX.audio.setOn(true); // stores the preference
    ZBFX.audio.unlock();    // the same gesture unlocks autoplay
    renderSoundIcon();
    $("soundOfferText").textContent = t("sound_offer_on");
    chip.classList.add("on");
    setTimeout(() => chip.remove(), 1150);
  };
}
function settleSoundOffer() {
  const chip = $("soundOffer");
  if (!chip || chip.classList.contains("on") || chip.style.display === "none") return;
  chip.remove();
  // unanswered through round 1: quiet is the answer, never nag again
  try {
    if (localStorage.getItem("mc-games-sound") === null) ZBFX.audio.setOn(false);
  } catch (_) {}
}

/* resume: a saved host-run snapshot restores mid-round claims and the
 * remaining fuse after a host refresh (see resumeRun) */
function startLevel(resume) {
  // a restart mid-set-piece must not let stale beats fire into the
  // new round (the old setTimeout chain could double-advance here)
  if (G.beatTl) { G.beatTl.kill(); G.beatTl = null; }
  const level = G.level = G.levels[G.idx];
  G.claimed = resume ? (resume.claimed || []) : [];
  G.levelPoints = resume ? (resume.levelPoints || 0) : 0;
  G.over = false;
  G.grace = false;
  G.revealHold = false;
  G.echoDone = resume ? (resume.echoDone || {}) : {};
  G.scoredRound = resume ? (resume.scoredRound || {}) : {};
  G.echoTally = resume ? (resume.echoTally || {}) : {};
  G.hinted = resume ? !!resume.hinted : false;
  $("scene").classList.remove("critical", "lastcall", "zb-hitstop");
  G.lastCall = false;
  G.hitStopAt = null;
  G.camWarned = false;
  ZBFX.bgm.setIntensity("base"); // fresh round, back to the work groove
  setSkipLabel("tutor_skip");
  const hintable = G.mode === "host" && level.kind === "expanded";
  $("btnHint").style.display = hintable ? "" : "none";
  $("btnHint").disabled = G.hinted;
  $("tutorKeys").textContent = hintable ? "t / h / n / e / g" : "t / n / e / g";

  refreshDynamicText();
  tweenScore($("scoreBox"), G.score); // snaps when unchanged, cancels a stale tween
  // fresh rounds stay under wraps until the fuse ignites; a resumed
  // round is already mid-flight
  G.staged = !!resume;
  setBoard($("exprBoard"), level, !G.staged);
  $("markZone").innerHTML = "";
  $("sceneStamp").classList.remove("show");
  $("sceneStamp").innerHTML = "";
  renderStreak($("stars"), G.streak);
  renderStructure(level);
  if (level.seq === 1 && !resume && !ZBFX.reduced) ridePencil();
  renderStreet();
  renderStrugglers();
  // the round opens only once the blueprint stands: card, draw-in
  // (drawIdx strokes at 55ms stagger + the 0.5s stroke), THEN the
  // question inks in and the fuse lights together. Reduced motion
  // draws instantly, so it opens at the card clear; a resumed round
  // is already mid-flight.
  const stageMs = resume || ZBFX.reduced ? CARD_MS : CARD_MS + (drawIdx - 1) * 55 + 550;
  if (G.staged) pad.enable();
  else {
    pad.disable();
    setTimeout(() => {
      if (G.level !== level || G.ended || G.staged) return;
      G.staged = true;
      openBoard($("exprBoard"));
      if (!G.over) pad.enable();
    }, stageMs);
  }

  // fuse: burns only after the level card clears (deadline includes it).
  // A resumed round gets its remaining fuse back, floored at 5s so the
  // class isn't ambushed the moment the projector returns.
  G.duration = level.fuseMs;
  const fuseMs = resume
    ? Math.min(Math.max((resume.deadlineEpoch || 0) - Date.now(), 5000), level.fuseMs)
    : level.fuseMs;
  G.deadline = performance.now() + stageMs + fuseMs;

  if (G.mode === "host") {
    // publish the round: phones display from state, host stays the judge
    G.room.update("state", {
      phase: "playing",
      level: level,
      levelIdx: G.idx,
      deadlineEpoch: Date.now() + stageMs + fuseMs,
      claims: resume && G.claimed.length
        ? Object.fromEntries(G.claimed.map(id => [id, G.claimsBy[id] || true]))
        : null,
      graceUntil: null,
    });
  }

  // re-ink what was already claimed before the refresh
  if (resume && G.claimed.length) {
    G.claimed.forEach(id => {
      const p = level.pillars.find(p => p.id === id);
      if (!p) return;
      if (level.kind === "expanded") revealPlaque(id, p);
      const c = G.claimsBy[id];
      blowPillar(id, p.root, c && c.name);
    });
    if (G.claimed.length === level.pillars.length) enterGrace();
    else sagDeck(G.claimed[G.claimed.length - 1]);
  }

  // level card flash
  const card = $("levelCard");
  card.classList.remove("show");
  void card.offsetWidth; // restart the animation
  card.classList.add("show");
  setTimeout(() => card.classList.remove("show"), 1250);
  if (level.seq === 1 && !resume) showSoundOffer();

  G.fusePathEl = $("fusePath");
  G.fuseLen = G.fusePathEl.getTotalLength();
  G.lastTickSec = null;
  G.lastFleck = null;
  $("fuseTimer").classList.remove("warn");
  setTimeout(() => { if (!G.over && G.level === level) ZBFX.audio.fuseStart(); }, stageMs);
  cancelAnimationFrame(G.raf);
  G.raf = requestAnimationFrame(fuseFrame);
  saveHostRun();
}

function fuseFrame() {
  if (G.over) return;
  const remain = Math.max(0, G.deadline - performance.now());
  // during the level card lead-in remain exceeds the fuse: clamp so the
  // fuse sits unburned and the timer shows a full fuse
  const burned = Math.min(1, Math.max(0, 1 - remain / G.duration));
  $("fuseTimerText").textContent = (Math.min(remain, G.duration) / 1000).toFixed(1);
  ZBFX.audio.fuseUrgency(burned);

  // consume the fuse line and ride the spark along it; the emitter
  // holds until the fuse actually ignites (after the level card).
  // The burnt part stays behind as charred ash with scorch flecks.
  const ignited = remain <= G.duration;
  const pt = G.fusePathEl.getPointAtLength(G.fuseLen * burned);
  G.fusePathEl.setAttribute("stroke-dasharray", `0 ${G.fuseLen * burned} ${G.fuseLen}`);
  $("fuseAsh").setAttribute("stroke-dasharray", `${burned} 1`);
  if (ignited) {
    const fleck = Math.floor(burned * 12);
    if (fleck !== G.lastFleck) {
      G.lastFleck = fleck;
      $("structSvg").insertAdjacentHTML("beforeend",
        `<circle class="zb-fleck" cx="${(pt.x + (Math.random() - 0.5) * 5).toFixed(1)}" cy="${(pt.y + 2 + Math.random() * 3).toFixed(1)}" r="${(0.7 + Math.random() * 0.7).toFixed(2)}"/>`);
    }
  }
  $("fuseSpark").setAttribute("cx", pt.x); $("fuseSpark").setAttribute("cy", pt.y);
  $("fuseGlow").setAttribute("cx", pt.x); $("fuseGlow").setAttribute("cy", pt.y);
  ZBFX.sparksAt(ignited ? pt.x : null, pt.y);

  // last three seconds: the sky darkens a shade and the spark grows —
  // tension the back row can read (a state change, kept under reduced)
  const lastCall = ignited && remain > 0 && remain <= 3050;
  if (lastCall !== G.lastCall) {
    G.lastCall = lastCall;
    $("scene").classList.toggle("lastcall", lastCall);
    $("fuseSpark").setAttribute("r", lastCall ? 4.6 : 3.2);
    $("fuseGlow").setAttribute("r", lastCall ? 9.5 : 6.5);
  }

  // finale street: the countdown starts earlier and ticks twice as fast
  const warnAt = G.level.finale ? 10200 : 5200;
  if (remain <= warnAt) {
    $("fuseTimer").classList.add("warn");
    scatterCrew();
    if (!G.camWarned) { G.camWarned = true; camCreep(); ZBFX.bgm.setIntensity("warn"); }
    const sec = Math.ceil(remain / (G.level.finale ? 500 : 1000));
    if (sec !== G.lastTickSec) { G.lastTickSec = sec; ZBFX.audio.tick(remain <= 3050); }
  }
  // grace theatre: 3 · 2 · 1 stamped over the scene before the blast
  if (G.grace) {
    const gs = Math.ceil(remain / 1000);
    if (gs !== G.lastGraceSec && gs >= 1 && gs <= 3) {
      G.lastGraceSec = gs;
      const numEl = document.createElement("div");
      numEl.className = "zb-gracenum";
      numEl.textContent = gs;
      $("scene").appendChild(numEl);
      setTimeout(() => numEl.remove(), 950);
    }
  }
  // solo scaffold: at half fuse the factorise hint pencils itself in
  if (G.mode === "solo" && G.level.kind === "expanded" && !G.hinted && burned >= 0.5) showHint();

  if (remain <= 0) { G.grace ? collapseAndAdvance() : fuseOut(); return; }
  G.raf = requestAnimationFrame(fuseFrame);
}

function pillarX(id) {
  const mark = document.querySelector(`.zb-rootmark[data-for="${id}"]`);
  return parseFloat(mark.getAttribute("x"));
}

/* L6 plaques: ghost-pencil hint first, full ink on the claim */
function revealPlaque(id, p, ghost) {
  const q = document.querySelector(`[data-qmark="${id}"]`);
  if (q) q.remove();
  const el = document.querySelector(`[data-plaque="${id}"]`);
  el.classList.toggle("zb-hintghost", !!ghost);
  el.innerHTML = svgMath(p.hidden);
}

/* factorise-first scaffold: pencil one hidden factor onto its plaque.
 * Fair, not punitive: the whole building then pays half. Solo shows it
 * at half fuse; in class the tutor triggers it (提示 button / key h). */
function showHint() {
  if (G.hinted || G.over || !G.level || G.level.kind !== "expanded") return;
  const p = G.level.pillars.find(p => G.claimed.indexOf(p.id) === -1);
  if (!p) return;
  G.hinted = true;
  revealPlaque(p.id, p, true);
  $("markZone").innerHTML = markHtml("info", [t("hint_note")]);
  $("btnHint").disabled = true;
  saveHostRun();
}

/* per-level payout scale: the finale street doubles, a hint halves */
function levelFactor(level) {
  return (level.finale ? 2 : 1) * (G.hinted ? 0.5 : 1);
}

/* 回聲 ×N inked under the claimer's name: inclusion made visible */
function renderEchoTally(root) {
  G.echoTally[root] = (G.echoTally[root] || 0) + 1;
  G.level.pillars.filter(p => p.root === root).forEach(p => {
    let el = document.querySelector(`.zb-echotally[data-for="${p.id}"]`);
    if (!el) {
      const mark = document.querySelector(`.zb-rootmark[data-for="${p.id}"]`);
      if (!mark) return;
      el = document.createElementNS("http://www.w3.org/2000/svg", "text");
      el.setAttribute("x", mark.getAttribute("x"));
      el.setAttribute("y", 236);
      el.setAttribute("class", "zb-echotally");
      el.setAttribute("data-for", p.id);
      mark.parentNode.appendChild(el);
    }
    el.textContent = fmt("echo_tally", { n: G.echoTally[root] });
  });
}

function blowPillar(id, root, name) {
  const g = document.querySelector(`.zb-pillar[data-id="${id}"]`);
  const mark = document.querySelector(`.zb-rootmark[data-for="${id}"]`);
  const x = pillarX(id);
  strikeFactor($("exprBoard"), id, name);
  killLights(G.claimed.length >= G.level.pillars.length ? 1 : 0.5);
  g.classList.add("blown");
  mark.innerHTML = svgMath("x = " + ZBLevels.num(root));
  mark.classList.add("show");
  if (name) {
    // multi-device: the claimer's name is inked on the rubble
    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
    label.setAttribute("x", x);
    label.setAttribute("y", 226);
    label.setAttribute("class", "zb-claimname show");
    label.textContent = name;
    mark.parentNode.appendChild(label);
  }
  ZBFX.debris(x, 180, { count: 24 });
  ZBFX.dust(x, GROUND - 6, { count: 3 });
  ZBFX.shake(8);
  ZBFX.vibrate(80);
}

/* wrong code: the structure takes the blow and visibly shrugs it off.
 * Ink chips off the standing pillars, the drawing recoils, and the
 * surveyed strength — the product evaluated at the guess, visibly not
 * zero — is pencilled over the scene. Only zero punches through. */
function shrugOff(v) {
  const svg = $("structSvg");
  svg.classList.remove("zb-shrug");
  void svg.getBoundingClientRect();
  svg.classList.add("zb-shrug");
  setTimeout(() => svg.classList.remove("zb-shrug"), 420);
  camPunch(); // the camera recoils with the drawing
  G.level.pillars.forEach(p => {
    if (G.claimed.indexOf(p.id) !== -1) return;
    const x = pillarX(p.id);
    ZBFX.debris(x, 168, { count: 5, power: 0.45 });
    ZBFX.dust(x, GROUND - 6, { count: 2 });
  });
  // no tag while the level card still covers the scene (the margin
  // note carries the number; the card must stay clean)
  if ($("levelCard").classList.contains("show")) return;
  const old = document.querySelector(".zb-strengthflash");
  if (old) old.remove();
  const tag = document.createElement("div");
  tag.className = "zb-strengthflash";
  tag.textContent = fmt("strength_tag", { n: ZBLevels.strength(G.level, v) });
  $("scene").appendChild(tag);
  setTimeout(() => tag.remove(), 1350);
}

/* partial demolition: the deck sags toward the missing support */
function sagDeck(hitId) {
  const level = G.level;
  const standing = level.pillars.find(p => G.claimed.indexOf(p.id) === -1);
  if (!standing) return;
  $("deck").classList.add(pillarX(hitId) < pillarX(standing.id) ? "sag-l" : "sag-r");
}

/* the crack pre-beat: jagged fault lines flash across the deck an
 * instant before the chunks separate along them */
function showCracks() {
  const bb = $("deck").getBBox();
  const y0 = bb.y + bb.height * 0.35;
  const mk = (x, y, segs) => {
    let d = `M${x.toFixed(1)} ${y.toFixed(1)}`;
    segs.forEach(s => { d += ` l${s[0]} ${s[1]}`; });
    return d;
  };
  const paths = [
    mk(bb.x + bb.width * 0.2, y0 + 10, [[14, 8], [10, -6], [16, 10], [12, -4], [18, 8]]),
    mk(bb.x + bb.width * 0.62, bb.y + 8, [[8, 12], [-6, 10], [10, 14], [-4, 12]]),
    mk(bb.x + bb.width * 0.45, y0 - 8, [[-10, 10], [8, 9], [-12, 12]]),
  ];
  $("structSvg").insertAdjacentHTML("beforeend",
    `<g class="zb-cracks" id="cracks">${paths.map(d => `<path pathLength="1" d="${d}"/>`).join("")}</g>`);
}

function submitCode(v, player) {
  if (G.over) return;
  const level = G.level;
  const res = ZBLevels.judge(level, v, G.claimed);

  if (player) { hostVerdict(player, v, res); return; }
  if (!G.staged) return; // the pad is disabled pre-ignite; belt and braces

  if (res.already) {
    $("markZone").innerHTML = markHtml("info", [t("note_already") + "：" + mathHtml("x = " + ZBLevels.num(v))]);
    return;
  }

  if (!res.correct) {
    G.streak = 0;
    renderStreak($("stars"), 0);
    const lines = ZBLevels.workingWrong(level, v).map(mathHtml)
      .concat([fmt("note_strength", { n: ZBLevels.strength(level, v) })]);
    $("markZone").innerHTML = markHtml("wrong", lines);
    $("exprBoard").classList.add("mc-shake");
    setTimeout(() => $("exprBoard").classList.remove("mc-shake"), 400);
    shrugOff(v);
    ZBFX.audio.knock();
    ZBFX.vibrate(180);
    pad.lock(3);
    return;
  }

  // correct: claim + detonate every matching pillar (both, for L5).
  // Streak multiplier uses the streak BEFORE this answer.
  const remainFrac = (G.deadline - performance.now()) / G.duration;
  const pts = Math.round(ZBLevels.points(remainFrac, res.hit.length, G.streak) * levelFactor(level));
  G.levelPoints += pts;
  G.score += pts;
  G.streak += 1;
  G.starsTotal += 1;
  tweenScore($("scoreBox"), G.score);
  floatPoints(pts, pillarX(res.hit[0]));
  renderStreak($("stars"), G.streak);

  // L6: reveal the hidden factor on the plaque just before it blows
  if (level.kind === "expanded") {
    res.hit.forEach(id => {
      const p = level.pillars.find(p => p.id === id);
      revealPlaque(id, p);
    });
  }

  res.hit.forEach(id => {
    const p = level.pillars.find(p => p.id === id);
    G.claimed.push(id);
    blowPillar(id, p.root);
  });
  ZBFX.audio.boom(res.hit.length > 1);

  const lines = ZBLevels.workingHit(level, v).map(mathHtml).concat([
    (res.hit.length > 1 ? t("note_both_down") + " " : "") + fmt("points_fmt", { n: pts }),
  ]);
  $("markZone").innerHTML = markHtml("correct", lines);
  GameBridge.emit(SLUG, "score", { level: level.n, points: pts, score: G.score });

  const allDown = G.claimed.length === level.pillars.length;
  if (allDown) collapseAndAdvance();
  else sagDeck(res.hit[0]);
}

/* per-player fastest solve of the game, for the personal end report.
 * A grace-window echo computes against the rewritten deadline and
 * comes out huge — Math.min keeps it harmless. */
function recordSolveMs(pid) {
  const ms = Math.round(G.duration - Math.max(0, G.deadline - performance.now()));
  if (ms > 0) G.bestMs[pid] = Math.min(G.bestMs[pid] || Infinity, ms);
}

/* host mode: judge a phone's submission, write the private verdict,
 * and drive the shared scene. Wrong answers stay off the projector. */
function hostVerdict(player, v, res) {
  const level = G.level;

  if (res.already) {
    // echo: a correct code for an already-claimed pillar still pays
    // 40% of base and keeps the streak alive — every phone gets to
    // solve every equation. Once per player per root; the claimer's
    // own resubmit and repeat echoes are harmless duplicates.
    const owner = Object.values(G.claimsBy).find(c => c.root === v);
    const echoKey = player.id + "|" + v;
    if ((owner && owner.by === player.id) || G.echoDone[echoKey]) {
      G.room.set("verdicts/" + player.id, {
        seq: player.seq, v: v, already: true,
        claimedBy: owner ? owner.name : "",
        total: G.scores[player.id] || 0, level: level.n,
      });
      return;
    }
    G.echoDone[echoKey] = true;
    const matching = level.pillars.filter(p => p.root === v).length;
    const echoFrac = (G.deadline - performance.now()) / G.duration;
    const echoPts = Math.round(ZBLevels.points(echoFrac, matching, G.streaks[player.id] || 0, 0.4) * levelFactor(level));
    G.scores[player.id] = (G.scores[player.id] || 0) + echoPts;
    G.streaks[player.id] = (G.streaks[player.id] || 0) + 1;
    G.starsBy[player.id] = (G.starsBy[player.id] || 0) + 1;
    G.scoredRound[player.id] = true;
    recordSolveMs(player.id);
    // game-long echo tally for the personal end report (echoDone
    // itself is per-round state)
    G.echoCountBy[player.id] = (G.echoCountBy[player.id] || 0) + 1;
    G.room.update("state/scores", { [player.id]: G.scores[player.id] });
    G.room.set("verdicts/" + player.id, {
      seq: player.seq, v: v, echo: true, hit: matching, pts: echoPts,
      claimedBy: owner ? owner.name : "",
      streak: G.streaks[player.id], total: G.scores[player.id], level: level.n,
    });
    renderEchoTally(v);
    renderHostBoard();
    saveHostRun();
    return;
  }

  if (!res.correct) {
    G.streaks[player.id] = 0;
    G.room.set("verdicts/" + player.id, {
      seq: player.seq, v: v, ok: false, streak: 0,
      total: G.scores[player.id] || 0, level: level.n,
    });
    saveHostRun();
    return;
  }

  const remainFrac = (G.deadline - performance.now()) / G.duration;
  const pts = Math.round(ZBLevels.points(remainFrac, res.hit.length, G.streaks[player.id] || 0) * levelFactor(level));
  G.levelPoints += pts; // the 拆 stamp caption shows the level's total bounty
  G.scores[player.id] = (G.scores[player.id] || 0) + pts;
  G.streaks[player.id] = (G.streaks[player.id] || 0) + 1;
  G.starsBy[player.id] = (G.starsBy[player.id] || 0) + 1;
  G.scoredRound[player.id] = true;
  recordSolveMs(player.id);

  if (level.kind === "expanded") {
    res.hit.forEach(id => {
      const p = level.pillars.find(p => p.id === id);
      revealPlaque(id, p);
    });
  }
  res.hit.forEach(id => {
    const p = level.pillars.find(p => p.id === id);
    G.claimed.push(id);
    G.claimsBy[id] = { by: player.id, name: player.name, root: p.root };
    blowPillar(id, p.root, player.name);
  });
  floatPoints(pts, pillarX(res.hit[0]));
  ZBFX.audio.boom(res.hit.length > 1);

  G.room.update("state/claims", Object.fromEntries(res.hit.map(id => [id, G.claimsBy[id]])));
  G.room.update("state/scores", { [player.id]: G.scores[player.id] });
  G.room.set("verdicts/" + player.id, {
    seq: player.seq, v: v, ok: true, hit: res.hit.length, pts: pts,
    streak: G.streaks[player.id], total: G.scores[player.id], level: level.n,
  });
  renderHostBoard();
  saveHostRun();
  GameBridge.emit(SLUG, "score", { level: level.n, points: pts, player: player.name });

  const allDown = G.claimed.length === level.pillars.length;
  if (allDown) enterGrace();
  else sagDeck(res.hit[0]);
}

/* multi only: the last claim doesn't collapse the street immediately —
 * the structure goes critical for min(grace, remaining fuse) so slower
 * phones can still land echo solves. Solo skips this entirely. */
function enterGrace() {
  if (G.grace) return;
  const remainMs = Math.max(0, G.deadline - performance.now());
  const graceMs = Math.min(CFG.grace * 1000, remainMs);
  if (graceMs < 400) { collapseAndAdvance(); return; }
  G.grace = true;
  G.lastGraceSec = null;
  G.deadline = performance.now() + graceMs;
  $("scene").classList.add("critical");
  scatterCrew();
  ZBFX.shake(6);
  ZBFX.bgm.setIntensity("grace"); // the count-in roll
  G.room.update("state", { deadlineEpoch: Date.now() + graceMs, graceUntil: Date.now() + graceMs });
  saveHostRun();
}

/* live leaderboard under the host scene: medal chips on the top three,
 * overtaking rows FLIP-glide to their new rank, scores roll */
function renderHostBoard() {
  const board = $("hostBoard");
  const prevTop = {}, prevPts = {};
  [...board.children].forEach(r => {
    if (!r.dataset.id) return;
    prevTop[r.dataset.id] = r.getBoundingClientRect().top;
    prevPts[r.dataset.id] = parseInt((r.querySelector(".zb-hostboard__pts") || {}).textContent, 10);
  });
  const rows = Object.keys(G.players)
    .map(id => ({ id: id, name: (G.players[id] || {}).name || t("player"), pts: G.scores[id] || 0 }))
    .sort((a, b) => b.pts - a.pts)
    .slice(0, 6);
  board.innerHTML = rows.map((r, i) => `
    <div class="zb-hostboard__row" data-id="${r.id}">
      <span class="zb-hostboard__rank${i < 3 ? " zb-rank zb-rank--" + (i + 1) : ""}">${i + 1}</span>
      <span class="zb-hostboard__name">${escapeText(r.name)}</span>
      ${multHtml(G.streaks[r.id] || 0)}
      <span class="zb-hostboard__pts">${r.pts}</span>
    </div>`).join("");
  [...board.children].forEach(row => {
    const was = prevTop[row.dataset.id];
    if (was != null && !ZBFX.reduced) {
      const dy = was - row.getBoundingClientRect().top;
      if (Math.abs(dy) > 4) {
        row.classList.add("zb-flip");
        row.style.transition = "none";
        row.style.transform = `translateY(${dy}px)`;
        requestAnimationFrame(() => {
          row.style.transition = "transform 0.35s cubic-bezier(0.2, 0.9, 0.3, 1)";
          row.style.transform = "";
          setTimeout(() => { row.classList.remove("zb-flip"); row.style.transition = ""; }, 420);
        });
      }
    }
    const ptsEl = row.querySelector(".zb-hostboard__pts");
    const from = prevPts[row.dataset.id];
    const to = parseInt(ptsEl.textContent, 10);
    if (!isNaN(from) && from !== to) { ptsEl.textContent = from; tweenScore(ptsEl, to); }
  });
  renderStrugglers();
}
function escapeText(s) {
  return String(s).replace(/[&<>"]/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));
}

/* the projector's campaign arc: every resolved building becomes a tiny
 * stamped silhouette on the street strip (01 → 12), a mini 拆 for the
 * cleared ones, a red cross for survivors */
const MINI_SIL = {
  1: "M6 34 h28 M12 34 V22 h16 V34 M12 27 h16 M10 22 L20 14 L30 22",
  2: "M6 34 h28 M11 34 V19 h18 V34 M8 19 L20 10 L32 19",
  3: "M4 34 h32 M7 34 V13 h26 V34 M7 21 h26",
  4: "M4 34 h32 M10 34 V26 M30 34 V26 M10 28 Q20 16 30 28",
  5: "M12 34 h16 M15 34 L17 8 h6 L25 34",
  6: "M6 34 h28 M10 34 V12 h20 V34 M14 12 V6 h12 V12 M20 6 V2",
};
function renderStreet() {
  const el = $("streetStrip");
  if (!el) return;
  el.innerHTML = G.records.map((r, i) => `
    <span class="zb-street__item">
      <svg viewBox="0 0 40 40"><path d="${MINI_SIL[r.n]}"/>${r.cleared ? "" : '<path class="no" d="M10 12 L30 32 M30 12 L10 32"/>'}</svg>
      ${r.cleared ? '<span class="zb-street__chai">拆</span>' : ""}
      <span class="zb-street__n">${String(i + 1).padStart(2, "0")}</span>
    </span>`).join("");
}

/* who hasn't scored this round — a count only, never names: the tutor
 * knows where to walk without putting anyone on the projector */
function renderStrugglers() {
  const el = $("strugglers");
  if (G.mode !== "host" || !G.started || G.over) { el.style.display = "none"; return; }
  const n = Object.keys(G.players).filter(id => !G.scoredRound[id]).length;
  el.textContent = fmt("strugglers_fmt", { n: n });
  el.style.display = n > 0 ? "" : "none";
}

/* ── host refresh recovery ──
 * The run snapshot lives in sessionStorage keyed by room code, written
 * on every round boundary and verdict. An accidental F5 then offers
 * 繼續上一場: reclaim the room, restore the books, re-publish state. */
function saveHostRun() {
  if (G.mode !== "host" || !G.room || !G.started || G.ended) return;
  try {
    sessionStorage.setItem("zb-run-" + G.room.code, JSON.stringify({
      code: G.room.code, ts: Date.now(),
      idx: G.idx, over: G.over, levels: G.levels, records: G.records,
      scores: G.scores, streaks: G.streaks, starsBy: G.starsBy,
      claimsBy: G.claimsBy, claimed: G.claimed, echoDone: G.echoDone,
      scoredRound: G.scoredRound, processedSeq: G.processedSeq, hinted: G.hinted,
      echoTally: G.echoTally, bestMs: G.bestMs, echoCountBy: G.echoCountBy,
      players: G.players, levelPoints: G.levelPoints,
      deadlineEpoch: Date.now() + Math.max(0, Math.round(G.deadline - performance.now())),
    }));
  } catch (_) {}
}
function clearHostRun() {
  if (!G.room) return;
  try { sessionStorage.removeItem("zb-run-" + G.room.code); } catch (_) {}
}
function pendingHostRun() {
  try {
    let best = null;
    for (let i = 0; i < sessionStorage.length; i++) {
      const key = sessionStorage.key(i);
      if (!key || key.indexOf("zb-run-") !== 0) continue;
      const saved = JSON.parse(sessionStorage.getItem(key));
      if (!saved || !saved.code || !saved.levels || !saved.levels.length) continue;
      if (Date.now() - (saved.ts || 0) > 6 * 3600 * 1000) continue;
      if (!best || saved.ts > best.ts) best = saved;
    }
    return best;
  } catch (_) { return null; }
}

async function resumeRun(saved) {
  ZBFX.audio.unlock();
  try {
    G.room = await GameBridge.host({ slug: SLUG, code: saved.code });
  } catch (err) {
    // room gone (closed or expired): drop the stale snapshot
    $("btnResume").style.display = "none";
    try { sessionStorage.removeItem("zb-run-" + saved.code); } catch (_) {}
    return;
  }
  G.mode = "host";
  G.levels = saved.levels;
  // a snapshot taken after the round resolved resumes at the next one
  G.idx = saved.over ? saved.idx + 1 : saved.idx;
  G.records = saved.records || [];
  G.scores = saved.scores || {};
  G.streaks = saved.streaks || {};
  G.starsBy = saved.starsBy || {};
  G.claimsBy = saved.claimsBy || {};
  G.bestMs = saved.bestMs || {};
  G.echoCountBy = saved.echoCountBy || {};
  G.processedSeq = saved.processedSeq || {};
  G.players = saved.players || {};
  G.score = 0; G.streak = 0; G.starsTotal = 0;
  G.started = true;
  G.ended = false;
  $("padWrap").style.display = "none";
  $("hostBoard").style.display = "";
  $("tutorBar").style.display = "";
  // restore what the phones rely on, then rejoin the judging loop
  G.room.update("players", G.players);
  G.room.set("state/scores", G.scores);
  G.watcher = G.room.watch(onHostRoom);
  GameBridge.emit(SLUG, "start", { mode: "host", resumed: true, players: Object.keys(G.players).length });
  if (G.idx >= G.levels.length) { endGame(); return; }
  show("gameScreen");
  renderHostBoard();
  startLevel(saved.over ? null : saved);
}

function collapseAndAdvance() {
  G.over = true;
  G.grace = false;
  $("scene").classList.remove("critical", "lastcall");
  settleSoundOffer();
  cancelAnimationFrame(G.raf);
  ZBFX.audio.fuseStop();
  ZBFX.sparksAt(null);
  pad.disable();

  const elapsed = G.duration - Math.max(0, G.deadline - performance.now());
  G.records.push({ n: G.level.n, stage: G.level.stage, round: G.level.round, cleared: true, ms: elapsed, pts: G.levelPoints });
  if (G.mode === "host") G.room.update("state", { phase: "cooldown", graceUntil: null });
  renderStreet();
  saveHostRun();

  /* the demolition set piece, one labelled timeline: crack pre-beat,
   * the deck breaks, the pile inks, the graph sketches, the 拆 chop
   * slams and packs it down, the page turns. Every beat is retimed by
   * its label alone. */
  const level = G.level;
  const finale = G.idx === G.levels.length - 1;
  const tl = G.beatTl = gsap.timeline();
  tl.addLabel("crack", 0.38)
    .addLabel("fall", 0.53)
    .addLabel("rubble", 1.02)
    .addLabel("graph", 1.12)
    .addLabel("stamp", 1.18)
    .addLabel("dissolve", 1.35)
    .addLabel("chop", 1.46)
    .addLabel("turn", 2.2);
  // a fast class can beat the warn window: the crew still gets its
  // head start, and the foreman leans onto the plunger at the crack
  tl.call(scatterCrew, null, 0);
  tl.call(foremanPush, null, "crack");
  // fault lines flash, one small shake pulse, a 90ms hit-stop, THEN
  // the break — flash, shockwave, torn paper, a punch on the frame.
  // All inside the fixed crack→fall gap: no label ever moves.
  tl.call(() => {
    showCracks();
    ZBFX.shake(5);
    ZBFX.audio.crack();
  }, null, "crack");
  if (!ZBFX.reduced) tl.call(blastHold, null, 0.44);
  tl.call(() => {
    const cracks = $("cracks");
    if (cracks) cracks.remove();
    $("deck").classList.remove("sag-l", "sag-r");
    $("deck").classList.add("fall");
    ZBFX.audio.collapse();
    ZBFX.bgm.duck(150); // the blast owns the room
    ZBFX.bgm.setIntensity("base"); // no warn ticks over the rubble reveal
    ZBFX.shake(16);
    ZBFX.vibrate([60, 40, 130]);
    ZBFX.debris(200, 130, { count: 100, power: 1.5 });
    ZBFX.dust(200, GROUND - 10, { count: 6 });
    camBlast(); // punch in, follow the fall, pull back for the graph
    if (!ZBFX.reduced) {
      blastFlash();
      blastRing(200, DECK_Y);
      ZBFX.scraps(200, 135, { count: 5 + level.n });
      // the finale's frame punch, promoted to every collapse and
      // scaled by the building
      gsap.fromTo(".zb-scenewrap", { scale: 1 },
        { scale: 1.02 + level.n * 0.004, duration: 0.09, yoyo: true, repeat: 1, ease: "power2.out", clearProps: "scale" });
    }
  }, null, "fall");
  tl.call(() => {
    $("rubble").classList.add("show");
    ZBFX.dust(200, GROUND - 14, { count: 4 });
  }, null, "rubble");
  if (G.graphOn) {
    tl.call(() => {
      if (G.level === level && $("structSvg")) $("structSvg").insertAdjacentHTML("beforeend", graphSvg(level));
    }, null, "graph");
  }
  tl.call(() => {
    $("sceneStamp").innerHTML =
      `<div class="zb-chaiflash"></div><div class="zb-chai">拆</div><div class="zb-chai__cap">${t("stamp_demolished")} · ${fmt("points_fmt", { n: G.levelPoints })}</div>`;
    $("sceneStamp").classList.add("show");
  }, null, "stamp");
  // the landed debris melts into the inked pile
  tl.call(() => {
    const deck = $("deck");
    if (deck) deck.classList.add("dissolve");
  }, null, "dissolve");
  // the chop lands (~55% into the slam): the pile packs down under it
  tl.call(() => {
    const rubble = $("rubble");
    if (rubble) rubble.classList.add("compact");
    ZBFX.dustRing(200, GROUND - 6);
    ZBFX.shake(6);
    ZBFX.audio.stamp();
  }, null, "chop");
  tl.call(nextLevel, null, "turn");

  /* finale set piece: the street's last building falls in slow motion
   * (timeline timeScale dips with the CSS tumble stretched to match),
   * the scene takes a scale punch as the chop lands, and the ink
   * splatter + gold star rain are timed to the chop label. Reduced
   * motion is the one gate: the set piece is skipped whole. */
  if (finale) {
    tl.call(() => {
      ZBFX.splatter(200, 110);
      ZBFX.starRain();
    }, null, "chop");
    if (!ZBFX.reduced) {
      tl.call(() => {
        $("deck").style.setProperty("--falldur", "1.35s");
        tl.timeScale(0.5);
      }, null, "fall");
      tl.call(() => {
        gsap.to(tl, { timeScale: 1, duration: 0.4, ease: "power1.in" });
      }, null, "rubble");
      tl.call(() => {
        gsap.fromTo(".zb-scenewrap", { scale: 1 }, { scale: 1.03, duration: 0.09, yoyo: true, repeat: 1, ease: "power2.out", clearProps: "scale" });
      }, null, "chop");
    }
  }
}

function fuseOut() {
  G.over = true;
  // the fizzle stays deliberately quiet — the sky clears, the camera
  // breathes back out of the warn creep
  $("scene").classList.remove("lastcall");
  camRelax();
  settleSoundOffer();
  cancelAnimationFrame(G.raf);
  ZBFX.audio.fuseStop();
  ZBFX.audio.fizzle();
  ZBFX.bgm.setIntensity("idle"); // a fizzle deflates: drop to sparse
  ZBFX.sparksAt(null);
  pad.disable();
  $("fuseTimerText").textContent = "0.0";
  // a tutor skip can land before the round opened: the reveal must
  // never talk through a covered board
  G.staged = true;
  openBoard($("exprBoard"));
  G.streak = 0;
  renderStreak($("stars"), 0);
  G.records.push({ n: G.level.n, stage: G.level.stage, round: G.level.round, cleared: false, ms: G.duration, pts: G.levelPoints });
  if (G.mode === "host") {
    G.streaks = {}; // a survived structure breaks everyone's streak
    G.room.update("state", { phase: "reveal" });
  }
  renderStreet();
  saveHostRun();

  // the structure survives; reveal the full solution with working
  const level = G.level;
  const rootsLine = t("note_reveal") + "：" +
    ZBLevels.roots(level).map(r => mathHtml("x = " + ZBLevels.num(r))).join(" " + t("or") + " ");
  const fact = ZBLevels.factorisation(level);
  const lines = (fact ? [mathHtml(fact)] : []).concat([rootsLine]);
  $("markZone").innerHTML = markHtml("wrong", lines) + miniGraphHtml(level);

  /* the condemned beat on its own labelled timeline: the chop and
   * tape land, the survivor takes the hit and settles, and (solo)
   * the page turns after the reading pause */
  const tl = G.beatTl = gsap.timeline();
  tl.addLabel("condemn", 0).addLabel("settle", 0.26);
  tl.call(() => {
    // one stamp language: a rotated corner chop and red tape across
    // the survivor (the working stays in the mark zone)
    $("sceneStamp").innerHTML = `<div class="zb-condemn">${t("stamp_standing")}</div>`;
    $("sceneStamp").classList.add("show");
    ZBFX.audio.stampSoft();
    const bb = $("deck").getBBox();
    const tx1 = bb.x + 8, tx2 = bb.x + bb.width - 8;
    const ty1 = Math.max(bb.y - 2, 8), ty2 = Math.min(bb.y + bb.height, DECK_Y) + 2;
    $("structSvg").insertAdjacentHTML("beforeend",
      `<g class="zb-tape"><path pathLength="1" d="M${tx1.toFixed(1)} ${ty1.toFixed(1)} L${tx2.toFixed(1)} ${ty2.toFixed(1)}"/><path pathLength="1" d="M${tx2.toFixed(1)} ${ty1.toFixed(1)} L${tx1.toFixed(1)} ${ty2.toFixed(1)}"/></g>`);
  }, null, "condemn");
  tl.call(() => {
    const deck = $("deck");
    if (!deck) return;
    deck.classList.add("settle");
    ZBFX.dust(160, DECK_Y + 4, { count: 2 });
    ZBFX.dust(240, DECK_Y + 4, { count: 2 });
    ZBFX.shake(3);
  }, null, "settle");
  // tutor-paced in class: the reveal waits for 下一關 (key n) so the
  // codes can be talked through; solo gets time to note them down
  if (G.mode === "host") {
    G.revealHold = true;
    setSkipLabel("tutor_next");
  } else {
    tl.addLabel("turn", 5.5);
    tl.call(nextLevel, null, "turn");
  }
}

function nextLevel() {
  if (G.ended) return;
  G.idx += 1;
  if (G.idx >= G.levels.length) { endGame(); return; }
  ZBFX.audio.page();
  if (ZBFX.reduced) { startLevel(); return; }
  // page turn: the finished worksheet lifts away, the next slides in
  // under its title-block cover
  const grid = document.querySelector("#gameScreen .zb-game-grid");
  grid.classList.add("zb-page-out");
  setTimeout(() => {
    grid.classList.remove("zb-page-out");
    grid.classList.add("zb-page-in");
    startLevel();
    setTimeout(() => grid.classList.remove("zb-page-in"), 400);
  }, 240);
}

function leaderboardHtml(results, meId) {

    <div class="zb-hostboard__row${r.id === meId ? " me" : ""}" style="--ri:${i}">

}

function endGame() {
  ZBFX.bgm.stop(); // the report's ceremony one-shots own the end screen
  if (G.mode === "host") {
    clearHostRun();
    const results = Object.keys(G.players).map(id => ({
      id: id,
      name: (G.players[id] || {}).name || t("player"),
      score: G.scores[id] || 0,
      stars: G.starsBy[id] || 0,

    G.room.update("state", { phase: "end", results: results });
    GameBridge.emit(SLUG, "complete", { mode: "multi", results: results });
    $("endScoreLabel").setAttribute("data-i18n", "end_leaderboard");

    staggerStars($("endStars"));
    $("endRecord").innerHTML = `<div class="zb-hostboard" style="max-width:none">${leaderboardHtml(results, null)}</div>`;
    refreshDynamicText();
    show("endScreen");
    endCeremonyAudio();
    return;
  }
  GameBridge.emit(SLUG, "complete", { score: G.score, stars: G.starsTotal, records: G.records });
  $("endScoreLabel").setAttribute("data-i18n", "end_score_label");
  $("endScoreLabel").textContent = t("end_score_label");
  $("endScore").textContent = "0";
  tweenScore($("endScore"), G.score, 900);
  renderStars($("endStars"), G.starsTotal);
  staggerStars($("endStars"));
  $("endRecord").innerHTML = G.records.map((r, i) => `
    <div class="zb-record__row" style="--ri:${i}">
      <span class="zb-record__lv">${r.stage}-${r.round}</span>
      <span class="zb-record__name">${t("b" + r.n)}<small>${t("lv" + r.n)}</small></span>
      <span class="zb-record__mark"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${
        r.cleared ? '<path pathLength="1" class="ok draw" d="M4 13l5.5 5.5L20 6.5"/>'
                  : '<path pathLength="1" class="no draw" d="M6 6l12 12M18 6L6 18"/>'
      }</svg></span>
      <span class="zb-record__pts">${r.cleared ? fmt("time_fmt", { s: (r.ms / 1000).toFixed(1) }) + " · " : ""}${r.pts}</span>

/* wide viewport = projector: bigger stage on every screen, intro too */
function applyProjector() {

applyProjector();

$("btnHost").onclick = async () => {

/* client-generated player ids: anything else in players/ or subs/ is
 * junk or an attack (an RTDB key like "__proto__" would resolve
 * G.processedSeq[pid] to Object.prototype and misfire the dedupe) */
const PID_RE = /^p[a-z0-9]{6,10}$/;

function onHostRoom(room) {
  if (!room) return;
  // rules cap names at 24 chars; the host truncates anyway so one
  // oversize write can never thrash the projector layout
  const players = {};
  Object.keys(room.players || {}).forEach(pid => {
    if (!PID_RE.test(pid)) return;
    const pl = room.players[pid] || {};
    players[pid] = Object.assign({}, pl, { name: String(pl.name || "").slice(0, 24) });
  });
  G.players = players;

  if (!G.started) {
    renderLobbyList();
    const n = Object.keys(G.players).length;
    if (n) {
      $("lobbyStatus").textContent = fmt("lobby_players", { n: n });
      $("btnStartMulti").style.display = "";
    }
  } else {
    renderStrugglers(); // joins/leaves change the count mid-round
  }

  // judge new submissions (one slot per player, seq strictly increasing)
  const subs = room.subs || {};
  Object.keys(subs).forEach(pid => {
    if (!PID_RE.test(pid)) return;
    const sub = subs[pid];
    if (!sub || typeof sub.seq !== "number" || typeof sub.v !== "number") return;
    if ((G.processedSeq[pid] || 0) >= sub.seq) return;
    G.processedSeq[pid] = sub.seq;
    if (!G.started || G.over) return; // between rounds: consumed, not judged
    const pl = G.players[pid] || {};
    submitCode(sub.v, { id: pid, name: pl.name || t("player"), seq: sub.seq });
  });
}

$("btnStartMulti").onclick = () => startRun("host");

/* ── lobby moderation: tap a chip, tap again to remove the player ── */
let kickArmed = { id: null, at: 0 };
function renderLobbyList() {
  $("playerList").innerHTML = Object.keys(G.players).map(id => {
    const armed = id === kickArmed.id;
    const label = armed ? t("kick_confirm") : escapeText((G.players[id] || {}).name || t("player"));
    return `<span data-id="${id}"${armed ? ' class="arm"' : ""}>${label}</span>`;
  }).join("");
}
$("playerList").addEventListener("click", e => {
  const chip = e.target.closest("span[data-id]");
  if (!chip || G.started || !G.room) return;
  const id = chip.getAttribute("data-id");
  if (kickArmed.id === id && performance.now() - kickArmed.at < 2500) {
    kickArmed = { id: null, at: 0 };
    G.room.set("players/" + id, null); // the phone sees itself vanish
    return; // the deletion snapshot re-renders the list
  }
  kickArmed = { id: id, at: performance.now() };
  renderLobbyList();
  setTimeout(() => {
    if (kickArmed.id === id && performance.now() - kickArmed.at >= 2400) {
      kickArmed = { id: null, at: 0 };
      renderLobbyList();
    }
  }, 2600);
});

/* ── tutor controls (host only): +15s, skip/next, end ── */

/* the skip button doubles as 下一關 while a reveal holds */
function setSkipLabel(key) {
  const btn = $("btnSkip");
  btn.setAttribute("data-i18n", key);
  btn.textContent = t(key);
}

function tutorPlus15() {
  if (G.mode !== "host" || !G.started || G.over) return;
  G.deadline += 15000;
  const epoch = Date.now() + Math.max(0, G.deadline - performance.now());
  const upd = { deadlineEpoch: epoch };
  if (G.grace) upd.graceUntil = epoch;
  G.room.update("state", upd);
  // stamp the gift over the scene so the class notices
  const flash = document.createElement("div");
  flash.className = "zb-plusflash";
  flash.textContent = t("tutor_plus15");
  $("scene").appendChild(flash);
  setTimeout(() => flash.remove(), 1600);
}

function tutorSkip() {
  if (G.mode !== "host" || !G.started) return;
  if (G.revealHold) {
    // the held fuse-out reveal advances only on the tutor's word
    G.revealHold = false;
    setSkipLabel("tutor_skip");
    nextLevel();
    return;
  }
  if (G.over) return;
  // during grace everything is already down: collapse now, don't "fail"
  G.grace ? collapseAndAdvance() : fuseOut();
}

let endArmed = 0;
function tutorEnd() {
  if (G.mode !== "host" || !G.started) return;
  const btn = $("btnEndGame");
  if (!endArmed || performance.now() - endArmed > 2500) {
    endArmed = performance.now();
    btn.classList.add("confirm");
    btn.textContent = t("tutor_confirm");
    setTimeout(() => {
      if (endArmed && performance.now() - endArmed >= 2400) {
        endArmed = 0;
        btn.classList.remove("confirm");
        btn.textContent = t("tutor_end");
      }
    }, 2600);
    return;
  }
  endArmed = 0;
  btn.classList.remove("confirm");
  btn.textContent = t("tutor_end");
  G.ended = true; // cancels any pending nextLevel between rounds
  G.over = true;
  G.grace = false;
  $("scene").classList.remove("critical");
  cancelAnimationFrame(G.raf);
  ZBFX.audio.fuseStop();
  ZBFX.sparksAt(null);
  endGame();
}

function tutorHint() {
  if (G.mode !== "host" || !G.started || G.over) return;
  showHint();
}

$("btnPlus15").onclick = tutorPlus15;
$("btnHint").onclick = tutorHint;
$("btnSkip").onclick = tutorSkip;
$("btnEndGame").onclick = tutorEnd;
document.addEventListener("keydown", e => {
  if (G.mode !== "host" || !$("gameScreen").classList.contains("active")) return;
  if (e.key === "t") tutorPlus15();
  else if (e.key === "h") tutorHint();
  else if (e.key === "n") tutorSkip();
  else if (e.key === "e") tutorEnd();
  else if (e.key === "g") G.graphOn = !G.graphOn; // resolve graph sketch on/off
});

 * multi-device: controller (student phone)

const C = {
  room: null, watcher: null, id: null, name: null,
  level: null, levelKey: null, phase: null,
  seq: 0, lastVerdictSeq: 0, booted: false, seenSelf: false,
  timerIv: null, deadlineEpoch: 0, graceUntil: 0, pad: null,
  staged: false, // mirrors the projector: board + pad open at fuse ignite
  lastGraceSec: null, // grace 3-2-1 mirrored big on the phone
};

/* the claimer's phone: the kill is YOURS — a full-card 歸零 takeover
 * with your name on the demolition order (batch T) */
function ctrlTakeover(pts) {

    <div class="zb-ctrltakeover__cap">${escapeText(C.name || "")} · ${fmt("points_fmt", { n: pts })}</div>`;
