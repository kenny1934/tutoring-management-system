  score: 0, streak: 0, starsTotal: 0, levelPoints: 0,
  deadline: 0, duration: 0, raf: null, lastTickSec: null,
  fuseLen: 0, fusePathEl: null, over: false, records: [], hinted: false,
  // host mode: room + per-player books (host is authoritative)
  room: null, watcher: null, started: false, grace: false, revealHold: false,
  players: {}, scores: {}, streaks: {}, starsBy: {}, claimsBy: {}, processedSeq: {},
  echoDone: {}, scoredRound: {}, echoTally: {},
};

const pad = makePad($("pad"), $("padPreview"), $("padLock"), $("lockCount"), v => submitCode(v, null));

ZBFX.attach($("fxCanvas"), $("scene"), VB_W, VB_H);

function startRun(mode) {
  G.mode = mode;
  ZBFX.audio.unlock();
  GameBridge.emit(SLUG, "start", { mode: mode, players: Object.keys(G.players).length });
  G.levels = ZBLevels.genPlan(PLAN, newRand());
  G.idx = 0; G.score = 0; G.streak = 0; G.starsTotal = 0; G.records = []; G.ended = false;
  G.scores = {}; G.streaks = {}; G.starsBy = {}; G.claimsBy = {}; G.scoredRound = {};
  G.started = true;
  $("padWrap").style.display = mode === "host" ? "none" : "";
  $("hostBoard").style.display = mode === "host" ? "" : "none";
  $("tutorBar").style.display = mode === "host" ? "" : "none";
  if (mode === "host") {
    G.room.set("state/scores", null);
    G.room.set("state/results", null);
    renderHostBoard();
  }
  show("gameScreen");
  startLevel();
}

$("btnSolo").onclick = () => startRun("solo");
$("btnRestart").onclick = () => startRun(G.mode);
$("btnMenu").onclick = () => {
  if (G.room) {
    clearHostRun(); // the room is closing: nothing left to resume
    if (G.watcher) G.watcher.close();
    G.room.close();
    G.room = null; G.started = false; G.players = {}; G.processedSeq = {};
  }
  applyProjector();
  show("introScreen");
};

/* stage chip: 第 s 關 · kind name · round/rounds (round part only when
 * the stage is a street of several buildings) */
function levelChipHtml(level) {
  const kindName = level.stageKind === "mix" ? t("lv_mix") : t("lv" + level.stageKind);
  const roundPart = level.roundsInStage > 1 ? ` · ${level.round}/${level.roundsInStage}` : "";
  return `<strong>${fmt("level_chip", { n: level.stage })}</strong> · ${kindName}${roundPart}`;
}

function refreshDynamicText() {
  // re-render text that fmt() composed, after a language switch
  if ($("gameScreen").classList.contains("active") && G.level) {
    $("levelChip").innerHTML = levelChipHtml(G.level);
    $("levelCardN").textContent = fmt("level_chip", { n: G.level.stage });
    $("levelCardSub").textContent = t("target_label") + "：" + t("b" + G.level.n) + " · " + t("lv" + G.level.n);
    $("levelCardFin").textContent = G.level.finale ? t("finale_tag") : "";
    $("levelCardFin").style.display = G.level.finale ? "" : "none";
  }
  $("takeawayOr").textContent = t("or");
  $("btnPlus15").title = fmt("tutor_key_title", { k: "t" });
  $("btnHint").title = fmt("tutor_key_title", { k: "h" });
  $("btnSkip").title = fmt("tutor_key_title", { k: "n" });
  $("btnEndGame").title = fmt("tutor_key_title", { k: "e" });
}
refreshDynamicText();

/* resume: a saved host-run snapshot restores mid-round claims and the
 * remaining fuse after a host refresh (see resumeRun) */
function startLevel(resume) {
  const level = G.level = G.levels[G.idx];
  G.claimed = resume ? (resume.claimed || []) : [];
  G.levelPoints = resume ? (resume.levelPoints || 0) : 0;
  G.over = false;
  G.grace = false;
  G.revealHold = false;
  G.echoDone = resume ? (resume.echoDone || {}) : {};
  G.scoredRound = resume ? (resume.scoredRound || {}) : {};
  G.echoTally = resume ? (resume.echoTally || {}) : {};
  G.hinted = resume ? !!resume.hinted : false;
  $("scene").classList.remove("critical");
  setSkipLabel("tutor_skip");
  const hintable = G.mode === "host" && level.kind === "expanded";
  $("btnHint").style.display = hintable ? "" : "none";
  $("btnHint").disabled = G.hinted;
  $("tutorKeys").textContent = hintable ? "t / h / n / e" : "t / n / e";

  refreshDynamicText();
  tweenScore($("scoreBox"), G.score); // snaps when unchanged, cancels a stale tween
  $("exprBoard").innerHTML = exprHtml(level.expr);
  $("markZone").innerHTML = "";
  $("sceneStamp").classList.remove("show");
  $("sceneStamp").innerHTML = "";
  renderStreak($("stars"), G.streak);
  renderStructure(level);
  renderStrugglers();
  pad.enable();

  // fuse: burns only after the level card clears (deadline includes it).
  // A resumed round gets its remaining fuse back, floored at 5s so the
  // class isn't ambushed the moment the projector returns.
  G.duration = level.fuseMs;
  const fuseMs = resume
    ? Math.min(Math.max((resume.deadlineEpoch || 0) - Date.now(), 5000), level.fuseMs)
    : level.fuseMs;
  G.deadline = performance.now() + CARD_MS + fuseMs;

  if (G.mode === "host") {
    // publish the round: phones display from state, host stays the judge
    G.room.update("state", {
      phase: "playing",
      level: level,
      levelIdx: G.idx,
      deadlineEpoch: Date.now() + CARD_MS + fuseMs,
      claims: resume && G.claimed.length
        ? Object.fromEntries(G.claimed.map(id => [id, G.claimsBy[id] || true]))
        : null,
      graceUntil: null,
    });
  }

  // re-ink what was already claimed before the refresh
  if (resume && G.claimed.length) {
    G.claimed.forEach(id => {
      const p = level.pillars.find(p => p.id === id);
      if (!p) return;
      if (level.kind === "expanded") revealPlaque(id, p);
      const c = G.claimsBy[id];
      blowPillar(id, p.root, c && c.name);
    });
    if (G.claimed.length === level.pillars.length) enterGrace();
    else sagDeck(G.claimed[G.claimed.length - 1]);
  }

  // level card flash
  const card = $("levelCard");
  card.classList.remove("show");
  void card.offsetWidth; // restart the animation
  card.classList.add("show");
  setTimeout(() => card.classList.remove("show"), 1250);

  G.fusePathEl = $("fusePath");
  G.fuseLen = G.fusePathEl.getTotalLength();
  G.lastTickSec = null;
  $("fuseTimer").classList.remove("warn");
  setTimeout(() => { if (!G.over && G.level === level) ZBFX.audio.fuseStart(); }, CARD_MS);
  cancelAnimationFrame(G.raf);
  G.raf = requestAnimationFrame(fuseFrame);
  saveHostRun();
}

function fuseFrame() {
  if (G.over) return;
  const remain = Math.max(0, G.deadline - performance.now());
  // during the level card lead-in remain exceeds the fuse: clamp so the
  // fuse sits unburned and the timer shows a full fuse
  const burned = Math.min(1, Math.max(0, 1 - remain / G.duration));
  $("fuseTimerText").textContent = (Math.min(remain, G.duration) / 1000).toFixed(1);
  ZBFX.audio.fuseUrgency(burned);

  // consume the fuse line and ride the spark along it; the emitter
  // holds until the fuse actually ignites (after the level card)
  const ignited = remain <= G.duration;
  const pt = G.fusePathEl.getPointAtLength(G.fuseLen * burned);
  G.fusePathEl.setAttribute("stroke-dasharray", `0 ${G.fuseLen * burned} ${G.fuseLen}`);
  $("fuseSpark").setAttribute("cx", pt.x); $("fuseSpark").setAttribute("cy", pt.y);
  $("fuseGlow").setAttribute("cx", pt.x); $("fuseGlow").setAttribute("cy", pt.y);
  ZBFX.sparksAt(ignited ? pt.x : null, pt.y);

  // finale street: the countdown starts earlier and ticks twice as fast
  const warnAt = G.level.finale ? 10200 : 5200;
  if (remain <= warnAt) {
    $("fuseTimer").classList.add("warn");
    const sec = Math.ceil(remain / (G.level.finale ? 500 : 1000));
    if (sec !== G.lastTickSec) { G.lastTickSec = sec; ZBFX.audio.tick(); }
  }
  // solo scaffold: at half fuse the factorise hint pencils itself in
  if (G.mode === "solo" && G.level.kind === "expanded" && !G.hinted && burned >= 0.5) showHint();

  if (remain <= 0) { G.grace ? collapseAndAdvance() : fuseOut(); return; }
  G.raf = requestAnimationFrame(fuseFrame);
}

function pillarX(id) {
  const mark = document.querySelector(`.zb-rootmark[data-for="${id}"]`);
  return parseFloat(mark.getAttribute("x"));
}

/* L6 plaques: ghost-pencil hint first, full ink on the claim */
function revealPlaque(id, p, ghost) {
  const q = document.querySelector(`[data-qmark="${id}"]`);
  if (q) q.remove();
  const el = document.querySelector(`[data-plaque="${id}"]`);
  el.classList.toggle("zb-hintghost", !!ghost);
  el.innerHTML = svgMath(p.hidden);
}

/* factorise-first scaffold: pencil one hidden factor onto its plaque.
 * Fair, not punitive: the whole building then pays half. Solo shows it
 * at half fuse; in class the tutor triggers it (提示 button / key h). */
function showHint() {
  if (G.hinted || G.over || !G.level || G.level.kind !== "expanded") return;
  const p = G.level.pillars.find(p => G.claimed.indexOf(p.id) === -1);
  if (!p) return;
  G.hinted = true;
  revealPlaque(p.id, p, true);
  $("markZone").innerHTML = markHtml("info", [t("hint_note")]);
  $("btnHint").disabled = true;
  saveHostRun();
}

/* per-level payout scale: the finale street doubles, a hint halves */
function levelFactor(level) {
  return (level.finale ? 2 : 1) * (G.hinted ? 0.5 : 1);
}

/* 回聲 ×N inked under the claimer's name: inclusion made visible */
function renderEchoTally(root) {
  G.echoTally[root] = (G.echoTally[root] || 0) + 1;
  G.level.pillars.filter(p => p.root === root).forEach(p => {
    let el = document.querySelector(`.zb-echotally[data-for="${p.id}"]`);
    if (!el) {
      const mark = document.querySelector(`.zb-rootmark[data-for="${p.id}"]`);
      if (!mark) return;
      el = document.createElementNS("http://www.w3.org/2000/svg", "text");
      el.setAttribute("x", mark.getAttribute("x"));
      el.setAttribute("y", 236);
      el.setAttribute("class", "zb-echotally");
      el.setAttribute("data-for", p.id);
      mark.parentNode.appendChild(el);
    }
    el.textContent = fmt("echo_tally", { n: G.echoTally[root] });
  });
}

function blowPillar(id, root, name) {
  const g = document.querySelector(`.zb-pillar[data-id="${id}"]`);
  const mark = document.querySelector(`.zb-rootmark[data-for="${id}"]`);
  const x = pillarX(id);
  g.classList.add("blown");
  mark.innerHTML = svgMath("x = " + ZBLevels.num(root));
  mark.classList.add("show");
  if (name) {
    // multi-device: the claimer's name is inked on the rubble
    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
    label.setAttribute("x", x);
    label.setAttribute("y", 226);
    label.setAttribute("class", "zb-claimname show");
    label.textContent = name;
    mark.parentNode.appendChild(label);
  }
  ZBFX.debris(x, 180, { count: 24 });
  ZBFX.dust(x, GROUND - 6, { count: 3 });
  ZBFX.shake(8);
  ZBFX.vibrate(80);
}

/* partial demolition: the deck sags toward the missing support */
function sagDeck(hitId) {
  const level = G.level;
  const standing = level.pillars.find(p => G.claimed.indexOf(p.id) === -1);
  if (!standing) return;
  $("deck").classList.add(pillarX(hitId) < pillarX(standing.id) ? "sag-l" : "sag-r");
}

function submitCode(v, player) {
  if (G.over) return;
  const level = G.level;
  const res = ZBLevels.judge(level, v, G.claimed);

  if (player) { hostVerdict(player, v, res); return; }

  if (res.already) {
    $("markZone").innerHTML = markHtml("info", [t("note_already") + "：" + mathHtml("x = " + ZBLevels.num(v))]);
    return;
  }

  if (!res.correct) {
    G.streak = 0;
    renderStreak($("stars"), 0);
    const lines = ZBLevels.workingWrong(level, v).map(mathHtml)
      .concat([fmt("note_strength", { n: ZBLevels.strength(level, v) })]);
    $("markZone").innerHTML = markHtml("wrong", lines);
    $("exprBoard").classList.add("mc-shake");
    setTimeout(() => $("exprBoard").classList.remove("mc-shake"), 400);
    ZBFX.audio.knock();
    ZBFX.vibrate(180);
    pad.lock(3);
    return;
  }

  // correct: claim + detonate every matching pillar (both, for L5).
  // Streak multiplier uses the streak BEFORE this answer.
  const remainFrac = (G.deadline - performance.now()) / G.duration;
  const pts = Math.round(ZBLevels.points(remainFrac, res.hit.length, G.streak) * levelFactor(level));
  G.levelPoints += pts;
  G.score += pts;
  G.streak += 1;
  G.starsTotal += 1;
  tweenScore($("scoreBox"), G.score);
  floatPoints(pts, pillarX(res.hit[0]));
  renderStreak($("stars"), G.streak);

  // L6: reveal the hidden factor on the plaque just before it blows
  if (level.kind === "expanded") {
    res.hit.forEach(id => {
      const p = level.pillars.find(p => p.id === id);
      revealPlaque(id, p);
    });
  }

  res.hit.forEach(id => {
    const p = level.pillars.find(p => p.id === id);
    G.claimed.push(id);
    blowPillar(id, p.root);
  });
  ZBFX.audio.boom(res.hit.length > 1);

  const lines = ZBLevels.workingHit(level, v).map(mathHtml).concat([
    (res.hit.length > 1 ? t("note_both_down") + " " : "") + fmt("points_fmt", { n: pts }),
  ]);
  $("markZone").innerHTML = markHtml("correct", lines);
  GameBridge.emit(SLUG, "score", { level: level.n, points: pts, score: G.score });

  const allDown = G.claimed.length === level.pillars.length;
  if (allDown) collapseAndAdvance();
  else sagDeck(res.hit[0]);
}

/* host mode: judge a phone's submission, write the private verdict,
 * and drive the shared scene. Wrong answers stay off the projector. */
function hostVerdict(player, v, res) {
  const level = G.level;

  if (res.already) {
    // echo: a correct code for an already-claimed pillar still pays
    // 40% of base and keeps the streak alive — every phone gets to
    // solve every equation. Once per player per root; the claimer's
    // own resubmit and repeat echoes are harmless duplicates.
    const owner = Object.values(G.claimsBy).find(c => c.root === v);
    const echoKey = player.id + "|" + v;
    if ((owner && owner.by === player.id) || G.echoDone[echoKey]) {
      G.room.set("verdicts/" + player.id, {
        seq: player.seq, v: v, already: true,
        claimedBy: owner ? owner.name : "",
        total: G.scores[player.id] || 0, level: level.n,
      });
      return;
    }
    G.echoDone[echoKey] = true;
    const matching = level.pillars.filter(p => p.root === v).length;
    const echoFrac = (G.deadline - performance.now()) / G.duration;
    const echoPts = Math.round(ZBLevels.points(echoFrac, matching, G.streaks[player.id] || 0, 0.4) * levelFactor(level));
    G.scores[player.id] = (G.scores[player.id] || 0) + echoPts;
    G.streaks[player.id] = (G.streaks[player.id] || 0) + 1;
    G.starsBy[player.id] = (G.starsBy[player.id] || 0) + 1;
    G.scoredRound[player.id] = true;
    G.room.update("state/scores", { [player.id]: G.scores[player.id] });
    G.room.set("verdicts/" + player.id, {
      seq: player.seq, v: v, echo: true, hit: matching, pts: echoPts,
      claimedBy: owner ? owner.name : "",
      streak: G.streaks[player.id], total: G.scores[player.id], level: level.n,
    });
    renderEchoTally(v);
    renderHostBoard();
    saveHostRun();
    return;
  }

  if (!res.correct) {
    G.streaks[player.id] = 0;
    G.room.set("verdicts/" + player.id, {
      seq: player.seq, v: v, ok: false, streak: 0,
      total: G.scores[player.id] || 0, level: level.n,
    });
    saveHostRun();
    return;
  }

  const remainFrac = (G.deadline - performance.now()) / G.duration;
  const pts = Math.round(ZBLevels.points(remainFrac, res.hit.length, G.streaks[player.id] || 0) * levelFactor(level));
  G.levelPoints += pts; // the 拆 stamp caption shows the level's total bounty
  G.scores[player.id] = (G.scores[player.id] || 0) + pts;
  G.streaks[player.id] = (G.streaks[player.id] || 0) + 1;
  G.starsBy[player.id] = (G.starsBy[player.id] || 0) + 1;
  G.scoredRound[player.id] = true;

  if (level.kind === "expanded") {
    res.hit.forEach(id => {
      const p = level.pillars.find(p => p.id === id);
      revealPlaque(id, p);
    });
  }
  res.hit.forEach(id => {
    const p = level.pillars.find(p => p.id === id);
    G.claimed.push(id);
    G.claimsBy[id] = { by: player.id, name: player.name, root: p.root };
    blowPillar(id, p.root, player.name);
  });
  floatPoints(pts, pillarX(res.hit[0]));
  ZBFX.audio.boom(res.hit.length > 1);

  G.room.update("state/claims", Object.fromEntries(res.hit.map(id => [id, G.claimsBy[id]])));
  G.room.update("state/scores", { [player.id]: G.scores[player.id] });
  G.room.set("verdicts/" + player.id, {
    seq: player.seq, v: v, ok: true, hit: res.hit.length, pts: pts,
    streak: G.streaks[player.id], total: G.scores[player.id], level: level.n,
  });
  renderHostBoard();
  saveHostRun();
  GameBridge.emit(SLUG, "score", { level: level.n, points: pts, player: player.name });

  const allDown = G.claimed.length === level.pillars.length;
  if (allDown) enterGrace();
  else sagDeck(res.hit[0]);
}

/* multi only: the last claim doesn't collapse the street immediately —
 * the structure goes critical for min(grace, remaining fuse) so slower
 * phones can still land echo solves. Solo skips this entirely. */
function enterGrace() {
  if (G.grace) return;
  const remainMs = Math.max(0, G.deadline - performance.now());
  const graceMs = Math.min(CFG.grace * 1000, remainMs);
  if (graceMs < 400) { collapseAndAdvance(); return; }
  G.grace = true;
  G.deadline = performance.now() + graceMs;
  $("scene").classList.add("critical");
  ZBFX.shake(6);
  G.room.update("state", { deadlineEpoch: Date.now() + graceMs, graceUntil: Date.now() + graceMs });
  saveHostRun();
}

/* live leaderboard under the host scene */
function renderHostBoard() {
  const rows = Object.keys(G.players)
    .map(id => ({ id: id, name: (G.players[id] || {}).name || t("player"), pts: G.scores[id] || 0 }))
    .sort((a, b) => b.pts - a.pts)
    .slice(0, 6);
  $("hostBoard").innerHTML = rows.map((r, i) => `
    <div class="zb-hostboard__row">
      <span class="zb-hostboard__rank">${i + 1}</span>
      <span class="zb-hostboard__name">${escapeText(r.name)}</span>
      ${multHtml(G.streaks[r.id] || 0)}
      <span class="zb-hostboard__pts">${r.pts}</span>
    </div>`).join("");
  renderStrugglers();
}
function escapeText(s) {
  return String(s).replace(/[&<>"]/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));
}

/* who hasn't scored this round — a count only, never names: the tutor
 * knows where to walk without putting anyone on the projector */
function renderStrugglers() {
  const el = $("strugglers");
  if (G.mode !== "host" || !G.started || G.over) { el.style.display = "none"; return; }
  const n = Object.keys(G.players).filter(id => !G.scoredRound[id]).length;
  el.textContent = fmt("strugglers_fmt", { n: n });
  el.style.display = n > 0 ? "" : "none";
}

/* ── host refresh recovery ──
 * The run snapshot lives in sessionStorage keyed by room code, written
 * on every round boundary and verdict. An accidental F5 then offers
 * 繼續上一場: reclaim the room, restore the books, re-publish state. */
function saveHostRun() {
  if (G.mode !== "host" || !G.room || !G.started || G.ended) return;
  try {
    sessionStorage.setItem("zb-run-" + G.room.code, JSON.stringify({
      code: G.room.code, ts: Date.now(),
      idx: G.idx, over: G.over, levels: G.levels, records: G.records,
      scores: G.scores, streaks: G.streaks, starsBy: G.starsBy,
      claimsBy: G.claimsBy, claimed: G.claimed, echoDone: G.echoDone,
      scoredRound: G.scoredRound, processedSeq: G.processedSeq, hinted: G.hinted,
      echoTally: G.echoTally,
      players: G.players, levelPoints: G.levelPoints,
      deadlineEpoch: Date.now() + Math.max(0, Math.round(G.deadline - performance.now())),
    }));
  } catch (_) {}
}
function clearHostRun() {
  if (!G.room) return;
  try { sessionStorage.removeItem("zb-run-" + G.room.code); } catch (_) {}
}
function pendingHostRun() {
  try {
    let best = null;
    for (let i = 0; i < sessionStorage.length; i++) {
      const key = sessionStorage.key(i);
      if (!key || key.indexOf("zb-run-") !== 0) continue;
      const saved = JSON.parse(sessionStorage.getItem(key));
      if (!saved || !saved.code || !saved.levels || !saved.levels.length) continue;
      if (Date.now() - (saved.ts || 0) > 6 * 3600 * 1000) continue;
      if (!best || saved.ts > best.ts) best = saved;
    }
    return best;
  } catch (_) { return null; }
}

async function resumeRun(saved) {
  ZBFX.audio.unlock();
  try {
    G.room = await GameBridge.host({ slug: SLUG, code: saved.code });
  } catch (err) {
    // room gone (closed or expired): drop the stale snapshot
    $("btnResume").style.display = "none";
    try { sessionStorage.removeItem("zb-run-" + saved.code); } catch (_) {}
    return;
  }
  G.mode = "host";
  G.levels = saved.levels;
  // a snapshot taken after the round resolved resumes at the next one
  G.idx = saved.over ? saved.idx + 1 : saved.idx;
  G.records = saved.records || [];
  G.scores = saved.scores || {};
  G.streaks = saved.streaks || {};
  G.starsBy = saved.starsBy || {};
  G.claimsBy = saved.claimsBy || {};
  G.processedSeq = saved.processedSeq || {};
  G.players = saved.players || {};
  G.score = 0; G.streak = 0; G.starsTotal = 0;
  G.started = true;
  G.ended = false;
  $("padWrap").style.display = "none";
  $("hostBoard").style.display = "";
  $("tutorBar").style.display = "";
  // restore what the phones rely on, then rejoin the judging loop
  G.room.update("players", G.players);
  G.room.set("state/scores", G.scores);
  G.watcher = G.room.watch(onHostRoom);
  GameBridge.emit(SLUG, "start", { mode: "host", resumed: true, players: Object.keys(G.players).length });
  if (G.idx >= G.levels.length) { endGame(); return; }
  show("gameScreen");
  renderHostBoard();
  startLevel(saved.over ? null : saved);
}

function collapseAndAdvance() {
  G.over = true;
  G.grace = false;
  $("scene").classList.remove("critical");
  cancelAnimationFrame(G.raf);
  ZBFX.audio.fuseStop();
  ZBFX.sparksAt(null);
  pad.disable();

  const elapsed = G.duration - Math.max(0, G.deadline - performance.now());
  G.records.push({ n: G.level.n, stage: G.level.stage, round: G.level.round, cleared: true, ms: elapsed, pts: G.levelPoints });
  if (G.mode === "host") G.room.update("state", { phase: "cooldown", graceUntil: null });
  saveHostRun();

  setTimeout(() => {
    $("deck").classList.remove("sag-l", "sag-r");
    $("deck").classList.add("fall");
    ZBFX.audio.collapse();
    ZBFX.shake(15);
    ZBFX.vibrate([60, 40, 130]);
    ZBFX.debris(200, 130, { count: 40, power: 1.5 });
    ZBFX.dust(200, GROUND - 10, { count: 6 });
  }, 380);
  setTimeout(() => {
    $("rubble").classList.add("show");
    ZBFX.dust(200, GROUND - 14, { count: 4 });
  }, 1020);
  setTimeout(() => {
    $("sceneStamp").innerHTML =
      `<div class="zb-chaiflash"></div><div class="zb-chai">拆</div><div class="zb-chai__cap">${t("stamp_demolished")} · ${fmt("points_fmt", { n: G.levelPoints })}</div>`;
    $("sceneStamp").classList.add("show");
  }, 1180);
  // the chop lands (~55% into the slam): the pile packs down under it
  setTimeout(() => {
    const rubble = $("rubble");
    if (rubble) rubble.classList.add("compact");
    ZBFX.dustRing(200, GROUND - 6);
    ZBFX.shake(6);
    ZBFX.audio.stamp();
  }, 1460);
  setTimeout(nextLevel, 2200);
}

function fuseOut() {
  G.over = true;
  cancelAnimationFrame(G.raf);
  ZBFX.audio.fuseStop();
  ZBFX.audio.fizzle();
  ZBFX.sparksAt(null);
  pad.disable();
  $("fuseTimerText").textContent = "0.0";
  G.streak = 0;
  renderStreak($("stars"), 0);
  G.records.push({ n: G.level.n, stage: G.level.stage, round: G.level.round, cleared: false, ms: G.duration, pts: G.levelPoints });
  if (G.mode === "host") {
    G.streaks = {}; // a survived structure breaks everyone's streak
    G.room.update("state", { phase: "reveal" });
  }
  saveHostRun();

  // the structure survives; reveal the full solution with working
  const level = G.level;
  const rootsLine = t("note_reveal") + "：" +
    ZBLevels.roots(level).map(r => mathHtml("x = " + ZBLevels.num(r))).join(" " + t("or") + " ");
  const fact = ZBLevels.factorisation(level);
  const lines = (fact ? [mathHtml(fact)] : []).concat([rootsLine]);
  $("markZone").innerHTML = markHtml("wrong", lines);
  // condemned, one stamp language: a rotated chop in the corner and
  // red tape across the survivor (the working stays in the mark zone)
  $("sceneStamp").innerHTML = `<div class="zb-condemn">${t("stamp_standing")}</div>`;
  $("sceneStamp").classList.add("show");
  const bb = $("deck").getBBox();
  const tx1 = bb.x + 8, tx2 = bb.x + bb.width - 8;
  const ty1 = Math.max(bb.y - 2, 8), ty2 = Math.min(bb.y + bb.height, DECK_Y) + 2;
  $("structSvg").insertAdjacentHTML("beforeend",
    `<g class="zb-tape"><path pathLength="1" d="M${tx1.toFixed(1)} ${ty1.toFixed(1)} L${tx2.toFixed(1)} ${ty2.toFixed(1)}"/><path pathLength="1" d="M${tx2.toFixed(1)} ${ty1.toFixed(1)} L${tx1.toFixed(1)} ${ty2.toFixed(1)}"/></g>`);
  // the survivor takes the hit, settles back and dusts itself off
  setTimeout(() => {
    const deck = $("deck");
    if (!deck) return;
    deck.classList.add("settle");
    ZBFX.dust(160, DECK_Y + 4, { count: 2 });
    ZBFX.dust(240, DECK_Y + 4, { count: 2 });
    ZBFX.shake(3);
  }, 260);
  // tutor-paced in class: the reveal waits for 下一關 (key n) so the
  // codes can be talked through; solo gets time to note them down
  if (G.mode === "host") {
    G.revealHold = true;
    setSkipLabel("tutor_next");
  } else {
    setTimeout(nextLevel, 5500);
  }
}

function nextLevel() {
  if (G.ended) return;
  G.idx += 1;
  if (G.idx >= G.levels.length) { endGame(); return; }
  startLevel();
}

function leaderboardHtml(results, meId) {
  return results.map((r, i) => `
    <div class="zb-hostboard__row${r.id === meId ? " me" : ""}">
      <span class="zb-hostboard__rank">${i + 1}</span>
      <span class="zb-hostboard__name">${escapeText(r.name)}</span>
      <span class="zb-hostboard__pts">${r.score}</span>
    </div>`).join("");
}

function endGame() {
  if (G.mode === "host") {
    clearHostRun();
    const results = Object.keys(G.players).map(id => ({
      id: id,
      name: (G.players[id] || {}).name || t("player"),
      score: G.scores[id] || 0,
      stars: G.starsBy[id] || 0,
    })).sort((a, b) => b.score - a.score);
    G.room.update("state", { phase: "end", results: results });
    GameBridge.emit(SLUG, "complete", { mode: "multi", results: results });
    $("endScoreLabel").setAttribute("data-i18n", "end_leaderboard");
    $("endScoreLabel").textContent = t("end_leaderboard");
    $("endScore").textContent = results.length ? results[0].score : 0;
    renderStars($("endStars"), results.length ? results[0].stars : 0);
    $("endRecord").innerHTML = `<div class="zb-hostboard" style="max-width:none">${leaderboardHtml(results, null)}</div>`;
    refreshDynamicText();
    show("endScreen");
    return;
  }
  GameBridge.emit(SLUG, "complete", { score: G.score, stars: G.starsTotal, records: G.records });
  $("endScoreLabel").setAttribute("data-i18n", "end_score_label");
  $("endScoreLabel").textContent = t("end_score_label");
  $("endScore").textContent = G.score;
  renderStars($("endStars"), G.starsTotal);
  $("endRecord").innerHTML = G.records.map(r => `
    <div class="zb-record__row">
      <span class="zb-record__lv">${r.stage}-${r.round}</span>
      <span class="zb-record__name">${t("b" + r.n)}<small>${t("lv" + r.n)}</small></span>
      <span class="zb-record__mark"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${
        r.cleared ? '<path class="ok" d="M4 13l5.5 5.5L20 6.5"/>'
                  : '<path class="no" d="M6 6l12 12M18 6L6 18"/>'
      }</svg></span>
      <span class="zb-record__pts">${r.cleared ? fmt("time_fmt", { s: (r.ms / 1000).toFixed(1) }) + " · " : ""}${r.pts}</span>
    </div>`).join("");
  refreshDynamicText();
  show("endScreen");
}

/* ══════════════════════════════════════════════════════════════════
 * multi-device: host side
 * ══════════════════════════════════════════════════════════════════ */

/* wide viewport = projector: bigger stage on every screen, intro too */
function applyProjector() {
  document.querySelector(".mc-stage").classList.toggle("zb-stage--projector", innerWidth >= 1100);
}
applyProjector();
addEventListener("resize", applyProjector);

$("btnHost").onclick = async () => {
  ZBFX.audio.unlock();
  show("lobbyScreen");
  try {
    G.room = await GameBridge.host({ slug: SLUG, initialState: { phase: "lobby" } });
  } catch (err) {
    $("lobbyStatus").textContent = err.message;
    $("lobbyStatus").classList.add("mc-status--danger");
    return;
  }
  $("roomCode").textContent = G.room.code;
  GameBridge.qr($("qrBox"), G.room.joinUrl, innerWidth >= 1100 ? 300 : 190);
  G.watcher = G.room.watch(onHostRoom);
};

function onHostRoom(room) {
  if (!room) return;
  G.players = room.players || {};

  if (!G.started) {
    renderLobbyList();
    const n = Object.keys(G.players).length;
    if (n) {
      $("lobbyStatus").textContent = fmt("lobby_players", { n: n });
      $("btnStartMulti").style.display = "";
    }
  } else {
    renderStrugglers(); // joins/leaves change the count mid-round
  }

  // judge new submissions (one slot per player, seq strictly increasing)
  const subs = room.subs || {};
  Object.keys(subs).forEach(pid => {
    const sub = subs[pid];
    if (!sub || typeof sub.seq !== "number") return;
    if ((G.processedSeq[pid] || 0) >= sub.seq) return;
    G.processedSeq[pid] = sub.seq;
    if (!G.started || G.over) return; // between rounds: consumed, not judged
    const pl = G.players[pid] || {};
    submitCode(sub.v, { id: pid, name: pl.name || t("player"), seq: sub.seq });
  });
}

$("btnStartMulti").onclick = () => startRun("host");

/* ── lobby moderation: tap a chip, tap again to remove the player ── */
let kickArmed = { id: null, at: 0 };
function renderLobbyList() {
  $("playerList").innerHTML = Object.keys(G.players).map(id => {
    const armed = id === kickArmed.id;
    const label = armed ? t("kick_confirm") : escapeText((G.players[id] || {}).name || t("player"));
    return `<span data-id="${id}"${armed ? ' class="arm"' : ""}>${label}</span>`;
  }).join("");
}
$("playerList").addEventListener("click", e => {
  const chip = e.target.closest("span[data-id]");
  if (!chip || G.started || !G.room) return;
  const id = chip.getAttribute("data-id");
  if (kickArmed.id === id && performance.now() - kickArmed.at < 2500) {
    kickArmed = { id: null, at: 0 };
    G.room.set("players/" + id, null); // the phone sees itself vanish
    return; // the deletion snapshot re-renders the list
  }
  kickArmed = { id: id, at: performance.now() };
  renderLobbyList();
  setTimeout(() => {
    if (kickArmed.id === id && performance.now() - kickArmed.at >= 2400) {
      kickArmed = { id: null, at: 0 };
      renderLobbyList();
    }
  }, 2600);
});

/* ── tutor controls (host only): +15s, skip/next, end ── */

/* the skip button doubles as 下一關 while a reveal holds */
function setSkipLabel(key) {
  const btn = $("btnSkip");
  btn.setAttribute("data-i18n", key);
  btn.textContent = t(key);
}

function tutorPlus15() {
  if (G.mode !== "host" || !G.started || G.over) return;
  G.deadline += 15000;
  const epoch = Date.now() + Math.max(0, G.deadline - performance.now());
  const upd = { deadlineEpoch: epoch };
  if (G.grace) upd.graceUntil = epoch;
  G.room.update("state", upd);
  // stamp the gift over the scene so the class notices
  const flash = document.createElement("div");
  flash.className = "zb-plusflash";
  flash.textContent = t("tutor_plus15");
  $("scene").appendChild(flash);
  setTimeout(() => flash.remove(), 1600);
}

function tutorSkip() {
  if (G.mode !== "host" || !G.started) return;
  if (G.revealHold) {
    // the held fuse-out reveal advances only on the tutor's word
    G.revealHold = false;
    setSkipLabel("tutor_skip");
    nextLevel();
    return;
  }
  if (G.over) return;
  // during grace everything is already down: collapse now, don't "fail"
  G.grace ? collapseAndAdvance() : fuseOut();
}

let endArmed = 0;
function tutorEnd() {
  if (G.mode !== "host" || !G.started) return;
  const btn = $("btnEndGame");
  if (!endArmed || performance.now() - endArmed > 2500) {
    endArmed = performance.now();
    btn.classList.add("confirm");
    btn.textContent = t("tutor_confirm");
    setTimeout(() => {
      if (endArmed && performance.now() - endArmed >= 2400) {
        endArmed = 0;
        btn.classList.remove("confirm");
        btn.textContent = t("tutor_end");
      }
    }, 2600);
    return;
  }
  endArmed = 0;
  btn.classList.remove("confirm");
  btn.textContent = t("tutor_end");
  G.ended = true; // cancels any pending nextLevel between rounds
  G.over = true;
  G.grace = false;
  $("scene").classList.remove("critical");
  cancelAnimationFrame(G.raf);
  ZBFX.audio.fuseStop();
  ZBFX.sparksAt(null);
  endGame();
}

function tutorHint() {
  if (G.mode !== "host" || !G.started || G.over) return;
  showHint();
}

$("btnPlus15").onclick = tutorPlus15;
$("btnHint").onclick = tutorHint;
$("btnSkip").onclick = tutorSkip;
$("btnEndGame").onclick = tutorEnd;
document.addEventListener("keydown", e => {
  if (G.mode !== "host" || !$("gameScreen").classList.contains("active")) return;
  if (e.key === "t") tutorPlus15();
  else if (e.key === "h") tutorHint();
  else if (e.key === "n") tutorSkip();
  else if (e.key === "e") tutorEnd();
});

/* ══════════════════════════════════════════════════════════════════
 * multi-device: controller (student phone)
 * ══════════════════════════════════════════════════════════════════ */

const C = {
  room: null, watcher: null, id: null, name: null,
  level: null, levelKey: null, phase: null,
  seq: 0, lastVerdictSeq: 0, booted: false, seenSelf: false,
  timerIv: null, deadlineEpoch: 0, graceUntil: 0, pad: null,
};

function padKeysHtml() {
  const key = d => `<button class="zb-key" data-d="${d}">${d}</button>`;
  return [7, 8, 9].map(key).join("")
    + '<button class="zb-key zb-key--sign" aria-pressed="false" aria-label="負號 / negative sign">−</button>'
    + [4, 5, 6, 1, 2, 3].map(key).join("")
    + '<button class="zb-key zb-key--zero" data-d="0">0</button>';
}

function ctrlStatus(text, cls) {
  const el = $("ctrlStatus");
  el.textContent = text;
  el.className = "mc-status" + (cls ? " " + cls : "");
}

async function initController() {
  show("controllerScreen");
  // phones default to sound on (the host projector stays quiet)
  try {
    if (localStorage.getItem("mc-games-sound") === null) { ZBFX.audio.setOn(true); renderSoundIcon(); }
  } catch (_) {}

  try {
    C.room = await GameBridge.join({ slug: SLUG });
  } catch (err) {
    $("ctrlJoin").style.display = "none";
    ctrlStatus(t("room_gone"), "mc-status--danger");
    return;
  }

  $("ctrlPad").innerHTML = padKeysHtml();
  C.pad = makePad($("ctrlPad"), $("ctrlPreview"), $("ctrlLock"), $("ctrlLockCount"), v => ctrlSubmit(v));

  let saved = null;
  try { saved = JSON.parse(sessionStorage.getItem("zb-" + C.room.code)); } catch (_) {}
  if (saved && saved.id && saved.name) {
    C.id = saved.id; C.name = saved.name;
    enterPlay();
  }
  $("btnJoin").onclick = () => {
    const name = $("nameInput").value.trim().slice(0, 12);
    if (!name) { $("nameInput").focus(); return; }
    C.id = "p" + Math.random().toString(36).slice(2, 8);
    C.name = name;
    try { sessionStorage.setItem("zb-" + C.room.code, JSON.stringify({ id: C.id, name: C.name })); } catch (_) {}
    enterPlay();
  };
}

async function enterPlay() {
  ZBFX.audio.unlock();
  $("ctrlJoin").style.display = "none";
  $("ctrlPlay").style.display = "";
  $("ctrlName").textContent = C.name;
  ctrlStatus(t("ctrl_wait_start"));
  C.pad.disable();
  await C.room.set("players/" + C.id, { name: C.name, joinedAt: Date.now() });
  if (!C.watcher) C.watcher = C.room.watch(onCtrlRoom); // rejoin after a kick reuses the stream
  clearInterval(C.timerIv);
  C.timerIv = setInterval(ctrlTick, 100);
}

function ctrlSubmit(v) {
  if (C.phase !== "playing") return;
  C.seq += 1;
  C.room.set("subs/" + C.id, { v: v, seq: C.seq, ts: Date.now() });
}

function ctrlTick() {
  if (C.phase !== "playing" || !C.deadlineEpoch) { $("ctrlTimerText").textContent = "--.-"; $("ctrlTimer").classList.remove("warn"); return; }
  const remain = Math.max(0, C.deadlineEpoch - Date.now());
  const fuse = (C.level && C.level.fuseMs) || remain;
  $("ctrlTimerText").textContent = (Math.min(remain, fuse) / 1000).toFixed(1);
  $("ctrlTimer").classList.toggle("warn", remain <= 5200);
  // grace window: live final-blast countdown (echo solves stay open)
  if (C.graceUntil > Date.now()) {
    ctrlStatus(fmt("critical_fmt", { s: Math.ceil((C.graceUntil - Date.now()) / 1000) }), "mc-status--danger");
  }
}

function onCtrlRoom(room) {
  if (!room) return;
  const st = room.state || {};

  // first snapshot after (re)join: resync counters, don't replay old feedback
  if (!C.booted) {
    C.booted = true;
    const mySub = (room.subs || {})[C.id];
    const myVerdict = (room.verdicts || {})[C.id];
    if (mySub && typeof mySub.seq === "number") C.seq = mySub.seq;
    if (myVerdict && typeof myVerdict.seq === "number") {
      C.lastVerdictSeq = myVerdict.seq;
      if (typeof myVerdict.total === "number") $("ctrlScore").textContent = myVerdict.total;
      if (typeof myVerdict.streak === "number") renderStreak($("ctrlStars"), myVerdict.streak);
    }
  }

  const phaseChanged = st.phase !== C.phase;
  C.phase = st.phase;
  C.deadlineEpoch = st.deadlineEpoch || 0;
  C.graceUntil = st.graceUntil || 0;

  // lobby moderation: the host removed me — back to the name form.
  // seenSelf guards against snapshots that predate our own join write.
  const players = room.players || {};
  if (C.id && players[C.id]) {
    C.seenSelf = true;
  } else if (C.id && C.seenSelf && st.phase === "lobby") {
    C.seenSelf = false;
    C.id = null;
    try { sessionStorage.removeItem("zb-" + C.room.code); } catch (_) {}
    $("ctrlPlay").style.display = "none";
    $("ctrlJoin").style.display = "";
    $("ctrlName").textContent = "";
    ctrlStatus(t("kicked_status"), "mc-status--danger");
    return;
  }

  // new level (includes late join, reload recovery and host restart)
  const lvKey = st.level ? st.level.seq + "|" + st.level.expr : null;
  if (st.level && lvKey !== C.levelKey) {
    C.levelKey = lvKey;
    C.level = st.level;
    $("ctrlLevelChip").innerHTML = levelChipHtml(st.level);
    $("ctrlExpr").innerHTML = exprHtml(st.level.expr);
    $("ctrlMark").innerHTML = "";
  }

  if (st.phase === "playing" && C.level) {
    if (phaseChanged) {
      // covers a host restart after the end screen too
      if (!$("controllerScreen").classList.contains("active")) show("controllerScreen");
      C.pad.enable();
      $("ctrlMark").innerHTML = "";
    }
    if (C.graceUntil <= Date.now()) {
      const total = C.level.pillars.length;
      const k = st.claims ? Object.keys(st.claims).length : 0;
      // once claims exist, remind the class that echo solves still pay
      const hint = k > 0 ? " · " + t("claims_echo_hint") : "";
      ctrlStatus(fmt("claims_status", { k: k, m: total }) + hint);
    }
  } else if (st.phase === "cooldown") {
    C.pad.disable();
    ctrlStatus(t("ctrl_wait_next"), "mc-status--ok");
  } else if (st.phase === "reveal" && C.level) {
    if (phaseChanged) {
      C.pad.disable();
      renderStreak($("ctrlStars"), 0); // a survived structure breaks the streak
      const rootsLine = t("note_reveal") + "：" +
        ZBLevels.roots(C.level).map(r => mathHtml("x = " + ZBLevels.num(r))).join(" " + t("or") + " ");
      const fact = ZBLevels.factorisation(C.level);
      $("ctrlMark").innerHTML = markHtml("wrong", (fact ? [mathHtml(fact)] : []).concat([rootsLine]));
      ctrlStatus(t("reveal_wait"));
    }
  } else if (st.phase === "lobby") {
    if (C.id) ctrlStatus(t("ctrl_wait_start")); // a kicked phone keeps its notice
  } else if (st.phase === "end") {
    if (phaseChanged) ctrlEnd(st.results || []);
  }

  // private verdict feedback
  const v = (room.verdicts || {})[C.id];
  if (v && typeof v.seq === "number" && v.seq > C.lastVerdictSeq) {
    C.lastVerdictSeq = v.seq;
    applyCtrlVerdict(v);
  }
}

function applyCtrlVerdict(v) {
  if (!C.level) return;
  if (v.already) {
    const who = v.claimedBy ? fmt("note_claimed_by", { name: escapeText(v.claimedBy) }) : "";
    $("ctrlMark").innerHTML = markHtml("info",
      [t("note_already") + "：" + mathHtml("x = " + ZBLevels.num(v.v)) + (who ? "，" + who : "")]);
    return;
  }
  if (v.echo) {
    // correct after the claim: full marks feedback, echo points
    tweenScore($("ctrlScore"), v.total);
    renderStreak($("ctrlStars"), v.streak);
    const who = v.claimedBy ? fmt("note_claimed_by", { name: escapeText(v.claimedBy) }) + " · " : "";
    const lines = ZBLevels.workingHit(C.level, v.v).map(mathHtml).concat([who + fmt("points_fmt", { n: v.pts })]);
    $("ctrlMark").innerHTML = markHtml("correct", lines);
    ZBFX.audio.boom(false);
    ZBFX.vibrate(50);
    return;
  }
  if (v.ok) {
    tweenScore($("ctrlScore"), v.total);
    renderStreak($("ctrlStars"), v.streak);
    const lines = ZBLevels.workingHit(C.level, v.v).map(mathHtml).concat([
      (v.hit > 1 ? t("note_both_down") + " " : "") + fmt("points_fmt", { n: v.pts }),
    ]);
    $("ctrlMark").innerHTML = markHtml("correct", lines);
    ZBFX.audio.boom(v.hit > 1);
    ZBFX.vibrate(v.hit > 1 ? [60, 40, 130] : 80);
  } else {
    renderStreak($("ctrlStars"), 0);
    const lines = ZBLevels.workingWrong(C.level, v.v).map(mathHtml)
      .concat([fmt("note_strength", { n: ZBLevels.strength(C.level, v.v) })]);
    $("ctrlMark").innerHTML = markHtml("wrong", lines);
    $("ctrlExpr").classList.add("mc-shake");
    setTimeout(() => $("ctrlExpr").classList.remove("mc-shake"), 400);
    ZBFX.audio.knock();
    ZBFX.vibrate(180);
    C.pad.lock(3);
  }
}

function ctrlEnd(results) {
  clearInterval(C.timerIv);
  const mine = results.find(r => r.id === C.id);
  const rank = results.findIndex(r => r.id === C.id) + 1;
  $("endScoreLabel").setAttribute("data-i18n", "your_score");
  $("endScoreLabel").textContent = t("your_score");
  $("endScore").textContent = mine ? mine.score : 0;
  renderStars($("endStars"), mine ? mine.stars : 0);
  $("endRecord").innerHTML =
    (rank ? `<div class="mc-margin-note" style="margin-top:6px">${fmt("rank_fmt", { r: rank })}</div>` : "")
    + `<div class="zb-hostboard" style="max-width:none">${leaderboardHtml(results, C.id)}</div>`;
  $("btnRestart").style.display = "none";
  $("btnMenu").style.display = "none";
  refreshDynamicText();
  show("endScreen");
  ctrlStatus(t("thanks_playing"));
}

if (GameBridge.roomParam()) {
  initController();
} else {
  // a host-side run snapshot in this tab offers 繼續上一場
  const savedRun = pendingHostRun();
  if (savedRun) {
    $("btnResume").style.display = "";
    $("btnResume").onclick = () => resumeRun(savedRun);
  }
}

/* language switch must also refresh composed text on static screens */
document.addEventListener("mc:lang", refreshDynamicText);
</script>
