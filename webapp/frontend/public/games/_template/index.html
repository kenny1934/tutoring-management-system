<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- ══════════════════════════════════════════════════════════════
       MathConcept Companion Game — TEMPLATE
       Copy this folder to /games/<your-slug>/ and build on it.
       Read /docs/companion-games/CONVENTIONS.md first. Parts marked
       ✦ CONTRACT must stay. No emoji as UI; icons are inline SVG.
       ══════════════════════════════════════════════════════════════ -->
  <title>遊戲範本 Game Template</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <script src="../shared/vendor/qrcode.js"></script>
  <script src="../shared/game-bridge.js"></script>
</head>
<body>

<!-- Inline SVG icon sprite (stroke icons, 24px grid) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- the MC arrow, straight from the logo -->
    <symbol id="i-arrow" viewBox="0 0 24 18">
      <path d="M2 9h15M12 2l8 7-8 7" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="i-clock" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9" fill="none" stroke-width="2"/>
      <path d="M12 7v5l3.5 2" fill="none" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-players" viewBox="0 0 24 24">
      <circle cx="9" cy="8" r="3.5" fill="none" stroke-width="2"/>
      <path d="M2.5 20c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6" fill="none" stroke-width="2" stroke-linecap="round"/>
      <circle cx="17.5" cy="9" r="2.8" fill="none" stroke-width="2"/>
      <path d="M16 14.3c3.1 0.3 5.5 2.5 5.5 5.7" fill="none" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-screen" viewBox="0 0 24 24">
      <rect x="2.5" y="4" width="19" height="12.5" rx="1.5" fill="none" stroke-width="2"/>
      <path d="M9 20.5h6M12 16.5v4" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-phone" viewBox="0 0 24 24">
      <rect x="7" y="2.5" width="10" height="19" rx="2" fill="none" stroke-width="2"/>
      <path d="M11 18.5h2" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-tick" viewBox="0 0 24 24">
      <path d="M4 13l5.5 5.5L20 6.5" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="i-cross" viewBox="0 0 24 24">
      <path d="M6 6l12 12M18 6L6 18" fill="none" stroke-width="3" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-theme" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="8.5" fill="none" stroke-width="2"/>
      <path d="M12 3.5v17A8.5 8.5 0 0 0 12 3.5z" fill="currentColor" stroke="none"/>
    </symbol>
  </defs>
</svg>

<!-- pencil maths marginalia on the paper (decorative, behind everything) -->
<div class="mc-doodles" aria-hidden="true">
  <!-- parabola on axes, top right -->
  <svg style="top:64px;right:-24px;width:190px;height:150px;transform:rotate(7deg)" viewBox="0 0 100 80">
    <path d="M6 62 H94 M50 6 V74"/>
    <path d="M16 14 Q50 96 84 14"/>
  </svg>
  <!-- radical + right triangle, bottom left -->
  <svg style="bottom:36px;left:-18px;width:210px;height:170px;transform:rotate(-6deg)" viewBox="0 0 110 90">
    <path d="M6 34 L13 52 L22 10 H48"/>
    <path d="M62 78 H104 L104 40 Z M96 78 V70 H104"/>
  </svg>
</div>

<!-- ✦ CONTRACT: connection pill + theme/lang toggles on every game -->
<span class="mc-conn" data-conn="online"><span class="mc-conn__dot"></span><span data-i18n="conn_reconnecting"></span></span>
<div class="mc-toggles">
  <button class="mc-btn mc-btn--quiet" id="langToggle" aria-label="切換語言 / Switch language">中 · EN</button>
  <button class="mc-btn mc-btn--quiet" id="themeToggle" aria-label="切換深淺色 / Toggle theme"><svg><use href="#i-theme"/></svg></button>
</div>

<div class="mc-stage">

  <!-- ✦ CONTRACT: intro screen first — objective, how to play, duration -->
  <div class="mc-screen active" id="introScreen">
    <header class="mc-masthead">
      <span class="mc-masthead__code"><strong>SM901</strong> · <span data-i18n="subtopic"></span></span>
      <svg class="mc-arrow" style="width:26px;height:20px;color:var(--mc-red)"><use href="#i-arrow"/></svg>
    </header>
    <h1 class="mc-title" data-i18n="title"></h1>
    <svg class="mc-swash" viewBox="0 0 150 12" aria-hidden="true"><path d="M3 8 Q40 3 75 7 T147 5"/></svg>
    <p class="mc-lede" data-i18n="objective"></p>
    <div class="mc-meta">
      <span><svg><use href="#i-clock"/></svg><span data-i18n="duration"></span></span>
      <span><svg><use href="#i-players"/></svg><span data-i18n="players"></span></span>
    </div>
    <div class="mc-note" data-i18n="how_to_play"></div>
    <!-- Mode select: remove buttons for modes the game doesn't support,
         and keep game.json "modes" in sync. -->
    <div style="display:grid;gap:12px">
      <button class="mc-btn mc-btn--primary mc-btn--block" id="btnHost">
        <svg style="width:20px;height:20px"><use href="#i-screen"/></svg>
        <span data-i18n="btn_host"></span>
        <svg class="mc-arrow"><use href="#i-arrow"/></svg>
      </button>
      <button class="mc-btn mc-btn--block" id="btnSolo">
        <span data-i18n="btn_solo"></span>
        <svg class="mc-arrow"><use href="#i-arrow"/></svg>
      </button>
    </div>
    <!-- ✦ CONTRACT: brand line on intro (and lobby) screens -->
    <footer class="mc-brand">
      <img class="mc-logo--light" src="/logo-secondary.png" alt="MathConcept Secondary Academy">
      <img class="mc-logo--dark" src="/logo-secondary-dark.png" alt="MathConcept Secondary Academy">
      <div>
        <div class="mc-brand__name">MathConcept Secondary Academy</div>
        <div class="mc-brand__sub">中學教室 · Companion Games</div>
      </div>
    </footer>
  </div>

  <!-- Host lobby: room code + QR (multi-device mode) -->
  <div class="mc-screen" id="lobbyScreen">
    <header class="mc-masthead">
      <span class="mc-masthead__code"><strong>SM901</strong> · <span data-i18n="subtopic"></span></span>
      <svg class="mc-arrow" style="width:26px;height:20px;color:var(--mc-red)"><use href="#i-arrow"/></svg>
    </header>
    <h2 class="mc-title" style="font-size:clamp(26px,6vw,36px)" data-i18n="lobby_title"></h2>
    <p class="mc-lede" data-i18n="lobby_hint"></p>
    <div class="mc-sheet" style="text-align:center">
      <div class="mc-board__label" data-i18n="room_code_label"></div>
      <div class="mc-code" id="roomCode">····</div>
      <div class="mc-qr" id="qrBox" style="margin-top:16px"></div>
    </div>
    <p class="mc-status" id="lobbyStatus" style="margin-top:16px" data-i18n="lobby_waiting"></p>
    <footer class="mc-brand">
      <img class="mc-logo--light" src="/logo-secondary.png" alt="MathConcept Secondary Academy">
      <img class="mc-logo--dark" src="/logo-secondary-dark.png" alt="MathConcept Secondary Academy">
      <div>
        <div class="mc-brand__name">MathConcept Secondary Academy</div>
        <div class="mc-brand__sub">中學教室 · Companion Games</div>
      </div>
    </footer>
  </div>

  <!-- Main game screen -->
  <div class="mc-screen" id="gameScreen">
    <div class="mc-board" id="questionBoard">
      <div class="mc-board__label" data-i18n="target_label"></div>
      <div class="mc-board__value" id="questionBox">?</div>
    </div>

    <div class="mc-stars" id="stars" style="margin-top:14px" aria-label="streak"></div>
    <div class="mc-tries" id="tries" style="margin:12px 0" aria-label="attempts remaining"></div>

    <!-- TODO(game): replace this placeholder answer UI with your mechanic -->
    <input class="mc-input" id="answerInput" type="number" inputmode="numeric" data-i18n-placeholder="answer_placeholder">
    <button class="mc-btn mc-btn--primary mc-btn--block" id="btnSubmit" style="margin-top:12px">
      <span data-i18n="btn_submit"></span>
      <svg class="mc-arrow"><use href="#i-arrow"/></svg>
    </button>

    <!-- ✦ CONTRACT: marking zone — feedback must TEACH on wrong answers
         (stamp + worked reason as a margin note), never alert() -->
    <div class="mc-markzone" id="markZone"></div>
  </div>

  <!-- Controller screen (student phone in multi-device mode) -->
  <div class="mc-screen" id="controllerScreen">
    <header class="mc-masthead">
      <span class="mc-masthead__code"><strong>SM901</strong> · <span data-i18n="subtopic"></span></span>
      <span class="mc-masthead__code" id="controllerRole"></span>
    </header>
    <div class="mc-sheet" style="text-align:center">
      <div class="mc-board__label" data-i18n="your_number"></div>
      <input class="mc-input" id="controllerInput" type="number" inputmode="numeric" data-i18n-placeholder="answer_placeholder" style="margin-top:10px">
    </div>
    <p class="mc-status" style="margin-top:14px" data-i18n="controller_hint"></p>
  </div>

  <!-- End screen -->
  <div class="mc-screen" id="endScreen">
    <header class="mc-masthead">
      <span class="mc-masthead__code"><strong>SM901</strong> · <span data-i18n="subtopic"></span></span>
      <svg class="mc-arrow" style="width:26px;height:20px;color:var(--mc-red)"><use href="#i-arrow"/></svg>
    </header>
    <h1 class="mc-title" data-i18n="end_title"></h1>
    <div class="mc-markzone">
      <div class="mc-stamp mc-stamp--correct"><svg><use href="#i-tick"/></svg><span id="endSummary"></span></div>
    </div>
    <button class="mc-btn mc-btn--block" id="btnRestart" style="margin-top:20px">
      <span data-i18n="btn_restart"></span>
      <svg class="mc-arrow"><use href="#i-arrow"/></svg>
    </button>
  </div>

</div>

<script>
/* ✦ CONTRACT: every visible string lives here, both languages filled.
 * c = 繁體中文 (default), e = English — matches courseware file codes. */
const STRINGS = {
  title:              { c: "遊戲範本",                e: "Game Template" },
  subtopic:           { c: "零因積性質",              e: "Zero-product property" },
  objective:          { c: "示範用：|兩數相乘等於目標數，|看看你需要幾多次嘗試。", e: "Demo: multiply two numbers to hit the target. How few tries do you need?" },
  how_to_play:        { c: "玩法：輸入答案，然後提交。|答錯唔緊要，|批改會寫明點解錯。", e: "How to play: enter your answer, then submit. Wrong answers are fine, and the marking shows you why." },
  duration:           { c: "約 5–10 分鐘",            e: "5–10 minutes" },
  players:            { c: "1–2 人",                  e: "1–2 players" },
  btn_host:           { c: "多裝置開始",              e: "Start · multi-device" },
  btn_solo:           { c: "單機開始",                e: "Start · one screen" },
  btn_submit:         { c: "提交批改",                e: "Submit for marking" },
  btn_restart:        { c: "再玩一次",                e: "Play again" },
  lobby_title:        { c: "掃碼加入",                e: "Scan to join" },
  lobby_hint:         { c: "用手機相機掃描下面嘅 QR code，或者輸入房間號碼。", e: "Scan the QR code with a phone camera, or enter the room code." },
  room_code_label:    { c: "房間號碼",                e: "Room code" },
  lobby_waiting:      { c: "等待玩家加入⋯",           e: "Waiting for players…" },
  target_label:       { c: "目標",                    e: "Target" },
  your_number:        { c: "你嘅數字",                e: "Your number" },
  answer_placeholder: { c: "輸入數字",                e: "Enter a number" },
  controller_hint:    { c: "輸入後會即時同步到大屏幕。", e: "Your input syncs to the big screen instantly." },
  conn_reconnecting:  { c: "重新連線中",              e: "Reconnecting" },
  end_title:          { c: "完成",                    e: "Finished" },
  stamp_correct:      { c: "正確",                    e: "Correct" },
  stamp_wrong:        { c: "再試一次",                e: "Try again" },
  player:             { c: "玩家",                    e: "Player" },
};

const SLUG = "_template"; // TODO(game): your folder name
const MAX_TRIES = 3;

GameBridge.initTheme();
GameBridge.initI18n(STRINGS);
GameBridge.emit(SLUG, "ready");

document.getElementById("langToggle").onclick = () =>
  GameBridge.setLang(GameBridge.getLang() === "c" ? "e" : "c");
document.getElementById("themeToggle").onclick = () => GameBridge.toggleTheme();

function show(id) {
  document.querySelectorAll(".mc-screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* attempts as marking circles; a red cross is drawn when one is used */
function renderTries(left) {
  document.getElementById("tries").innerHTML = Array.from({ length: MAX_TRIES }, (_, i) => `
    <svg class="mc-tries__dot ${i >= left ? "used" : ""}" viewBox="0 0 26 26">
      <circle cx="13" cy="13" r="11"/>
      <g class="cross"><line x1="6" y1="6" x2="20" y2="20"/><line x1="20" y1="6" x2="6" y2="20"/></g>
    </svg>`).join("");
}

/* marking zone: stamp (ink draws on) + worked reason margin note */
function mark(correct, workedNote) {
  const ink = correct
    ? '<path d="M4 13l5.5 5.5L20 6.5"/>'
    : '<path d="M6 6l12 12"/><path d="M18 6L6 18"/>';
  const zone = document.getElementById("markZone");
  zone.innerHTML = `
    <div class="mc-stamp ${correct ? "mc-stamp--correct" : ""}">
      <svg class="draw" viewBox="0 0 24 24" style="width:22px;height:22px" fill="none"
           stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${ink}</svg>
      <span>${GameBridge.t(correct ? "stamp_correct" : "stamp_wrong")}</span>
    </div>
    ${workedNote ? `<div class="mc-margin-note ${correct ? "mc-margin-note--correct" : ""}">${workedNote}</div>` : ""}`;
}

/* star shelf: one gold pen star per correct answer in a row */
function renderStars(n) {
  const star = '<svg viewBox="0 0 20 20"><path d="M10 1.5l2.5 5.4 5.9 0.7-4.4 4 1.2 5.8-5.2-2.9-5.2 2.9 1.2-5.8-4.4-4 5.9-0.7z"/></svg>';
  document.getElementById("stars").innerHTML =
    n <= 6 ? star.repeat(n)
           : star + `<span class="mc-stars__count">×${n}</span>`;
}

/* ------------------------------------------------------------------
 * TODO(game): placeholder mechanic below — it exists to demonstrate
 * the required patterns (round reset, marking feedback, tries, the
 * host/controller split). Replace with your game.
 * ------------------------------------------------------------------ */
let tries = MAX_TRIES, streak = 0, target = null, room = null, watcher = null;

function newRound() {
  target = 2 + Math.floor(Math.random() * 8);
  document.getElementById("questionBox").innerHTML = `${target} × 3 = <em>?</em>`;
  document.getElementById("answerInput").value = "";
  document.getElementById("markZone").innerHTML = "";
  if (room) room.set("state/round", { target });
}

function judge(val) {
  const correct = val === target * 3;
  if (correct) {
    streak += 1;
    renderStars(streak);
    mark(true, `${target} × 3 = ${target * 3}`);
    GameBridge.emit(SLUG, "score", { correct: true, streak });
  } else {
    streak = 0;
    renderStars(0);
    tries -= 1;
    renderTries(tries);
    // ✦ CONTRACT: the margin note shows the worked reason, not just ✗
    mark(false, `${target} × 3 = ${target * 3}`);
    const board = document.getElementById("questionBoard");
    board.classList.add("mc-shake");
    setTimeout(() => board.classList.remove("mc-shake"), 400);
  }
  if (tries <= 0) {
    GameBridge.emit(SLUG, "complete", { result: "out_of_tries" });
    document.getElementById("endSummary").textContent = GameBridge.t("end_title");
    show("endScreen");
  } else if (correct) {
    setTimeout(newRound, 1400); // ✦ CONTRACT: rounds always reset — no stale double-submits
  }
}

/* --- Solo mode --- */
document.getElementById("btnSolo").onclick = () => {
  GameBridge.emit(SLUG, "start", { mode: "solo" });
  renderTries(tries = MAX_TRIES);
  show("gameScreen");
  newRound();
};
document.getElementById("btnSubmit").onclick = () =>
  judge(parseInt(document.getElementById("answerInput").value, 10));
document.getElementById("btnRestart").onclick = () => {
  renderTries(tries = MAX_TRIES);
  show("gameScreen");
  newRound();
};

/* --- Multi-device: host --- */
document.getElementById("btnHost").onclick = async () => {
  show("lobbyScreen");
  room = await GameBridge.host({ slug: SLUG, initialState: { phase: "lobby" } });
  document.getElementById("roomCode").textContent = room.code;
  GameBridge.qr(document.getElementById("qrBox"), room.joinUrl, 190);
  watcher = room.watch(state => {
    const players = Object.keys((state && state.players) || {});
    if (players.length >= 1 && state.state && state.state.phase === "lobby") {
      room.set("state/phase", "playing");
      GameBridge.emit(SLUG, "start", { mode: "multi", players: players.length });
      renderTries(tries = MAX_TRIES);
      show("gameScreen");
      newRound();
    }
    // TODO(game): read player inputs from state.players and drive your UI
  });
};

/* --- Multi-device: controller (opened via QR link ?room=XXXX) --- */
if (GameBridge.roomParam()) {
  (async () => {
    try {
      room = await GameBridge.join({ slug: SLUG });
      const me = "p" + Math.floor(Math.random() * 1e6);
      await room.set("players/" + me, { joinedAt: Date.now() });
      document.getElementById("controllerRole").textContent = GameBridge.t("player");
      show("controllerScreen");
      document.getElementById("controllerInput").oninput = e =>
        room.set("players/" + me + "/value", parseInt(e.target.value, 10) || null);
    } catch (err) {
      const zone = document.getElementById("markZone") || document.body;
      zone.innerHTML = `<p class="mc-status mc-status--danger">${err.message}</p>`;
    }
  })();
}
</script>
</body>
</html>
