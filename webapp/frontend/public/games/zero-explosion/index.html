<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- ══════════════════════════════════════════════════════════════
       歸零爆破 Zero Blast — companion game pilot (SM901 / MAS901)
       Subtopic: zero-product property, (x−a)(x−b)=0 ⟺ x=a or x=b.
       Structures stand on factor pillars; correct codes zero a factor
       and drop its pillar; find the full solution set to demolish.
       See /docs/companion-games/zero-explosion-plan.md.
       ══════════════════════════════════════════════════════════════ -->
  <title>歸零爆破 Zero Blast</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <script src="../shared/vendor/qrcode.js"></script>
  <script src="../shared/game-bridge.js"></script>
  <script src="levels.js"></script>
  <script src="fx.js"></script>
  <style>
    /* ---- game-specific styles: theme.css tokens only ---- */

    .zb-topline {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-bottom: 10px;
      font-family: var(--mc-mono); font-weight: 700;
    }
    .zb-topline__level { font-size: 13px; letter-spacing: 0.05em; color: var(--mc-ink-soft); }
    .zb-topline__level strong { color: var(--mc-red); }
    .zb-topline__right { display: flex; align-items: center; gap: 14px; }
    .zb-score { font-size: 15px; font-variant-numeric: tabular-nums; color: var(--mc-gold); }
    .zb-timer {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 19px; font-variant-numeric: tabular-nums;
    }
    .zb-timer svg { width: 15px; height: 15px; stroke: currentColor; }
    .zb-timer.warn { color: var(--mc-red); animation: zb-pulse 0.5s ease-in-out infinite; }
    @keyframes zb-pulse { 50% { opacity: 0.45; } }

    .zb-board {
      border: 1.5px solid var(--mc-ink); border-radius: var(--mc-r);
      background: var(--mc-paper-raised); box-shadow: var(--mc-shadow-sm);
      text-align: center; padding: 10px 12px; margin-bottom: 10px;
      font-family: var(--mc-mono); font-weight: 800;
      font-size: clamp(22px, 5.5vw, 34px); line-height: 1.25;
      font-variant-numeric: tabular-nums; letter-spacing: -0.01em;
    }
    .zb-board .zb-zero { color: var(--mc-red); }

    /* ---- the demolition scene ---- */
    .zb-scenewrap { position: relative; }
    .zb-scene {
      position: relative; width: 100%; aspect-ratio: 400 / 240;
      max-height: 300px; margin: 0 auto; overflow: hidden;
    }
    .zb-scene > svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .zb-scene > canvas { position: absolute; inset: 0; pointer-events: none; z-index: 2; }

    .zb-struct path, .zb-struct line { stroke: var(--mc-ink); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .zb-struct .thin { stroke-width: 1.2; }
    .zb-struct .faint { stroke: var(--mc-ink-faint); }
    .zb-struct text { fill: var(--mc-ink); }
    .zb-struct .plaque { fill: var(--mc-paper-raised); }
    .zb-struct .tag { font-family: var(--mc-mono); font-size: 10px; letter-spacing: 0.12em; fill: var(--mc-ink-faint); }
    .zb-struct .plabel { font-family: var(--mc-mono); font-weight: 700; font-size: 13.5px; text-anchor: middle; }

    /* blueprint draw-on: every stroke normalised to pathLength=1 */
    .din { stroke-dasharray: 1; stroke-dashoffset: 1; animation: zb-draw 0.5s calc(var(--i, 0) * 55ms) ease-out forwards; }
    @keyframes zb-draw { to { stroke-dashoffset: 0; } }
    .zb-struct text.din2 { opacity: 0; animation: zb-fadein 0.4s calc(var(--i, 0) * 55ms) ease-out forwards; }
    @keyframes zb-fadein { to { opacity: 1; } }

    .zb-pillar { transition: opacity 0.25s, transform 0.25s; }
    .zb-pillar.blown { opacity: 0; transform: translateY(8px); }
    .zb-rootmark {
      font-family: var(--mc-mono); font-style: italic; font-weight: 800;
      font-size: 16px; text-anchor: middle; fill: var(--mc-red);
      opacity: 0; transform-box: fill-box; transform-origin: center;
    }
    .zb-rootmark.show { animation: zb-ink 0.35s cubic-bezier(0.2, 1.5, 0.35, 1) forwards; }
    @keyframes zb-ink { from { opacity: 0; transform: scale(1.8) rotate(-6deg); } to { opacity: 1; transform: scale(1) rotate(-4deg); } }

    .zb-deck { transform-box: fill-box; transform-origin: center bottom; transition: transform 0.5s cubic-bezier(0.3, 1.4, 0.4, 1); }
    .zb-deck.sag-l { transform: rotate(-3.5deg) translateY(5px); }
    .zb-deck.sag-r { transform: rotate(3.5deg) translateY(5px); }
    .zb-deck.fall { animation: zb-fall 0.7s cubic-bezier(0.6, 0, 0.9, 0.4) forwards; }
    @keyframes zb-fall {
      40% { opacity: 1; }
      to { transform: translateY(60px) rotate(8deg); opacity: 0; }
    }
    .zb-rubble { visibility: hidden; }
    .zb-rubble.show { visibility: visible; }
    .zb-rubble.show path { stroke-dasharray: 1; stroke-dashoffset: 1; animation: zb-draw 0.4s ease-out forwards; }

    /* the 拆 demolition stamp, slammed over the rubble */
    .zb-scenestamp {
      position: absolute; inset: 0; z-index: 3; display: none;
      align-items: center; justify-content: center; flex-direction: column; gap: 6px;
      pointer-events: none;
    }
    .zb-scenestamp.show { display: flex; }
    .zb-chai {
      width: 92px; height: 92px; border: 4px solid var(--mc-red); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--mc-red); font-weight: 900; font-size: 54px; line-height: 1;
      font-family: var(--mc-body);
      background: color-mix(in srgb, var(--mc-paper) 78%, transparent);
      box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--mc-red) 30%, transparent);
      transform: rotate(-8deg);
      animation: mc-stamp-in 0.35s cubic-bezier(0.2, 1.5, 0.35, 1) both;
    }
    .zb-scenestamp .zb-chai__cap {
      font-family: var(--mc-mono); font-weight: 800; font-size: 14px; letter-spacing: 0.12em;
      color: var(--mc-red); background: color-mix(in srgb, var(--mc-paper) 82%, transparent);
      padding: 2px 10px; border-radius: 4px; transform: rotate(-3deg);
    }

    /* level intro card, flashed over the scene */
    .zb-levelcard {
      position: absolute; inset: 0; z-index: 4; display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      text-align: center; pointer-events: none;
    }
    .zb-levelcard.show { display: flex; animation: zb-card 1.5s ease-in-out both; }
    .zb-levelcard__n {
      font-family: var(--mc-display); font-size: 34px; letter-spacing: 0.02em;
      background: color-mix(in srgb, var(--mc-paper) 85%, transparent); padding: 0 14px; border-radius: 6px;
    }
    .zb-levelcard__sub {
      font-weight: 700; font-size: 16px; color: var(--mc-red);
      background: color-mix(in srgb, var(--mc-paper) 85%, transparent); padding: 0 12px; border-radius: 6px;
    }
    @keyframes zb-card {
      0% { opacity: 0; transform: scale(1.12); }
      14% { opacity: 1; transform: scale(1); }
      78% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ---- marking + keypad ---- */
    .zb-mark { min-height: 96px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 6px 0; }
    .zb-mark .mc-margin-note { line-height: 1.5; }

    .zb-padwrap { position: relative; max-width: 340px; margin: 0 auto; }
    .zb-preview {
      text-align: center; font-family: var(--mc-mono); font-weight: 700; font-size: 15px;
      color: var(--mc-ink-faint); margin-bottom: 8px; min-height: 22px;
    }
    .zb-preview .neg { color: var(--mc-red); }
    .zb-pad { display: grid; grid-template-columns: repeat(3, 1fr) 0.85fr; gap: 9px; }
    .zb-key {
      min-height: 52px; border: 1.5px solid var(--mc-ink); border-radius: var(--mc-r);
      background: var(--mc-paper-raised); color: var(--mc-ink);
      font-family: var(--mc-mono); font-size: 22px; font-weight: 700;
      cursor: pointer; box-shadow: 0 2px 0 var(--mc-ink);
      transition: transform 0.1s, box-shadow 0.1s, background 0.15s;
      touch-action: manipulation;
    }
    .zb-key:active { transform: translateY(2px); box-shadow: 0 0 0 var(--mc-ink); }
    .zb-key:focus-visible { outline: 2.5px solid var(--mc-red); outline-offset: 2px; }
    .zb-key:disabled { opacity: 0.45; cursor: not-allowed; }
    .zb-key--sign { grid-column: 4; grid-row: 1 / 4; font-size: 30px; }
    .zb-key--sign[aria-pressed="true"] {
      background: var(--mc-red-wash); border-color: var(--mc-red); color: var(--mc-red);
      box-shadow: 0 2px 0 var(--mc-red);
    }
    .zb-key--zero { grid-column: 1 / 4; }

    /* 3-second relock after a wrong code: think, don't spam */
    .zb-lock {
      position: absolute; inset: 0; z-index: 5; display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 2px;
      border-radius: var(--mc-r);
      background: color-mix(in srgb, var(--mc-paper) 82%, transparent);
      backdrop-filter: blur(1.5px);
    }
    .zb-lock.show { display: flex; }
    .zb-lock__n { font-family: var(--mc-mono); font-weight: 800; font-size: 40px; color: var(--mc-red); font-variant-numeric: tabular-nums; }
    .zb-lock__hint { font-size: 14px; font-weight: 700; color: var(--mc-ink-soft); }

    /* ---- end screen record table ---- */
    .zb-record { display: grid; gap: 0; margin: 14px 0 6px; }
    .zb-record__row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 4px; border-bottom: 1px dashed var(--mc-line);
      font-size: 15px;
    }
    .zb-record__row:last-child { border-bottom: none; }
    .zb-record__lv { font-family: var(--mc-mono); font-weight: 700; font-size: 12.5px; color: var(--mc-ink-faint); width: 30px; }
    .zb-record__name { flex: 1; font-weight: 600; text-align: left; line-height: 1.3; }
    .zb-record__name small { display: block; font-size: 12px; font-weight: 500; color: var(--mc-ink-faint); }
    .zb-record__mark { width: 22px; height: 22px; }
    .zb-record__mark svg { width: 100%; height: 100%; }
    .zb-record__mark .ok { stroke: var(--mc-correct); }
    .zb-record__mark .no { stroke: var(--mc-red); }
    .zb-record__pts { font-family: var(--mc-mono); font-weight: 700; font-size: 13px; font-variant-numeric: tabular-nums; color: var(--mc-ink-soft); text-align: right; white-space: nowrap; }

    .zb-takeaway-formula {
      font-family: var(--mc-mono); font-weight: 800; font-size: clamp(16px, 4.5vw, 21px);
      text-align: center; margin: 4px 0 2px; letter-spacing: -0.01em;
    }
    .zb-takeaway-formula .zb-zero { color: var(--mc-red); }

    /* ---- multi-device bits ---- */
    .zb-claimname {
      font-family: var(--mc-mono); font-weight: 700; font-size: 11px;
      text-anchor: middle; fill: var(--mc-red); opacity: 0;
    }
    .zb-claimname.show { animation: zb-fadein 0.3s 0.15s ease-out forwards; }
    .zb-playerlist { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .zb-playerlist span {
      font-family: var(--mc-mono); font-weight: 700; font-size: 13.5px;
      border: 1.5px solid var(--mc-ink); border-radius: var(--mc-r);
      background: var(--mc-paper-raised); padding: 5px 12px;
      animation: mc-pop 0.3s cubic-bezier(0.2, 1.5, 0.35, 1) both;
    }
    .zb-hostboard { max-width: 340px; margin: 4px auto 0; }
    .zb-hostboard__row {
      display: flex; align-items: baseline; gap: 10px;
      font-family: var(--mc-mono); font-size: 14.5px; font-weight: 700;
      padding: 5px 6px; border-bottom: 1px dashed var(--mc-line);
      font-variant-numeric: tabular-nums;
    }
    .zb-hostboard__row:last-child { border-bottom: none; }
    .zb-hostboard__rank { color: var(--mc-ink-faint); font-size: 12px; width: 20px; }
    .zb-hostboard__name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .zb-hostboard__pts { color: var(--mc-gold); }
    .zb-hostboard__row.me .zb-hostboard__name { color: var(--mc-red); }

    /* reduced motion: theme.css kills all animations, so every draw-on
       stroke must still end visible, and the fallen deck must still clear */
    @media (prefers-reduced-motion: reduce) {
      .din, .zb-rubble.show path { stroke-dashoffset: 0 !important; }
      .din2, .zb-rootmark.show { opacity: 1 !important; }
      .zb-deck.fall { opacity: 0; }
    }

    /* compact phones: keep the keypad reachable without hunting */
    @media (max-height: 780px) {
      .zb-scene { max-height: 200px; }
      .zb-mark { min-height: 76px; }
      .zb-key { min-height: 48px; }
    }
    /* landscape phones: scene left, controls right */
    @media (orientation: landscape) and (max-height: 520px) {
      .zb-game-grid { display: grid; grid-template-columns: 1.15fr 1fr; gap: 0 18px; align-items: start; }
      .zb-game-grid > .zb-col-l { grid-column: 1; }
      .zb-game-grid > .zb-col-r { grid-column: 2; }
      .zb-scene { max-height: 210px; }
      .zb-mark { min-height: 64px; }
    }
  </style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-arrow" viewBox="0 0 24 18">
      <path d="M2 9h15M12 2l8 7-8 7" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>

    <symbol id="i-clock" viewBox="0 0 24 24">

      <path d="M12 7v5l3.5 2" fill="none" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-players" viewBox="0 0 24 24">
      <circle cx="9" cy="8" r="3.5" fill="none" stroke-width="2"/>
      <path d="M2.5 20c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6" fill="none" stroke-width="2" stroke-linecap="round"/>

      <path d="M16 14.3c3.1 0.3 5.5 2.5 5.5 5.7" fill="none" stroke-width="2" stroke-linecap="round"/>

    <symbol id="i-screen" viewBox="0 0 24 24">
      <rect x="2.5" y="4" width="19" height="12.5" rx="1.5" fill="none" stroke-width="2"/>

      <path d="M6 6l12 12M18 6L6 18" fill="none" stroke-width="3" stroke-linecap="round"/>

      <circle cx="12" cy="12" r="8.5" fill="none" stroke-width="2"/>

  </defs>
</svg>

<!-- pencil maths marginalia (decorative, behind everything) -->
<div class="mc-doodles" aria-hidden="true">
  <svg style="top:64px;right:-24px;width:190px;height:150px;transform:rotate(7deg)" viewBox="0 0 100 80">
    <path d="M6 62 H94 M50 6 V74"/>
    <path d="M16 14 Q50 96 84 14"/>
  </svg>
  <svg style="bottom:36px;left:-18px;width:210px;height:170px;transform:rotate(-6deg)" viewBox="0 0 110 90">
    <path d="M6 34 L13 52 L22 10 H48"/>
    <path d="M62 78 H104 L104 40 Z M96 78 V70 H104"/>
  </svg>
</div>

<span class="mc-conn" data-conn="online"><span class="mc-conn__dot"></span><span data-i18n="conn_reconnecting"></span></span>
<div class="mc-toggles">
  <button class="mc-btn mc-btn--quiet" id="soundToggle" aria-label="音效 / Sound">
    <svg id="soundIconOn" style="display:none"><use href="#i-sound"/></svg>
    <svg id="soundIconOff"><use href="#i-sound-off"/></svg>
  </button>
  <button class="mc-btn mc-btn--quiet" id="langToggle" aria-label="切換語言 / Switch language">中 · EN</button>
  <button class="mc-btn mc-btn--quiet" id="themeToggle" aria-label="切換深淺色 / Toggle theme"><svg><use href="#i-theme"/></svg></button>
</div>

<div class="mc-stage">

  <!-- ══ intro ══ -->
  <div class="mc-screen active" id="introScreen">
    <header class="mc-masthead">
      <span class="mc-masthead__code"><strong>SM901</strong> · <span data-i18n="subtopic"></span></span>
      <svg class="mc-arrow" style="width:26px;height:20px;color:var(--mc-red)"><use href="#i-arrow"/></svg>
    </header>
    <h1 class="mc-title" data-i18n="title"></h1>
    <svg class="mc-swash" viewBox="0 0 150 12" aria-hidden="true"><path d="M3 8 Q40 3 75 7 T147 5"/></svg>
    <p class="mc-lede" data-i18n="objective"></p>
    <div class="mc-meta">
      <span><svg><use href="#i-clock"/></svg><span data-i18n="duration"></span></span>
      <span><svg><use href="#i-players"/></svg><span data-i18n="players"></span></span>
    </div>
    <div class="mc-note" data-i18n="how_to_play"></div>
    <div style="display:grid;gap:12px">
      <button class="mc-btn mc-btn--primary mc-btn--block" id="btnHost">
        <svg style="width:20px;height:20px"><use href="#i-screen"/></svg>
        <span data-i18n="btn_host"></span>
        <svg class="mc-arrow"><use href="#i-arrow"/></svg>
      </button>
      <button class="mc-btn mc-btn--primary mc-btn--block" id="btnSolo">
        <span data-i18n="btn_solo"></span>
        <svg class="mc-arrow"><use href="#i-arrow"/></svg>
      </button>
    </div>
    <footer class="mc-brand">
      <img class="mc-logo--light" src="/logo-secondary.png" alt="MathConcept Secondary Academy">
      <img class="mc-logo--dark" src="/logo-secondary-dark.png" alt="MathConcept Secondary Academy">
      <div>
        <div class="mc-brand__name">MathConcept Secondary Academy</div>
        <div class="mc-brand__sub">中學教室 · Companion Games</div>
      </div>
    </footer>
  </div>

  <!-- ══ host lobby (multi-device) ══ -->
  <div class="mc-screen" id="lobbyScreen">
    <header class="mc-masthead">
      <span class="mc-masthead__code"><strong>SM901</strong> · <span data-i18n="subtopic"></span></span>
      <svg class="mc-arrow" style="width:26px;height:20px;color:var(--mc-red)"><use href="#i-arrow"/></svg>
    </header>
    <h2 class="mc-title" style="font-size:clamp(26px,6vw,36px)" data-i18n="lobby_title"></h2>
    <p class="mc-lede" data-i18n="lobby_hint"></p>
    <div class="mc-sheet" style="text-align:center">
      <div class="mc-board__label" data-i18n="room_code_label"></div>
      <div class="mc-code" id="roomCode">····</div>
      <div class="mc-qr" id="qrBox" style="margin-top:16px"></div>
    </div>
    <p class="mc-status" id="lobbyStatus" style="margin-top:16px" data-i18n="lobby_waiting"></p>
    <div class="zb-playerlist" id="playerList" style="margin-top:12px"></div>
    <button class="mc-btn mc-btn--primary mc-btn--block" id="btnStartMulti" style="margin-top:16px;display:none">
      <span data-i18n="btn_start_multi"></span>
      <svg class="mc-arrow"><use href="#i-arrow"/></svg>
    </button>
    <footer class="mc-brand">
      <img class="mc-logo--light" src="/logo-secondary.png" alt="MathConcept Secondary Academy">
      <img class="mc-logo--dark" src="/logo-secondary-dark.png" alt="MathConcept Secondary Academy">
      <div>
        <div class="mc-brand__name">MathConcept Secondary Academy</div>
        <div class="mc-brand__sub">中學教室 · Companion Games</div>
      </div>
    </footer>
  </div>

  <!-- ══ game (solo + host) ══ -->
  <div class="mc-screen" id="gameScreen">
    <div class="zb-game-grid">
      <div class="zb-col-l">
        <div class="zb-topline">
          <span class="zb-topline__level" id="levelChip"></span>
          <span class="zb-topline__right">
            <span class="zb-score" id="scoreBox"></span>
            <span class="zb-timer" id="fuseTimer"><svg><use href="#i-clock"/></svg><span id="fuseTimerText">--.-</span></span>
          </span>
        </div>
        <div class="zb-board" id="exprBoard" aria-live="polite"></div>
        <div class="zb-scenewrap">
          <div class="zb-scene" id="scene">
            <svg id="structSvg" viewBox="0 0 400 240" preserveAspectRatio="xMidYMid meet" class="zb-struct" aria-hidden="true"></svg>
            <canvas id="fxCanvas" aria-hidden="true"></canvas>
            <div class="zb-scenestamp" id="sceneStamp" aria-live="polite"></div>
            <div class="zb-levelcard" id="levelCard" aria-hidden="true">
              <div class="zb-levelcard__n" id="levelCardN"></div>
              <div class="zb-levelcard__sub" id="levelCardSub"></div>
            </div>
          </div>
        </div>
      </div>

const GROUND = 210, DECK_Y = 150;
let drawIdx = 0;
function P(d, cls) {
  return `<path d="${d}" pathLength="1" class="din ${cls || ""}" style="--i:${drawIdx++}"/>`;
}
function T(x, y, cls, content, extra) {
  return `<text x="${x}" y="${y}" class="din2 ${cls || ""}" style="--i:${drawIdx++}" ${extra || ""}>${content}</text>`;
}

function pillarSvg(cx, p) {
  const l = cx - 11, r = cx + 11;
  return `<g class="zb-pillar" data-id="${p.id}">
    ${P(`M${l} ${DECK_Y} V${GROUND}`)}
    ${P(`M${r} ${DECK_Y} V${GROUND}`)}
    ${P(`M${l} 158 L${r} 176 M${r} 158 L${l} 176`, "thin")}
    ${P(`M${l} 188 L${r} 206 M${r} 188 L${l} 206`, "thin")}
    ${P(`M${cx - 31} 162 h62 v22 h-62 z`, "plaque-border")}
    ${T(cx, 178, "plabel", p.label, `data-plaque="${p.id}"`)}
  </g>
  <text x="${cx}" y="200" class="zb-rootmark" data-for="${p.id}"></text>`;
}

/* per-level building silhouettes, all standing on the pillar deck */
function deckSvg(level, xs) {
  const lo = Math.min(...xs) - 42, hi = Math.max(...xs) + 42;
  const beam = P(`M${lo} ${DECK_Y} h${hi - lo} M${lo} ${DECK_Y - 8} h${hi - lo}`);
  switch (level.n) {
    case 1: return beam
      + P("M172 142 h56 v-38 h-56 z")
      + P("M172 118 h56 M172 130 h56", "thin")
      + P("M168 104 L200 88 L232 104")
      + T(200, 132, "plabel", "×" + level.konst);
    case 2: return beam
      + P("M166 142 V104 h68 V142")
      + P("M160 106 L200 78 L240 106")
      + P("M212 142 v-24 h14 v24", "thin")
      + P("M176 116 h14 v12 h-14 z", "thin");
    case 3: return beam
      + P("M124 142 V70 h152 V142")
      + P("M124 106 h152", "thin")
      + P("M138 82 h18 v14 h-18 z M186 82 h18 v14 h-18 z M234 82 h18 v14 h-18 z", "thin")
      + P("M138 118 h18 v14 h-18 z M234 118 h18 v14 h-18 z", "thin")
      + P("M124 70 L138 58 h124 L276 70", "thin");
    case 4: return beam
      + P(`M${xs[0] - 16} 142 V120 h32 V142 M${xs[1] - 16} 142 V120 h32 V142`)
      + P(`M${xs[0]} 120 V96 M${xs[1]} 120 V96`)
      + P(`M${xs[0]} 96 Q200 64 ${xs[1]} 96`)
      + P(`M${xs[0]} 118 Q200 88 ${xs[1]} 118`, "thin")
      + P("M104 142 h192", "thin");
    case 5: return beam
      + P("M182 142 L188 44 h24 L218 142")
      + P("M184 118 h32 M186 92 h28 M187 68 h26", "thin")
      + P("M188 44 h24 v-10 h-24 z", "thin");
    case 6: return beam
      + P("M132 142 V64 h136 V142")
      + P("M156 64 V34 h88 V64")
      + P("M200 34 V12")
      + P("M144 78 h16 v10 h-16 z M186 78 h28 v10 h-28 z M240 78 h16 v10 h-16 z", "thin")
      + P("M144 100 h16 v10 h-16 z M186 100 h28 v10 h-28 z M240 100 h16 v10 h-16 z", "thin")
      + P("M144 122 h16 v10 h-16 z M240 122 h16 v10 h-16 z", "thin")
      + P("M168 44 h64 M168 54 h64", "thin");
  }
  return beam;
}

function rubbleSvg(xs) {
  const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
  const w = Math.max(90, (Math.max(...xs) - Math.min(...xs)) + 110);
  const l = cx - w / 2, r = cx + w / 2;
  return `<g class="zb-rubble" id="rubble">
    <path pathLength="1" d="M${l} ${GROUND} L${l + w * 0.16} ${GROUND - 16} L${l + w * 0.3} ${GROUND - 8} L${cx} ${GROUND - 26} L${l + w * 0.68} ${GROUND - 10} L${l + w * 0.84} ${GROUND - 18} L${r} ${GROUND}"/>
    <path pathLength="1" class="thin" d="M${cx - 26} ${GROUND - 9} l10 -7 l7 7 M${cx + 12} ${GROUND - 14} l9 -5 M${l + 12} ${GROUND - 5} l8 -5"/>
  </g>`;
}

function sceneStatics(level, xs) {
  const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
  let hatch = "";
  for (let x = 20; x < 390; x += 24) hatch += `M${x} ${GROUND} l-8 9 `;
  // fuse: detonator bottom-left, hand-drawn line to the structure base
  const fuseD = `M46 202 C 96 226, 132 188, ${cx - 52} 218 S ${cx - 10} 214, ${cx} 209`;
  return P(`M8 ${GROUND} H392`)
    + P(hatch, "thin faint")
    + `<path d="M${cx} 20 V${GROUND}" class="thin faint" stroke-dasharray="7 4 2 4"/>`
    + T(16, 26, "tag", "圖則 PLAN 0" + level.n)
    + P("M14 32 h64", "thin faint")
    + P("M22 190 h24 v14 h-24 z M34 190 v-9 M26 181 h16")
    + `<path id="fusePath" d="${fuseD}" class="thin" style="stroke:var(--mc-red);opacity:0.85"/>`
    + `<circle id="fuseGlow" r="6.5" fill="var(--mc-red)" opacity="0.25"/>`
    + `<circle id="fuseSpark" r="3.2" fill="var(--mc-red)"/>`;
}

function renderStructure(level) {
  drawIdx = 0;
  const xs = level.pillars.length === 1 ? [200] : (level.n === 5 ? [170, 230] : [140, 260]);
  $("structSvg").innerHTML =
    sceneStatics(level, xs)
    + rubbleSvg(xs)
    + `<g class="zb-deck" id="deck">${deckSvg(level, xs)}</g>`
    + level.pillars.map((p, i) => pillarSvg(xs[i], p)).join("");
  return xs;
}

function exprHtml(expr) {

function starSvg() {
  return '<svg viewBox="0 0 20 20"><path d="M10 1.5l2.5 5.4 5.9 0.7-4.4 4 1.2 5.8-5.2-2.9-5.2 2.9 1.2-5.8-4.4-4 5.9-0.7z"/></svg>';

function markHtml(kind, lines) {
  // kind: correct | wrong | info
  const stampKey = kind === "correct" ? "stamp_correct" : "stamp_wrong";
  const ink = kind === "correct"
    ? '<path d="M4 13l5.5 5.5L20 6.5"/>'
    : '<path d="M6 6l12 12"/><path d="M18 6L6 18"/>';
  const noteCls = kind === "correct" ? "mc-margin-note--correct" : "";
  const stamp = kind === "info" ? "" : `
    <div class="mc-stamp ${kind === "correct" ? "mc-stamp--correct" : ""}">
      <svg class="draw" viewBox="0 0 24 24" style="width:22px;height:22px" fill="none"
           stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${ink}</svg>
      <span>${t(stampKey)}</span>
    </div>`;
  return stamp + lines.map(l => `<div class="mc-margin-note ${noteCls}">${l}</div>`).join("");
}

/* keypad factory: builds handlers around a submit(v) callback.
 * The sign key latches; a digit tap submits sign·digit immediately. */
function makePad(padEl, previewEl, lockEl, lockCountEl, submit) {
  let neg = false;
  let locked = false;
  let lockTimer = null;
  const signKey = padEl.querySelector(".zb-key--sign");

  function renderPreview() {
    previewEl.innerHTML = "x&nbsp;=&nbsp;" + (neg ? '<span class="neg">−</span>' : "") + "▢";
  }
  renderPreview();

  padEl.addEventListener("click", e => {
    const key = e.target.closest(".zb-key");
    if (!key || locked) return;
    ZBFX.audio.unlock();
    if (key === signKey) {
      neg = !neg;
      signKey.setAttribute("aria-pressed", neg);
      ZBFX.audio.click();
      renderPreview();
      return;
    }
    const d = parseInt(key.dataset.d, 10);
    const v = neg ? -d : d;
    neg = false;
    signKey.setAttribute("aria-pressed", "false");
    renderPreview();
    ZBFX.audio.click();
    submit(v);
  });

  return {
    lock(seconds) {
      locked = true;
      padEl.querySelectorAll(".zb-key").forEach(k => k.disabled = true);
      lockEl.classList.add("show");
      let left = seconds;
      lockCountEl.textContent = left;
      clearInterval(lockTimer);
      lockTimer = setInterval(() => {
        left -= 1;
        if (left <= 0) { this.unlock(); }
        else lockCountEl.textContent = left;
      }, 1000);
    },
    unlock() {
      clearInterval(lockTimer);
      locked = false;
      padEl.querySelectorAll(".zb-key").forEach(k => k.disabled = false);
      lockEl.classList.remove("show");
    },
    disable() {
      locked = true;
      padEl.querySelectorAll(".zb-key").forEach(k => k.disabled = true);
    },
    enable() {
      clearInterval(lockTimer);
      locked = false;
      neg = false;
      signKey.setAttribute("aria-pressed", "false");
      renderPreview();
      padEl.querySelectorAll(".zb-key").forEach(k => k.disabled = false);
      lockEl.classList.remove("show");
    },
  };
}

  players: {}, scores: {}, streaks: {}, starsBy: {}, claimsBy: {}, processedSeq: {},
};

const pad = makePad($("pad"), $("padPreview"), $("padLock"), $("lockCount"), v => submitCode(v, null));

ZBFX.attach($("fxCanvas"), $("scene"), VB_W, VB_H);

function startRun(mode) {
  G.mode = mode;
  ZBFX.audio.unlock();
  GameBridge.emit(SLUG, "start", { mode: mode, players: Object.keys(G.players).length });
  G.levels = ZBLevels.genAll(newRand());
  G.idx = 0; G.score = 0; G.streak = 0; G.starsTotal = 0; G.records = [];
  G.scores = {}; G.streaks = {}; G.starsBy = {}; G.claimsBy = {};
  G.started = true;
  $("padWrap").style.display = mode === "host" ? "none" : "";
  $("hostBoard").style.display = mode === "host" ? "" : "none";
  if (mode === "host") {
    G.room.set("state/scores", null);
    G.room.set("state/results", null);
    renderHostBoard();
  }
  show("gameScreen");
  startLevel();
}

$("btnSolo").onclick = () => startRun("solo");
$("btnRestart").onclick = () => startRun(G.mode);
$("btnMenu").onclick = () => {
  if (G.room) {
    if (G.watcher) G.watcher.close();
    G.room.close();
    G.room = null; G.started = false; G.players = {}; G.processedSeq = {};
  }
  show("introScreen");
};

function refreshDynamicText() {
  // re-render text that fmt() composed, after a language switch
  if ($("gameScreen").classList.contains("active") && G.level) {
    $("levelChip").innerHTML =
      `<strong>${fmt("level_chip", { n: G.level.n })}</strong> · ${t("lv" + G.level.n)}`;
    $("levelCardN").textContent = fmt("level_chip", { n: G.level.n });
    $("levelCardSub").textContent = t("target_label") + "：" + t("b" + G.level.n) + " · " + t("lv" + G.level.n);
  }
  $("takeawayOr").textContent = t("or");
}
refreshDynamicText();

function startLevel() {
  const level = G.level = G.levels[G.idx];
  G.claimed = [];
  G.levelPoints = 0;
  G.over = false;

  refreshDynamicText();
  $("scoreBox").textContent = G.score;
  $("exprBoard").innerHTML = exprHtml(level.expr);
  $("markZone").innerHTML = "";
  $("sceneStamp").classList.remove("show");
  $("sceneStamp").innerHTML = "";
  renderStars($("stars"), G.streak);
  renderStructure(level);
  pad.enable();

  if (G.mode === "host") {
    // publish the round: phones display from state, host stays the judge
    G.room.update("state", {
      phase: "playing",
      level: level,
      levelIdx: G.idx,
      deadlineEpoch: Date.now() + level.fuseMs,
      claims: null,
    });
  }

  // level card flash
  const card = $("levelCard");
  card.classList.remove("show");
  void card.offsetWidth; // restart the animation
  card.classList.add("show");
  setTimeout(() => card.classList.remove("show"), 1600);

  // fuse
  G.duration = level.fuseMs;
  G.deadline = performance.now() + level.fuseMs;
  G.fusePathEl = $("fusePath");
  G.fuseLen = G.fusePathEl.getTotalLength();
  G.lastTickSec = null;
  $("fuseTimer").classList.remove("warn");
  ZBFX.audio.fuseStart();
  cancelAnimationFrame(G.raf);
  G.raf = requestAnimationFrame(fuseFrame);
}

function fuseFrame() {
  if (G.over) return;
  const remain = Math.max(0, G.deadline - performance.now());
  const burned = 1 - remain / G.duration;
  $("fuseTimerText").textContent = (remain / 1000).toFixed(1);
  ZBFX.audio.fuseUrgency(burned);

  // consume the fuse line and ride the spark along it
  const pt = G.fusePathEl.getPointAtLength(G.fuseLen * burned);
  G.fusePathEl.setAttribute("stroke-dasharray", `0 ${G.fuseLen * burned} ${G.fuseLen}`);
  $("fuseSpark").setAttribute("cx", pt.x); $("fuseSpark").setAttribute("cy", pt.y);
  $("fuseGlow").setAttribute("cx", pt.x); $("fuseGlow").setAttribute("cy", pt.y);
  ZBFX.sparksAt(pt.x, pt.y);

  if (remain <= 5200) {
    $("fuseTimer").classList.add("warn");
    const sec = Math.ceil(remain / 1000);
    if (sec !== G.lastTickSec) { G.lastTickSec = sec; ZBFX.audio.tick(); }
  }
  if (remain <= 0) { fuseOut(); return; }
  G.raf = requestAnimationFrame(fuseFrame);
}

function pillarX(id) {
  const mark = document.querySelector(`.zb-rootmark[data-for="${id}"]`);
  return parseFloat(mark.getAttribute("x"));
}

function blowPillar(id, root, name) {
  const g = document.querySelector(`.zb-pillar[data-id="${id}"]`);
  const mark = document.querySelector(`.zb-rootmark[data-for="${id}"]`);
  const x = pillarX(id);
  g.classList.add("blown");
  mark.textContent = "x = " + ZBLevels.num(root);
  mark.classList.add("show");
  if (name) {
    // multi-device: the claimer's name is inked on the rubble
    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
    label.setAttribute("x", x);
    label.setAttribute("y", 226);
    label.setAttribute("class", "zb-claimname show");
    label.textContent = name;
    mark.parentNode.appendChild(label);
  }
  ZBFX.debris(x, 180, { count: 24 });
  ZBFX.dust(x, GROUND - 6, { count: 10 });
  ZBFX.shake(8);
  ZBFX.vibrate(80);
}

/* partial demolition: the deck sags toward the missing support */
function sagDeck(hitId) {
  const level = G.level;
  const standing = level.pillars.find(p => G.claimed.indexOf(p.id) === -1);
  if (!standing) return;
  $("deck").classList.add(pillarX(hitId) < pillarX(standing.id) ? "sag-l" : "sag-r");
}

function submitCode(v, player) {
  if (G.over) return;
  const level = G.level;
  const res = ZBLevels.judge(level, v, G.claimed);

  if (player) { hostVerdict(player, v, res); return; }

  if (res.already) {
    $("markZone").innerHTML = markHtml("info", [t("note_already") + "：x = " + ZBLevels.num(v)]);
    return;
  }

  if (!res.correct) {
    G.streak = 0;
    renderStars($("stars"), 0);
    const lines = ZBLevels.workingWrong(level, v)
      .concat([fmt("note_strength", { n: ZBLevels.strength(level, v) })]);
    $("markZone").innerHTML = markHtml("wrong", lines);
    $("exprBoard").classList.add("mc-shake");
    setTimeout(() => $("exprBoard").classList.remove("mc-shake"), 400);
    ZBFX.audio.knock();
    ZBFX.vibrate(180);
    pad.lock(3);
    return;
  }

  // correct: claim + detonate every matching pillar (both, for L5)
  const remainFrac = Math.max(0, (G.deadline - performance.now()) / G.duration);
  const pts = (100 + Math.round(100 * remainFrac)) * res.hit.length;
  G.levelPoints += pts;
  G.score += pts;
  G.streak += 1;
  G.starsTotal += 1;
  $("scoreBox").textContent = G.score;
  renderStars($("stars"), G.streak);

  // L6: reveal the hidden factor on the plaque just before it blows
  if (level.kind === "expanded") {
    res.hit.forEach(id => {
      const p = level.pillars.find(p => p.id === id);
      document.querySelector(`[data-plaque="${id}"]`).textContent = p.hidden;
    });
  }

  res.hit.forEach(id => {
    const p = level.pillars.find(p => p.id === id);
    G.claimed.push(id);
    blowPillar(id, p.root);
  });
  ZBFX.audio.boom(res.hit.length > 1);

  const lines = ZBLevels.workingHit(level, v).concat([
    (res.hit.length > 1 ? t("note_both_down") + " " : "") + fmt("points_fmt", { n: pts }),
  ]);
  $("markZone").innerHTML = markHtml("correct", lines);
  GameBridge.emit(SLUG, "score", { level: level.n, points: pts, score: G.score });

  const allDown = G.claimed.length === level.pillars.length;
  if (allDown) collapseAndAdvance();
  else sagDeck(res.hit[0]);
}

/* host mode: judge a phone's submission, write the private verdict,
 * and drive the shared scene. Wrong answers stay off the projector. */
function hostVerdict(player, v, res) {
  const level = G.level;

  if (res.already) {
    const owner = Object.values(G.claimsBy).find(c => c.root === v);
    G.room.set("verdicts/" + player.id, {
      seq: player.seq, v: v, already: true,
      claimedBy: owner ? owner.name : "",
      total: G.scores[player.id] || 0, level: level.n,
    });
    return;
  }

  if (!res.correct) {
    G.streaks[player.id] = 0;
    G.room.set("verdicts/" + player.id, {
      seq: player.seq, v: v, ok: false, streak: 0,
      total: G.scores[player.id] || 0, level: level.n,
    });
    return;
  }

  const remainFrac = Math.max(0, (G.deadline - performance.now()) / G.duration);
  const pts = (100 + Math.round(100 * remainFrac)) * res.hit.length;
  G.levelPoints += pts; // the 拆 stamp caption shows the level's total bounty
  G.scores[player.id] = (G.scores[player.id] || 0) + pts;
  G.streaks[player.id] = (G.streaks[player.id] || 0) + 1;
  G.starsBy[player.id] = (G.starsBy[player.id] || 0) + 1;

  if (level.kind === "expanded") {
    res.hit.forEach(id => {
      const p = level.pillars.find(p => p.id === id);
      document.querySelector(`[data-plaque="${id}"]`).textContent = p.hidden;
    });
  }
  res.hit.forEach(id => {
    const p = level.pillars.find(p => p.id === id);
    G.claimed.push(id);
    G.claimsBy[id] = { by: player.id, name: player.name, root: p.root };
    blowPillar(id, p.root, player.name);
  });
  ZBFX.audio.boom(res.hit.length > 1);

  G.room.update("state/claims", Object.fromEntries(res.hit.map(id => [id, G.claimsBy[id]])));
  G.room.update("state/scores", { [player.id]: G.scores[player.id] });
  G.room.set("verdicts/" + player.id, {
    seq: player.seq, v: v, ok: true, hit: res.hit.length, pts: pts,
    streak: G.streaks[player.id], total: G.scores[player.id], level: level.n,
  });
  renderHostBoard();
  GameBridge.emit(SLUG, "score", { level: level.n, points: pts, player: player.name });

  const allDown = G.claimed.length === level.pillars.length;
  if (allDown) collapseAndAdvance();
  else sagDeck(res.hit[0]);
}

/* live leaderboard under the host scene */
function renderHostBoard() {
  const rows = Object.keys(G.players)
    .map(id => ({ id: id, name: (G.players[id] || {}).name || t("player"), pts: G.scores[id] || 0 }))
    .sort((a, b) => b.pts - a.pts)
    .slice(0, 6);
  $("hostBoard").innerHTML = rows.map((r, i) => `
    <div class="zb-hostboard__row">
      <span class="zb-hostboard__rank">${i + 1}</span>
      <span class="zb-hostboard__name">${escapeText(r.name)}</span>
      <span class="zb-hostboard__pts">${r.pts}</span>
    </div>`).join("");
}
function escapeText(s) {
  return String(s).replace(/[&<>"]/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));
}

function collapseAndAdvance() {
  G.over = true;
  cancelAnimationFrame(G.raf);
  ZBFX.audio.fuseStop();
  ZBFX.sparksAt(null);
  pad.disable();

  const elapsed = G.duration - Math.max(0, G.deadline - performance.now());
  G.records.push({ n: G.level.n, cleared: true, ms: elapsed, pts: G.levelPoints });
  if (G.mode === "host") G.room.update("state", { phase: "cooldown" });

  setTimeout(() => {
    $("deck").classList.remove("sag-l", "sag-r");
    $("deck").classList.add("fall");
    ZBFX.audio.collapse();
    ZBFX.shake(15);
    ZBFX.vibrate([60, 40, 130]);
    ZBFX.debris(200, 130, { count: 40, power: 1.5 });
    ZBFX.dust(200, GROUND - 10, { count: 22 });
  }, 380);
  setTimeout(() => {
    $("rubble").classList.add("show");
    ZBFX.dust(200, GROUND - 14, { count: 12 });
  }, 1020);
  setTimeout(() => {
    $("sceneStamp").innerHTML =
      `<div class="zb-chai">拆</div><div class="zb-chai__cap">${t("stamp_demolished")} · ${fmt("points_fmt", { n: G.levelPoints })}</div>`;
    $("sceneStamp").classList.add("show");
  }, 1180);
  setTimeout(nextLevel, 2700);
}

function fuseOut() {
  G.over = true;
  cancelAnimationFrame(G.raf);
  ZBFX.audio.fuseStop();
  ZBFX.audio.fizzle();
  ZBFX.sparksAt(null);
  pad.disable();
  $("fuseTimerText").textContent = "0.0";
  G.streak = 0;
  renderStars($("stars"), 0);
  G.records.push({ n: G.level.n, cleared: false, ms: G.duration, pts: G.levelPoints });
  if (G.mode === "host") {
    G.streaks = {}; // a survived structure breaks everyone's streak
    G.room.update("state", { phase: "reveal" });
  }

  // the structure survives; reveal the full solution with working
  const level = G.level;
  const rootsLine = t("note_reveal") + "：" +
    ZBLevels.roots(level).map(r => "x = " + ZBLevels.num(r)).join(" " + t("or") + " ");
  const lines = (ZBLevels.factorisation(level) ? [ZBLevels.factorisation(level)] : []).concat([rootsLine]);
  $("markZone").innerHTML = markHtml("wrong", lines);
  $("sceneStamp").innerHTML =
    `<div class="mc-stamp"><svg class="draw" viewBox="0 0 24 24" style="width:22px;height:22px" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M6 6l12 12"/><path d="M18 6L6 18"/></svg><span>${t("stamp_standing")}</span></div>`;
  $("sceneStamp").classList.add("show");
  setTimeout(nextLevel, 3400);
}

function nextLevel() {
  G.idx += 1;
  if (G.idx >= ZBLevels.LEVEL_COUNT) { endGame(); return; }
  startLevel();
}

function leaderboardHtml(results, meId) {
  return results.map((r, i) => `
    <div class="zb-hostboard__row${r.id === meId ? " me" : ""}">
      <span class="zb-hostboard__rank">${i + 1}</span>
      <span class="zb-hostboard__name">${escapeText(r.name)}</span>
      <span class="zb-hostboard__pts">${r.score}</span>
    </div>`).join("");
}

function endGame() {
  if (G.mode === "host") {
    const results = Object.keys(G.players).map(id => ({
      id: id,
      name: (G.players[id] || {}).name || t("player"),
      score: G.scores[id] || 0,
      stars: G.starsBy[id] || 0,
    })).sort((a, b) => b.score - a.score);
    G.room.update("state", { phase: "end", results: results });
    GameBridge.emit(SLUG, "complete", { mode: "multi", results: results });
    $("endScoreLabel").setAttribute("data-i18n", "end_leaderboard");
    $("endScoreLabel").textContent = t("end_leaderboard");
    $("endScore").textContent = results.length ? results[0].score : 0;
    renderStars($("endStars"), results.length ? results[0].stars : 0);
    $("endRecord").innerHTML = `<div class="zb-hostboard" style="max-width:none">${leaderboardHtml(results, null)}</div>`;
    refreshDynamicText();
    show("endScreen");
    return;
  }
  GameBridge.emit(SLUG, "complete", { score: G.score, stars: G.starsTotal, records: G.records });
  $("endScoreLabel").setAttribute("data-i18n", "end_score_label");
  $("endScoreLabel").textContent = t("end_score_label");
  $("endScore").textContent = G.score;
  renderStars($("endStars"), G.starsTotal);
  $("endRecord").innerHTML = G.records.map(r => `
    <div class="zb-record__row">
      <span class="zb-record__lv">L${r.n}</span>
      <span class="zb-record__name">${t("b" + r.n)}<small>${t("lv" + r.n)}</small></span>
      <span class="zb-record__mark"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${
        r.cleared ? '<path class="ok" d="M4 13l5.5 5.5L20 6.5"/>'
                  : '<path class="no" d="M6 6l12 12M18 6L6 18"/>'
      }</svg></span>
      <span class="zb-record__pts">${r.cleared ? fmt("time_fmt", { s: (r.ms / 1000).toFixed(1) }) + " · " : ""}${r.pts}</span>
    </div>`).join("");
  refreshDynamicText();
  show("endScreen");
}

/* ══════════════════════════════════════════════════════════════════
 * multi-device: host side
 * ══════════════════════════════════════════════════════════════════ */

$("btnHost").onclick = async () => {
  ZBFX.audio.unlock();
  show("lobbyScreen");
  try {
    G.room = await GameBridge.host({ slug: SLUG, initialState: { phase: "lobby" } });
  } catch (err) {
    $("lobbyStatus").textContent = err.message;
    $("lobbyStatus").classList.add("mc-status--danger");
    return;
  }
  $("roomCode").textContent = G.room.code;
  GameBridge.qr($("qrBox"), G.room.joinUrl, 190);
  G.watcher = G.room.watch(onHostRoom);
};

function onHostRoom(room) {
  if (!room) return;
  G.players = room.players || {};

  if (!G.started) {
    const names = Object.values(G.players).map(p => (p && p.name) || t("player"));
    $("playerList").innerHTML = names.map(n => `<span>${escapeText(n)}</span>`).join("");
    if (names.length) {
      $("lobbyStatus").textContent = fmt("lobby_players", { n: names.length });
      $("btnStartMulti").style.display = "";
    }
  }

  // judge new submissions (one slot per player, seq strictly increasing)
  const subs = room.subs || {};
  Object.keys(subs).forEach(pid => {
    const sub = subs[pid];
    if (!sub || typeof sub.seq !== "number") return;
    if ((G.processedSeq[pid] || 0) >= sub.seq) return;
    G.processedSeq[pid] = sub.seq;
    if (!G.started || G.over) return; // between rounds: consumed, not judged
    const pl = G.players[pid] || {};
    submitCode(sub.v, { id: pid, name: pl.name || t("player"), seq: sub.seq });
  });
}

$("btnStartMulti").onclick = () => startRun("host");

/* ══════════════════════════════════════════════════════════════════
 * multi-device: controller (student phone)
 * ══════════════════════════════════════════════════════════════════ */

const C = {
  room: null, watcher: null, id: null, name: null,
  level: null, levelKey: null, phase: null,
  seq: 0, lastVerdictSeq: 0, booted: false,
  timerIv: null, deadlineEpoch: 0, pad: null,
};

function padKeysHtml() {
  const key = d => `<button class="zb-key" data-d="${d}">${d}</button>`;
  return [7, 8, 9].map(key).join("")
    + '<button class="zb-key zb-key--sign" aria-pressed="false" aria-label="負號 / negative sign">−</button>'
    + [4, 5, 6, 1, 2, 3].map(key).join("")
    + '<button class="zb-key zb-key--zero" data-d="0">0</button>';
}

function ctrlStatus(text, cls) {
  const el = $("ctrlStatus");
  el.textContent = text;
  el.className = "mc-status" + (cls ? " " + cls : "");
}

async function initController() {
  show("controllerScreen");
  // phones default to sound on (the host projector stays quiet)
  try {
    if (localStorage.getItem("mc-games-sound") === null) { ZBFX.audio.setOn(true); renderSoundIcon(); }
  } catch (_) {}

  try {
    C.room = await GameBridge.join({ slug: SLUG });
  } catch (err) {
    $("ctrlJoin").style.display = "none";
    ctrlStatus(t("room_gone"), "mc-status--danger");
    return;
  }

  $("ctrlPad").innerHTML = padKeysHtml();
  C.pad = makePad($("ctrlPad"), $("ctrlPreview"), $("ctrlLock"), $("ctrlLockCount"), v => ctrlSubmit(v));

  let saved = null;
  try { saved = JSON.parse(sessionStorage.getItem("zb-" + C.room.code)); } catch (_) {}
  if (saved && saved.id && saved.name) {
    C.id = saved.id; C.name = saved.name;
    enterPlay();
  }
  $("btnJoin").onclick = () => {
    const name = $("nameInput").value.trim().slice(0, 12);
    if (!name) { $("nameInput").focus(); return; }
    C.id = "p" + Math.random().toString(36).slice(2, 8);
    C.name = name;
    try { sessionStorage.setItem("zb-" + C.room.code, JSON.stringify({ id: C.id, name: C.name })); } catch (_) {}
    enterPlay();
  };
}

async function enterPlay() {
  ZBFX.audio.unlock();
  $("ctrlJoin").style.display = "none";
  $("ctrlPlay").style.display = "";
  $("ctrlName").textContent = C.name;
  ctrlStatus(t("ctrl_wait_start"));
  C.pad.disable();
  await C.room.set("players/" + C.id, { name: C.name, joinedAt: Date.now() });
  C.watcher = C.room.watch(onCtrlRoom);
  clearInterval(C.timerIv);
  C.timerIv = setInterval(ctrlTick, 100);
}

function ctrlSubmit(v) {
  if (C.phase !== "playing") return;
  C.seq += 1;
  C.room.set("subs/" + C.id, { v: v, seq: C.seq, ts: Date.now() });
}

function ctrlTick() {
  if (C.phase !== "playing" || !C.deadlineEpoch) { $("ctrlTimerText").textContent = "--.-"; $("ctrlTimer").classList.remove("warn"); return; }
  const remain = Math.max(0, C.deadlineEpoch - Date.now());
  $("ctrlTimerText").textContent = (remain / 1000).toFixed(1);
  $("ctrlTimer").classList.toggle("warn", remain <= 5200);
}

function onCtrlRoom(room) {
  if (!room) return;
  const st = room.state || {};

  // first snapshot after (re)join: resync counters, don't replay old feedback
  if (!C.booted) {
    C.booted = true;
    const mySub = (room.subs || {})[C.id];
    const myVerdict = (room.verdicts || {})[C.id];
    if (mySub && typeof mySub.seq === "number") C.seq = mySub.seq;
    if (myVerdict && typeof myVerdict.seq === "number") {
      C.lastVerdictSeq = myVerdict.seq;
      if (typeof myVerdict.total === "number") $("ctrlScore").textContent = myVerdict.total;
      if (typeof myVerdict.streak === "number") renderStars($("ctrlStars"), myVerdict.streak);
    }
  }

  const phaseChanged = st.phase !== C.phase;
  C.phase = st.phase;
  C.deadlineEpoch = st.deadlineEpoch || 0;

  // new level (includes late join, reload recovery and host restart)
  const lvKey = st.level ? st.level.n + "|" + st.level.expr : null;
  if (st.level && lvKey !== C.levelKey) {
    C.levelKey = lvKey;
    C.level = st.level;
    $("ctrlLevelChip").innerHTML =
      `<strong>${fmt("level_chip", { n: st.level.n })}</strong> · ${t("lv" + st.level.n)}`;
    $("ctrlExpr").innerHTML = exprHtml(st.level.expr);
    $("ctrlMark").innerHTML = "";
  }

  if (st.phase === "playing" && C.level) {
    if (phaseChanged) {
      // covers a host restart after the end screen too
      if (!$("controllerScreen").classList.contains("active")) show("controllerScreen");
      C.pad.enable();
      $("ctrlMark").innerHTML = "";
    }
    const total = C.level.pillars.length;
    const k = st.claims ? Object.keys(st.claims).length : 0;
    ctrlStatus(fmt("claims_status", { k: k, m: total }));
  } else if (st.phase === "cooldown") {
    C.pad.disable();
    ctrlStatus(t("ctrl_wait_next"), "mc-status--ok");
  } else if (st.phase === "reveal" && C.level) {
    if (phaseChanged) {
      C.pad.disable();
      renderStars($("ctrlStars"), 0); // a survived structure breaks the streak
      const rootsLine = t("note_reveal") + "：" +
        ZBLevels.roots(C.level).map(r => "x = " + ZBLevels.num(r)).join(" " + t("or") + " ");
      const fact = ZBLevels.factorisation(C.level);
      $("ctrlMark").innerHTML = markHtml("wrong", (fact ? [fact] : []).concat([rootsLine]));
      ctrlStatus(t("reveal_wait"));
    }
  } else if (st.phase === "lobby") {
    ctrlStatus(t("ctrl_wait_start"));
  } else if (st.phase === "end") {
    if (phaseChanged) ctrlEnd(st.results || []);
  }

  // private verdict feedback
  const v = (room.verdicts || {})[C.id];
  if (v && typeof v.seq === "number" && v.seq > C.lastVerdictSeq) {
    C.lastVerdictSeq = v.seq;
    applyCtrlVerdict(v);
  }
}

function applyCtrlVerdict(v) {
  if (!C.level) return;
  if (v.already) {
    const who = v.claimedBy ? fmt("note_claimed_by", { name: escapeText(v.claimedBy) }) : "";
    $("ctrlMark").innerHTML = markHtml("info",
      [t("note_already") + "：x = " + ZBLevels.num(v.v) + (who ? "，" + who : "")]);
    return;
  }
  if (v.ok) {
    $("ctrlScore").textContent = v.total;
    renderStars($("ctrlStars"), v.streak);
    const lines = ZBLevels.workingHit(C.level, v.v).concat([
      (v.hit > 1 ? t("note_both_down") + " " : "") + fmt("points_fmt", { n: v.pts }),
    ]);
    $("ctrlMark").innerHTML = markHtml("correct", lines);
    ZBFX.audio.boom(v.hit > 1);
    ZBFX.vibrate(v.hit > 1 ? [60, 40, 130] : 80);
  } else {
    renderStars($("ctrlStars"), 0);
    const lines = ZBLevels.workingWrong(C.level, v.v)
      .concat([fmt("note_strength", { n: ZBLevels.strength(C.level, v.v) })]);
    $("ctrlMark").innerHTML = markHtml("wrong", lines);
    $("ctrlExpr").classList.add("mc-shake");
    setTimeout(() => $("ctrlExpr").classList.remove("mc-shake"), 400);
    ZBFX.audio.knock();
    ZBFX.vibrate(180);
    C.pad.lock(3);
  }
}

function ctrlEnd(results) {
  clearInterval(C.timerIv);
  const mine = results.find(r => r.id === C.id);
  const rank = results.findIndex(r => r.id === C.id) + 1;
  $("endScoreLabel").setAttribute("data-i18n", "your_score");
  $("endScoreLabel").textContent = t("your_score");
  $("endScore").textContent = mine ? mine.score : 0;
  renderStars($("endStars"), mine ? mine.stars : 0);
  $("endRecord").innerHTML =
    (rank ? `<div class="mc-margin-note" style="margin-top:6px">${fmt("rank_fmt", { r: rank })}</div>` : "")
    + `<div class="zb-hostboard" style="max-width:none">${leaderboardHtml(results, C.id)}</div>`;
  $("btnRestart").style.display = "none";
  $("btnMenu").style.display = "none";
  refreshDynamicText();
  show("endScreen");
  ctrlStatus(t("thanks_playing"));
}

if (GameBridge.roomParam()) initController();

/* language switch must also refresh composed text on static screens */
document.addEventListener("mc:lang", refreshDynamicText);
</script>
